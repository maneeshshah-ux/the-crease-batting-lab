{% extends "base.html" %}

{% block title %}Error — the CREASE Batting Lab{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 text-center" style="background: #1e1e3a;">
            <div class="card-body py-5">
                <i class="bi bi-exclamation-triangle" style="font-size: 4rem; color: #ffd700;"></i>
                <h4 class="mt-3" style="color: #ffd700;">Oops!</h4>
                <p style="color: #99aabb;">{{ message }}</p>
                <a href="{{ url_for('index') }}" class="btn fw-bold" style="background: #ffd700; color: #1a1a2e;">
                    <i class="bi bi-house-door"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
