{% extends "base.html" %}

{% block title %}Error — the CREASE Batting Lab{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 text-center" style="background: #141414; border: 1px solid #2A2A2A !important;">
            <div class="card-body py-5">
                <i class="bi bi-exclamation-triangle" style="font-size: 4rem; color: #E64D0F;"></i>
                <h4 class="mt-3" style="color: #E64D0F;">Oops!</h4>
                <p style="color: #999999;">{{ message }}</p>
                <a href="{{ url_for('index') }}" class="btn btn-crease">
                    <i class="bi bi-house-door"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
