function nextPair() {
  saveInnings();
  closeAllModals();
  // Check if ALL pairs are done
  const completedNos = new Set(S().completedInnings.map(function(i) { return i.pairNo; }));
  var allDone = true;
  for (var np = 0; np < S().pairs.length; np++) {
    if (!completedNos.has(np + 1)) { allDone = false; break; }
  }
  if (allDone) { S().view = 'summary'; saveOnAction(); render(); return; }
  S().view = 'pairselect';
  saveOnAction(); render();
}
function renderSummary() {
  const s = S();
  const innings = s.completedInnings;
  let tRuns = 0, tWkts = 0;
  let pairHtml = '';
  let allBatStats = [];

  // Include active innings in totals
  if (s.innings && !s.innings.complete) {
    tRuns += s.innings.total; tWkts += s.innings.wkts;
  }

  for (const inn of innings) {
    tRuns += inn.total; tWkts += inn.wkts;
    allBatStats.push({
      b1: inn.b1, b1Name: inn.b1Name,
      b2: inn.b2, b2Name: inn.b2Name,
      pair: inn.pairNo,
      total: inn.total, wkts: inn.wkts,
      overs: inn.over + '.' + inn.legalBalls
    });
  }
  // Include active innings in batting stats aggregation
  if (s.innings && !s.innings.complete) {
    allBatStats.push({
      b1: s.innings.b1, b1Name: s.innings.b1Name,
      b2: s.innings.b2, b2Name: s.innings.b2Name,
      pair: s.innings.pairNo,
      total: s.innings.total, wkts: s.innings.wkts,
      overs: s.innings.over + '.' + s.innings.legalBalls
    });
  }

  for (const inn of innings) {
    // Per-pair: how-out strings, bowler stats, fielding stats
    const hist = inn.history || [];
    const extras = inn.extras || {};
    let howOut1 = [], howOut2 = [];
    let fieldStats = {}, bowlerStats = {};

    for (const h of hist) {
      if (h.bowler) {
        if (!bowlerStats[h.bowler]) bowlerStats[h.bowler] = { balls: 0, runs: 0, wkts: 0, wides: 0, noballs: 0, dots: 0 };
        if (h.type === 'wide') { bowlerStats[h.bowler].wides++; continue; }
        if (h.type === 'noball') { bowlerStats[h.bowler].noballs++; continue; }
        bowlerStats[h.bowler].balls++;
        if (h.type === 'wicket' && h.mode !== 'Run Out') bowlerStats[h.bowler].wkts++;
        const conceded = h.type === 'bye' || h.type === 'legbye' ? 0 : (h.runs > 0 ? h.runs : 0);
        if (conceded > 0) bowlerStats[h.bowler].runs += conceded;
        if ((h.type === 'run' && h.runs === 0) || h.type === 'wicket') bowlerStats[h.bowler].dots++;
      }
      if (h.type === 'wicket') {
        let hs = '';
        const penAmt = -h.runs;
        switch (h.mode) {
          case 'Bowled': hs = 'b ' + h.bowler; break;
          case 'LBW': hs = 'lbw b ' + h.bowler; break;
          case 'Hit Wicket': hs = 'hit wkt b ' + h.bowler; break;
          case 'Caught': hs = 'c ' + (h.fielder || '?') + ' b ' + h.bowler; break;
          case 'Stumped': hs = 'st ' + (h.fielder || '?') + ' b ' + h.bowler; break;
          case 'Run Out': hs = 'run out (' + (h.fielder || '?') + ')'; break;
          default: hs = h.mode;
        }
        if (penAmt > 0) hs += ' (-' + penAmt + ' pen)';
        if (h.b === 1) howOut1.push(hs); else howOut2.push(hs);
        if (h.fielder) {
          if (!fieldStats[h.fielder]) fieldStats[h.fielder] = { catches: 0, runOuts: 0, stumpings: 0 };
          if (h.mode === 'Caught') fieldStats[h.fielder].catches++;
          else if (h.mode === 'Run Out') fieldStats[h.fielder].runOuts++;
          else if (h.mode === 'Stumped') fieldStats[h.fielder].stumpings++;
        }
      }
    }

    // Gross/penalty
    let grossTotal = 0;
    for (const h of hist) { if (h.runs > 0) grossTotal += h.runs; }
    const penaltyTotal = grossTotal - inn.total;
    const totalExtras = (extras.byes || 0) + (extras.legByes || 0) + (extras.wides || 0) + (extras.noBalls || 0);

    // --- Build per-pair HTML ---
    let phtml = '';
    const penStr = penaltyTotal > 0 ? ', pen -' + penaltyTotal : '';
    phtml += '<div class="stat-box" style="margin-bottom:8px;padding:0;background:var(--card);border-radius:10px;border:1px solid var(--border);overflow:hidden">'
      + '<div style="background:linear-gradient(135deg, rgba(255,107,53,0.15) 0%, transparent 100%);border-bottom:1px solid var(--border);padding:8px 10px">'
      + '<div style="font-weight:bold;font-size:14px">Pair ' + inn.pairNo + ': <span style="color:var(--orange);font-size:17px">' + inn.total + '/' + inn.wkts + '</span> <span style="color:var(--dim);font-weight:400;font-size:12px">(' + inn.over + '.' + inn.legalBalls + ' ov)</span>'
      + ' <span style="color:#8b8fa3;font-size:11px;font-weight:400">(gross ' + grossTotal + penStr + ')</span></div></div>'
      + '<div style="padding:8px 10px">';

    // Batting table
    phtml += '<div style="font-weight:bold;font-size:11px;color:var(--orange);margin-top:2px;margin-bottom:2px">Batting</div>'
      + '<table style="width:100%;font-size:11px;border-collapse:collapse">'
      + '<tr style="color:var(--dim);border-bottom:1px solid var(--border)"><td style="padding:1px 4px">Batter</td>'
      + '<td style="padding:1px 4px;text-align:center">R</td><td style="padding:1px 4px;text-align:center">B</td>'
      + '<td style="padding:1px 4px;text-align:center">Dots</td><td style="padding:1px 4px;text-align:center;color:var(--blue)">4s</td>'
      + '<td style="padding:1px 4px;text-align:center;color:var(--purple)">6s</td><td style="padding:1px 4px;text-align:center;color:var(--amber)">3s</td>'
      + '<td style="padding:1px 4px;text-align:center;color:var(--orange)">Bn</td><td style="padding:1px 4px;text-align:center">SR</td>'
      + '<td style="padding:1px 4px">How Out</td></tr>';

    [inn.b1, inn.b2].forEach(function(b, i) {
      const name = i === 0 ? inn.b1Name : inn.b2Name;
      const hOut = i === 0 ? howOut1 : howOut2;
      const sr = b.bf > 0 ? ((b.runs / b.bf) * 100).toFixed(0) : '-';
      const howOut = hOut.length > 0 ? hOut.join(', ') : (b.legalBf >= 18 ? 'retired' : 'not out');
      const bgSt = i % 2 === 1 ? 'background:rgba(255,255,255,0.02);' : '';
      phtml += '<tr style="' + bgSt + '">'
        + '<td style="padding:1px 4px"><strong>' + name + '</strong></td>'
        + '<td style="padding:1px 4px;text-align:center">' + (b.grossRuns !== undefined ? b.grossRuns : b.runs) + '</td>'
        + '<td style="padding:1px 4px;text-align:center">' + b.bf + '</td>'
        + '<td style="padding:1px 4px;text-align:center;color:#8b8fa3">' + (b.dotBalls || 0) + '</td>'
        + '<td style="padding:1px 4px;text-align:center">' + b.fours + '</td>'
        + '<td style="padding:1px 4px;text-align:center">' + b.sixes + '</td>'
        + '<td style="padding:1px 4px;text-align:center">' + (b.threes || 0) + '</td>'
        + '<td style="padding:1px 4px;text-align:center">' + (b.bonusRuns || 0) + '</td>'
        + '<td style="padding:1px 4px;text-align:center;color:#8b8fa3">' + sr + '</td>'
        + '<td style="padding:1px 4px;color:#8b8fa3;font-size:10px">' + howOut + '</td></tr>';
    });
    phtml += '</table>';

    // Bowling table per pair
    const bowlerNames = Object.keys(bowlerStats);
    if (bowlerNames.length > 0) {
      phtml += '<div style="font-weight:bold;font-size:11px;color:var(--orange);margin-top:6px">Bowling</div>'
        + '<table style="width:100%;font-size:11px;border-collapse:collapse">'
        + '<tr style="color:#8b8fa3;border-bottom:1px solid var(--border)"><td style="padding:1px 4px">Bowler</td>'
        + '<td style="padding:1px 4px;text-align:center">O</td><td style="padding:1px 4px;text-align:center">R</td>'
        + '<td style="padding:1px 4px;text-align:center">W</td><td style="padding:1px 4px;text-align:center">Wd</td>'
        + '<td style="padding:1px 4px;text-align:center">NB</td><td style="padding:1px 4px;text-align:center">Dots</td></tr>';
      bowlerNames.forEach(function(name, idx) {
        const bs = bowlerStats[name];
        const ovs = Math.floor(bs.balls / 6) + '.' + (bs.balls % 6);
        const bgBowl = idx % 2 === 1 ? 'background:rgba(255,255,255,0.02);' : '';
        phtml += '<tr style="' + bgBowl + '"><td style="padding:1px 4px">' + name + '</td>'
          + '<td style="padding:1px 4px;text-align:center">' + ovs + '</td>'
          + '<td style="padding:1px 4px;text-align:center">' + (bs.runs || 0) + '</td>'
          + '<td style="padding:1px 4px;text-align:center">' + (bs.wkts || 0) + '</td>'
          + '<td style="padding:1px 4px;text-align:center">' + (bs.wides || 0) + '</td>'
          + '<td style="padding:1px 4px;text-align:center">' + (bs.noballs || 0) + '</td>'
          + '<td style="padding:1px 4px;text-align:center;color:#8b8fa3">' + (bs.dots || 0) + '</td></tr>';
      });
      phtml += '</table>';
    }

    // Extras
    const extParts = [];
    if (extras.byes) extParts.push('Bye ' + extras.byes);
    if (extras.legByes) extParts.push('LB ' + extras.legByes);
    if (extras.wides) extParts.push('Wd ' + extras.wides);
    if (extras.noBalls) extParts.push('NB ' + extras.noBalls);
    if (totalExtras > 0) {
      phtml += '<div style="font-size:11px;color:var(--amber);margin-top:4px">Extras: <span style="color:var(--text);font-weight:600">' + totalExtras + '</span> <span style="color:var(--dim)">(' + extParts.join(', ') + ')</span></div>';
    }

    // Fielding per pair
    const fielderNames = Object.keys(fieldStats);
    if (fielderNames.length > 0) {
      phtml += '<div style="font-size:11px;color:var(--green);margin-top:2px">Fielding: <span style="color:var(--dim)">';
      const fieldParts = [];
      fielderNames.forEach(function(name) {
        const fs = fieldStats[name];
        const f = [];
        if (fs.catches) f.push(fs.catches + ' ct');
        if (fs.runOuts) f.push(fs.runOuts + ' ro');
        if (fs.stumpings) f.push(fs.stumpings + ' st');
        fieldParts.push(name + ' (' + f.join(', ') + ')');
      });
      phtml += fieldParts.join(', ');
      phtml += '</div>';
    }
    phtml += '</div></div>';
    pairHtml += phtml;
  }

  // === Session Stats (aggregated across all pairs) ===
  let sessBat = {};
  // Pre-populate with ALL players so everyone shows up even if they haven't batted
  for (var sp = 0; sp < s.allPlayers.length; sp++) {
    sessBat[s.allPlayers[sp]] = { runs: 0, bf: 0, fours: 0, sixes: 0, threes: 0, dotBalls: 0, bonusRuns: 0, dismissals: 0, penaltyRuns: 0, howOuts: [] };
  }
  for (const ps of allBatStats) {
    [ps.b1, ps.b2].forEach(function(b, i) {
      const name = i === 0 ? ps.b1Name : ps.b2Name;
      if (!sessBat[name]) sessBat[name] = { runs: 0, bf: 0, fours: 0, sixes: 0, threes: 0, dotBalls: 0, bonusRuns: 0, dismissals: 0, penaltyRuns: 0, howOuts: [] };
      sessBat[name].runs += (b.grossRuns !== undefined ? b.grossRuns : b.runs);
      sessBat[name].bf += b.bf;
      sessBat[name].fours += b.fours;
      sessBat[name].sixes += b.sixes;
      sessBat[name].threes += b.threes || 0;
      sessBat[name].dotBalls += b.dotBalls || 0;
      sessBat[name].bonusRuns += b.bonusRuns || 0;
    });
  }
  let sessBowl = {}, sessField = {};
  // Include active innings' data in session aggregates
  var allInnings = innings.slice();
  if (s.innings && !s.innings.complete) allInnings.push(s.innings);
  for (const inn of allInnings) {
    for (const h of inn.history || []) {
      if (h.type === 'wicket') {
        const outName = h.b === 1 ? inn.b1Name : inn.b2Name;
        if (!sessBat[outName]) sessBat[outName] = { runs: 0, bf: 0, fours: 0, sixes: 0, threes: 0, dotBalls: 0, bonusRuns: 0, dismissals: 0, penaltyRuns: 0, howOuts: [] };
        sessBat[outName].dismissals++;
        sessBat[outName].penaltyRuns += -h.runs;
        let hs = '';
        switch (h.mode) {
          case 'Bowled': hs = 'b ' + h.bowler; break;
          case 'LBW': hs = 'lbw b ' + h.bowler; break;
          case 'Caught': hs = 'c ' + (h.fielder || '?') + ' b ' + h.bowler; break;
          case 'Stumped': hs = 'st ' + (h.fielder || '?') + ' b ' + h.bowler; break;
          case 'Run Out': hs = 'run out (' + (h.fielder || '?') + ')'; break;
          case 'Hit Wicket': hs = 'hit wkt b ' + h.bowler; break;
          default: hs = h.mode;
        }
        sessBat[outName].howOuts.push(hs);
      }
      if (h.bowler) {
        if (!sessBowl[h.bowler]) sessBowl[h.bowler] = { balls: 0, runs: 0, wkts: 0, wides: 0, noballs: 0, dots: 0 };
        if (h.type === 'wide') { sessBowl[h.bowler].wides++; continue; }
        if (h.type === 'noball') { sessBowl[h.bowler].noballs++; continue; }
        sessBowl[h.bowler].balls++;
        if (h.type === 'wicket' && h.mode !== 'Run Out') sessBowl[h.bowler].wkts++;
        const conceded = h.type === 'bye' || h.type === 'legbye' ? 0 : (h.runs > 0 ? h.runs : 0);
        if (conceded > 0) sessBowl[h.bowler].runs += conceded;
        if ((h.type === 'run' && h.runs === 0) || h.type === 'wicket') sessBowl[h.bowler].dots++;
      }
      if (h.type === 'wicket' && h.fielder) {
        if (!sessField[h.fielder]) sessField[h.fielder] = { catches: 0, runOuts: 0, stumpings: 0 };
        if (h.mode === 'Caught') sessField[h.fielder].catches++;
        else if (h.mode === 'Run Out') sessField[h.fielder].runOuts++;
        else if (h.mode === 'Stumped') sessField[h.fielder].stumpings++;
      }
    }
  }

  // Session stats table
  let sessHtml = '';
  const allPlayers = Object.keys(sessBat).sort();
  if (allPlayers.length > 0) {
    sessHtml += '<div class="summary-card" style="overflow-x:auto"><h2>Session Stats</h2>'
      + '<table class="summary-table" style="min-width:620px;font-size:11px">'
      // Header row 1: column groupings
      + '<tr><th style="position:sticky;left:0;background:var(--card)">Player</th>'
      + '<th colspan="9" style="text-align:center;color:var(--orange)">Batting</th>'
      + '<th style="color:var(--dim)"></th>'
      + '<th colspan="7" style="text-align:center;color:var(--orange)">Bowling</th>'
      + '<th style="color:var(--dim)"></th>'
      + '<th colspan="3" style="text-align:center;color:var(--orange)">Fielding</th></tr>'
      // Header row 2: column labels
      + '<tr><th style="position:sticky;left:0;background:var(--card)">Player</th>'
      + '<th>R</th><th>B</th><th>Dots</th><th>4s</th><th>6s</th><th>3s</th><th>Bn</th><th>SR</th><th>Dismissals</th>'
      + '<th style="color:var(--dim)">|</th>'
      + '<th>O</th><th>R</th><th>W</th><th>Wd</th><th>NB</th><th>Dots</th><th>Econ</th>'
      + '<th style="color:var(--dim)">|</th>'
      + '<th>Ct</th><th>RO</th><th>St</th></tr>';

    let sessRow = 0;
    for (const name of allPlayers) {
      const rowBg = sessRow++ % 2 === 1 ? 'background:rgba(255,255,255,0.025)' : 'background:var(--card)';
      const bs = sessBat[name];
      const sr = bs.bf > 0 ? ((bs.runs / bs.bf) * 100).toFixed(0) : '-';
      const pw = bs.penaltyRuns > 0 ? ' (-' + bs.penaltyRuns + ')' : '';
      const disPen = bs.dismissals > 0 ? bs.dismissals + pw : (bs.bf > 0 ? '0' : '');
      const bw = sessBowl[name] || { balls: 0, runs: 0, wkts: 0, wides: 0, noballs: 0, dots: 0 };
      const ovs = bw.balls > 0 ? Math.floor(bw.balls / 6) + '.' + (bw.balls % 6) : '-';
      const econ = bw.balls > 0 ? (bw.runs / (bw.balls / 6)).toFixed(2) : '-';
      const fw = sessField[name] || { catches: 0, runOuts: 0, stumpings: 0 };

      sessHtml += '<tr>'
        + '<td class="name" style="position:sticky;left:0;' + rowBg + '">' + name + '</td>'
        + '<td style="font-weight:700">' + bs.runs + '</td>'
        + '<td style="color:#8b8fa3">' + bs.bf + '</td>'
        + '<td style="color:#8b8fa3">' + (bs.dotBalls || 0) + '</td>'
        + '<td>' + bs.fours + '</td>'
        + '<td>' + bs.sixes + '</td>'
        + '<td>' + (bs.threes || '') + '</td>'
        + '<td>' + (bs.bonusRuns || '') + '</td>'
        + '<td style="color:#8b8fa3">' + sr + '</td>'
        + '<td>' + disPen + '</td>'
        + '<td style="color:var(--dim)">|</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + ovs + '</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + (bw.balls ? bw.runs : '-') + '</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + (bw.balls ? bw.wkts : '-') + '</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + (bw.balls ? bw.wides : '-') + '</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + (bw.balls ? bw.noballs : '-') + '</td>'
        + '<td style="color:#8b8fa3">' + (bw.balls ? (bw.dots || 0) : '-') + '</td>'
        + '<td style="color:#8b8fa3">' + econ + '</td>'
        + '<td style="color:var(--dim)">|</td>'
        + '<td>' + (fw.catches || '') + '</td>'
        + '<td>' + (fw.runOuts || '') + '</td>'
        + '<td>' + (fw.stumpings || '') + '</td></tr>';
    }
    sessHtml += '</table></div>';
  }

  // Total extras
  let tExt = 0;
  for (const inn of innings) tExt += (inn.extras?.wides || 0) + (inn.extras?.noBalls || 0) + (inn.extras?.byes || 0) + (inn.extras?.legByes || 0);

  // Build batting pairs lookup table
  const completedPairNos = new Set(s.completedInnings.map(function(i) { return i.pairNo; }));
  const activePairNo = s.innings ? s.innings.pairNo : null;
  let pairsListHtml = '<div class="summary-card"><h2>Batting Pairs</h2><table class="summary-table" style="font-size:11px">'
    + '<tr><th>Pair</th><th>Batter 1</th><th>Batter 2</th><th>Status</th><th>Score</th></tr>';
  s.pairs.forEach(function(p, i) {
    const pairNo = i + 1;
    const b1Name = p.b1 || '?';
    const b2Name = p.b2 || '?';
    var status, score;
    if (pairNo === activePairNo) {
      var inn = s.innings;
      status = '<span style="color:var(--orange);font-weight:600">In Progress</span>';
      score = inn.total + '/' + inn.wkts + ' (' + oversDisplay(inn) + ' ov)';
    } else if (completedPairNos.has(pairNo)) {
      var inn = s.completedInnings.find(function(i) { return i.pairNo === pairNo; });
      status = '<span style="color:var(--green)">Completed</span>';
      score = inn.total + '/' + inn.wkts + ' (' + inn.over + '.' + inn.legalBalls + ' ov)';
    } else {
      status = '<span style="color:var(--dim)">Pending</span>';
      score = '-';
    }
    var bg = i % 2 === 1 ? ' style="background:rgba(255,255,255,0.025)"' : '';
    pairsListHtml += '<tr' + bg + '><td>' + pairNo + '</td><td>' + b1Name + '</td><td>' + b2Name + '</td><td>' + status + '</td><td style="font-size:10px">' + score + '</td></tr>';
  });
  pairsListHtml += '</table></div>';

  var isInProgress = !!s.innings;
  var headerTitle = isInProgress ? 'Session Summary' : 'Session Complete';

  // Assemble full page
  document.getElementById('app').innerHTML = logoHTML()
    + '<div class="summary">'
    + '<div class="summary-card" style="text-align:center">'
    + '<h2>' + headerTitle + '</h2><div class="sub">' + s.pairs.length + ' pairs \u00b7 6 overs each</div>'
    + '<div style="display:flex;justify-content:center;gap:20px;margin:8px 0">'
    + '<div><span style="font-size:22px;font-weight:800;color:var(--orange)">' + tRuns + '</span><br><span style="font-size:10px;color:var(--dim)">Runs</span></div>'
    + '<div><span style="font-size:22px;font-weight:800;color:var(--red)">' + tWkts + '</span><br><span style="font-size:10px;color:var(--dim)">Wickets</span></div>'
    + '<div><span style="font-size:22px;font-weight:800;color:var(--dim)">' + tExt + '</span><br><span style="font-size:10px;color:var(--dim)">Extras</span></div></div></div>'
    + pairsListHtml
    + pairHtml
    + sessHtml
    + (isInProgress
      ? '<button class="btn btn-dark btn-block" onclick="S().view=\'match\';render()">\u2190 Back to Scoring</button>'
      : '<button class="btn btn-orange btn-block" onclick="saveSession()">Save Session &amp; New</button>'
        + '<button class="btn btn-dark btn-block" onclick="if(confirm(\'Discard all completed innings and start over?\')) resetApp()" style="margin-top:6px">Discard &amp; New</button>')
    + '</div>';
}

function saveSession() {
  const s = S();
  if (s.completedInnings.length === 0) {
    if (!confirm('No innings to save. Start a new match?')) return;
    resetApp(); return;
  }
  try {
    const today = new Date().toISOString().slice(0, 10);
    let all = {};
    try { all = JSON.parse(localStorage.getItem('crease_sessions') || '{}'); } catch(e) {}
    if (!all[today]) all[today] = [];
    all[today].push({
      date: today,
      allPlayers: JSON.parse(JSON.stringify(s.allPlayers)),
      pairs: JSON.parse(JSON.stringify(s.pairs)),
      innings: JSON.parse(JSON.stringify(s.completedInnings)),
      savedAt: new Date().toISOString()
    });
    localStorage.setItem('crease_sessions', JSON.stringify(all));
    alert('Session saved!');
  } catch(e) { console.error('Save error', e); }
  resetApp();
}

function resetApp() {
  S().allPlayers = []; S().pairs = []; S().innings = null;
  S().completedInnings = []; S().view = 'setup'; S().currentPairIdx = 0;
  clearInterruptedSession();
  closeAllModals();
  render();
}

// ============================
// Session Persistence & Resume (Robust Auto-Save)
// ============================
const STORAGE_SESSIONS = 'crease_sessions';
const STORAGE_CURRENT  = 'crease_current_session';
const STORAGE_BACKUP   = 'crease_current_session_bak';

/** Quick check: is the current state valid enough to save? */
function isStateSaveable() {
  const s = S();
  return !!(s.allPlayers && Array.isArray(s.allPlayers) && s.allPlayers.length > 0
    && s.pairs && Array.isArray(s.pairs) && s.pairs.length > 0);
}

/** Build a saveable snapshot of current state */
function buildSessionSnapshot() {
  const s = S();
  const data = {
    type: 'interrupted',
    savedAt: new Date().toISOString(),
    allPlayers: s.allPlayers,
    pairs: s.pairs,
    numPairs: s.numPairs,
    currentPairIdx: s.currentPairIdx,
    completedInnings: s.completedInnings,
    modifiedRules: s.modifiedRules,
    view: s.view
  };
  if (s.innings && !s.innings.complete) {
    data.activeInnings = JSON.parse(JSON.stringify(s.innings));
  }
  return data;
}

/** Save state to both primary and backup keys (only if valid) */
function persistSession(data) {
  if (!data) return;
  try {
    const json = JSON.stringify(data);
    localStorage.setItem(STORAGE_CURRENT, json);
    localStorage.setItem(STORAGE_BACKUP, json);
  } catch(e) {
    // If quota exceeded, try just primary
    try { localStorage.setItem(STORAGE_CURRENT, JSON.stringify(data)); } catch(e2) {}
  }
}

/** Called after every scoring action — saves immediately */
function saveOnAction() {
  if (!isStateSaveable()) return;
  persistSession(buildSessionSnapshot());
}

/** Save for interruption recovery (called on unload/visibility) */
function autoSaveSession() {
  // Only save if state is valid — never overwrite a good save with a corrupt one
  if (!isStateSaveable()) return;
  persistSession(buildSessionSnapshot());
}

/** Check if there's an interrupted session to resume (falls back to backup) */
function getInterruptedSession() {
  // Try primary key first
  var data = tryReadSession(STORAGE_CURRENT);
  if (data) return data;
  // Fall back to backup key
  data = tryReadSession(STORAGE_BACKUP);
  if (data) return data;
  return null;
}

function tryReadSession(key) {
  try {
    var raw = localStorage.getItem(key);
    if (!raw) return null;
    var data = JSON.parse(raw);
    if (data && data.type === 'interrupted' && data.allPlayers && data.pairs) return data;
    return null;
  } catch(e) { return null; }
}

/** Clear both interrupted-session markers */
function clearInterruptedSession() {
  localStorage.removeItem(STORAGE_CURRENT);
  localStorage.removeItem(STORAGE_BACKUP);
}

/** Fully restore an interrupted or saved session */
function restoreSession(data) {
  if (!data) { resetApp(); return; }
  const s = S();
  s.allPlayers = data.allPlayers || [];
  s.pairs = data.pairs || [];
  s.numPairs = data.numPairs || s.pairs.length;
  s.currentPairIdx = data.currentPairIdx || 0;
  s.completedInnings = data.completedInnings || [];
  s.modifiedRules = data.modifiedRules !== undefined ? data.modifiedRules : true;
  if (data.activeInnings) {
    s.innings = data.activeInnings;
    s.view = 'match';
  } else {
    s.innings = null;
    s.view = data.view && data.view !== 'match' ? data.view :
             (s.currentPairIdx >= s.pairs.length ? 'summary' : 'pairselect');
  }
  clearInterruptedSession();
  saveOnAction();  // persist the restored state immediately
  render();
}

// ============================
// Saved Sessions Browser
// ============================
function renderSavedSessions() {
  let all = {};
  try { all = JSON.parse(localStorage.getItem(STORAGE_SESSIONS) || '{}'); } catch(e) {}
  const dates = Object.keys(all).sort().reverse();

  let listHtml = '';
  if (dates.length === 0) {
    listHtml = '<div style="text-align:center;padding:20px;color:var(--dim);font-size:13px">No saved sessions yet.</div>';
  } else {
    for (const date of dates) {
      const sessions = all[date];
      listHtml += '<div class="card"><h2>' + date + '</h2>';
      sessions.forEach(function(sess, idx) {
        const innings = sess.innings || [];
        const tRuns = innings.reduce(function(sum, inn) { return sum + (inn.total || 0); }, 0);
        const tWkts = innings.reduce(function(sum, inn) { return sum + (inn.wkts || 0); }, 0);
        const nPairs = (sess.pairs || []).length;
        const time = sess.savedAt ? new Date(sess.savedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
        listHtml += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">'
          + '<div style="flex:1;font-size:13px"><strong>Session ' + (idx + 1) + '</strong> \u00b7 ' + nPairs + ' pairs \u00b7 '
          + '<span style="color:var(--orange)">' + tRuns + '/' + tWkts + '</span> \u00b7 ' + time + '</div>'
          + '<button class="btn btn-sm btn-dark" onclick="viewSavedSession(\'' + date + '\',' + idx + ')">View</button>'
          + '<button class="btn btn-sm btn-dark" onclick="exportSessionHTML(\'' + date + '\',' + idx + ')">HTML</button>'
          + '<button class="btn btn-sm btn-red" onclick="deleteSession(\'' + date + '\',' + idx + ')">Del</button>'
          + '</div>';
      });
      listHtml += '</div>';
    }
  }

  document.getElementById('app').innerHTML = logoHTML()
    + '<div class="setup">'
    + '<button class="btn btn-dark btn-block" onclick="render()" style="margin-bottom:10px">\u2190 Back</button>'
    + '<div class="card"><h2>Saved Sessions</h2>' + listHtml + '</div>'
    + '</div>';
}

/** Delete a specific session */
function deleteSession(date, idx) {
  if (!confirm('Delete this saved session?')) return;
  try {
    let all = JSON.parse(localStorage.getItem(STORAGE_SESSIONS) || '{}');
    if (all[date]) {
      all[date].splice(idx, 1);
      if (all[date].length === 0) delete all[date];
      localStorage.setItem(STORAGE_SESSIONS, JSON.stringify(all));
    }
  } catch(e) {}
  renderSavedSessions();
}

/** View a saved session's full stats */
function viewSavedSession(date, idx) {
  try {
    const all = JSON.parse(localStorage.getItem(STORAGE_SESSIONS) || '{}');
    const session = all[date] && all[date][idx];
    if (!session) { alert('Session not found'); return; }
    renderSessionView(session, date, idx);
  } catch(e) { alert('Error loading session'); }
}

// ============================
// Session Viewer (rich display)
// ============================
function renderSessionView(session, date, idx) {
  const innings = session.innings || [];
  const pairs = session.pairs || [];
  let tRuns = 0, tWkts = 0;
  let pairHtml = '';
  let allBatStats = [];

  for (const inn of innings) {
    tRuns += inn.total; tWkts += inn.wkts;
    allBatStats.push({
      b1: inn.b1, b1Name: inn.b1Name,
      b2: inn.b2, b2Name: inn.b2Name,
      pair: inn.pairNo,
      total: inn.total, wkts: inn.wkts,
      overs: inn.over + '.' + inn.legalBalls
    });

    const hist = inn.history || [];
    const extras = inn.extras || {};
    let howOut1 = [], howOut2 = [];
    let fieldStats = {}, bowlerStats = {};

    for (const h of hist) {
      if (h.bowler) {
        if (!bowlerStats[h.bowler]) bowlerStats[h.bowler] = { balls: 0, runs: 0, wkts: 0, wides: 0, noballs: 0, dots: 0 };
        if (h.type === 'wide') { bowlerStats[h.bowler].wides++; continue; }
        if (h.type === 'noball') { bowlerStats[h.bowler].noballs++; continue; }
        bowlerStats[h.bowler].balls++;
        if (h.type === 'wicket' && h.mode !== 'Run Out') bowlerStats[h.bowler].wkts++;
        const conceded = h.type === 'bye' || h.type === 'legbye' ? 0 : (h.runs > 0 ? h.runs : 0);
        if (conceded > 0) bowlerStats[h.bowler].runs += conceded;
        if ((h.type === 'run' && h.runs === 0) || h.type === 'wicket') bowlerStats[h.bowler].dots++;
      }
      if (h.type === 'wicket') {
        let hs = '';
        const penAmt = -h.runs;
        switch (h.mode) {
          case 'Bowled': hs = 'b ' + h.bowler; break;
          case 'LBW': hs = 'lbw b ' + h.bowler; break;
          case 'Hit Wicket': hs = 'hit wkt b ' + h.bowler; break;
          case 'Caught': hs = 'c ' + (h.fielder || '?') + ' b ' + h.bowler; break;
          case 'Stumped': hs = 'st ' + (h.fielder || '?') + ' b ' + h.bowler; break;
          case 'Run Out': hs = 'run out (' + (h.fielder || '?') + ')'; break;
          default: hs = h.mode;
        }
        if (penAmt > 0) hs += ' (-' + penAmt + ' pen)';
        if (h.b === 1) howOut1.push(hs); else howOut2.push(hs);
        if (h.fielder) {
          if (!fieldStats[h.fielder]) fieldStats[h.fielder] = { catches: 0, runOuts: 0, stumpings: 0 };
          if (h.mode === 'Caught') fieldStats[h.fielder].catches++;
          else if (h.mode === 'Run Out') fieldStats[h.fielder].runOuts++;
          else if (h.mode === 'Stumped') fieldStats[h.fielder].stumpings++;
        }
      }
    }

    let grossTotal = 0;
    for (const h of hist) { if (h.runs > 0) grossTotal += h.runs; }
    const penaltyTotal = grossTotal - inn.total;
    const totalExtras = (extras.byes || 0) + (extras.legByes || 0) + (extras.wides || 0) + (extras.noBalls || 0);

    let phtml = '';
    const penStr = penaltyTotal > 0 ? ', pen -' + penaltyTotal : '';
    phtml += '<div class="stat-box" style="margin-bottom:8px;padding:10px;background:var(--card);border-radius:8px;border:1px solid var(--border)">'
      + '<div style="font-weight:bold;font-size:14px;margin-bottom:2px">Pair ' + inn.pairNo + ': ' + inn.total + '/' + inn.wkts + ' (' + inn.over + '.' + inn.legalBalls + ' ov)'
      + ' <span style="color:#8b8fa3;font-size:11px">(gross ' + grossTotal + penStr + ')</span></div>';

    phtml += '<div style="font-weight:bold;font-size:11px;color:#8b8fa3;margin-top:4px">Batting</div>'
      + '<table style="width:100%;font-size:11px;border-collapse:collapse">'
      + '<tr style="color:#8b8fa3;border-bottom:1px solid var(--border)"><td style="padding:1px 4px">Batter</td>'
      + '<td style="padding:1px 4px;text-align:center">R</td><td style="padding:1px 4px;text-align:center">B</td>'
      + '<td style="padding:1px 4px;text-align:center">Dots</td><td style="padding:1px 4px;text-align:center">4s</td>'
      + '<td style="padding:1px 4px;text-align:center">6s</td><td style="padding:1px 4px;text-align:center">3s</td>'
      + '<td style="padding:1px 4px;text-align:center">Bn</td><td style="padding:1px 4px;text-align:center">SR</td>'
      + '<td style="padding:1px 4px">How Out</td></tr>';

    [inn.b1, inn.b2].forEach(function(b, i) {
      const name = i === 0 ? inn.b1Name : inn.b2Name;
      const hOut = i === 0 ? howOut1 : howOut2;
      const sr = b.bf > 0 ? ((b.runs / b.bf) * 100).toFixed(0) : '-';
      const howOut = hOut.length > 0 ? hOut.join(', ') : (b.legalBf >= 18 ? 'retired' : 'not out');
      const bgSt = i % 2 === 1 ? 'background:rgba(255,255,255,0.02);' : '';
      phtml += '<tr style="' + bgSt + '">'
        + '<td style="padding:1px 4px"><strong>' + name + '</strong></td>'
        + '<td style="padding:1px 4px;text-align:center">' + (b.grossRuns !== undefined ? b.grossRuns : b.runs) + '</td>'
        + '<td style="padding:1px 4px;text-align:center">' + b.bf + '</td>'
        + '<td style="padding:1px 4px;text-align:center;color:#8b8fa3">' + (b.dotBalls || 0) + '</td>'
        + '<td style="padding:1px 4px;text-align:center">' + b.fours + '</td>'
        + '<td style="padding:1px 4px;text-align:center">' + b.sixes + '</td>'
        + '<td style="padding:1px 4px;text-align:center">' + (b.threes || 0) + '</td>'
        + '<td style="padding:1px 4px;text-align:center">' + (b.bonusRuns || 0) + '</td>'
        + '<td style="padding:1px 4px;text-align:center;color:#8b8fa3">' + sr + '</td>'
        + '<td style="padding:1px 4px;color:#8b8fa3;font-size:10px">' + howOut + '</td></tr>';
    });
    phtml += '</table>';

    const bowlerNames = Object.keys(bowlerStats);
    if (bowlerNames.length > 0) {
      phtml += '<div style="font-weight:bold;font-size:11px;color:#8b8fa3;margin-top:6px">Bowling</div>'
        + '<table style="width:100%;font-size:11px;border-collapse:collapse">'
        + '<tr style="color:#8b8fa3;border-bottom:1px solid var(--border)"><td style="padding:1px 4px">Bowler</td>'
        + '<td style="padding:1px 4px;text-align:center">O</td><td style="padding:1px 4px;text-align:center">R</td>'
        + '<td style="padding:1px 4px;text-align:center">W</td><td style="padding:1px 4px;text-align:center">Wd</td>'
        + '<td style="padding:1px 4px;text-align:center">NB</td><td style="padding:1px 4px;text-align:center">Dots</td></tr>';
      bowlerNames.forEach(function(name, idx) {
        const bs = bowlerStats[name];
        const ovs = Math.floor(bs.balls / 6) + '.' + (bs.balls % 6);
        const bgBowl = idx % 2 === 1 ? 'background:rgba(255,255,255,0.02);' : '';
        phtml += '<tr style="' + bgBowl + '"><td style="padding:1px 4px">' + name + '</td>'
          + '<td style="padding:1px 4px;text-align:center">' + ovs + '</td>'
          + '<td style="padding:1px 4px;text-align:center">' + (bs.runs || 0) + '</td>'
          + '<td style="padding:1px 4px;text-align:center">' + (bs.wkts || 0) + '</td>'
          + '<td style="padding:1px 4px;text-align:center">' + (bs.wides || 0) + '</td>'
          + '<td style="padding:1px 4px;text-align:center">' + (bs.noballs || 0) + '</td>'
          + '<td style="padding:1px 4px;text-align:center;color:#8b8fa3">' + (bs.dots || 0) + '</td></tr>';
      });
      phtml += '</table>';
    }

    const extParts = [];
    if (extras.byes) extParts.push('Bye ' + extras.byes);
    if (extras.legByes) extParts.push('LB ' + extras.legByes);
    if (extras.wides) extParts.push('Wd ' + extras.wides);
    if (extras.noBalls) extParts.push('NB ' + extras.noBalls);
    if (totalExtras > 0) {
      phtml += '<div style="font-size:11px;color:#8b8fa3;margin-top:4px">Extras: ' + totalExtras + ' (' + extParts.join(', ') + ')</div>';
    }

    const fielderNames = Object.keys(fieldStats);
    if (fielderNames.length > 0) {
      phtml += '<div style="font-size:11px;color:#8b8fa3;margin-top:2px">Fielding: ';
      const fieldParts = [];
      fielderNames.forEach(function(cname) {
        const fs = fieldStats[cname];
        const f = [];
        if (fs.catches) f.push(fs.catches + ' ct');
        if (fs.runOuts) f.push(fs.runOuts + ' ro');
        if (fs.stumpings) f.push(fs.stumpings + ' st');
        fieldParts.push(cname + ' (' + f.join(', ') + ')');
      });
      phtml += fieldParts.join(', ');
      phtml += '</div>';
    }
    phtml += '</div>';
    pairHtml += phtml;
  }

  // === Session Stats ===
  let sessBat = {};
  // Pre-populate with ALL players so everyone shows up even if they haven't batted
  const allSquad = session.allPlayers || [];
  for (var sp = 0; sp < allSquad.length; sp++) {
    sessBat[allSquad[sp]] = { runs: 0, bf: 0, fours: 0, sixes: 0, threes: 0, dotBalls: 0, bonusRuns: 0, dismissals: 0, penaltyRuns: 0, howOuts: [] };
  }
  for (const ps of allBatStats) {
    [ps.b1, ps.b2].forEach(function(b, i) {
      const name = i === 0 ? ps.b1Name : ps.b2Name;
      if (!sessBat[name]) sessBat[name] = { runs: 0, bf: 0, fours: 0, sixes: 0, threes: 0, dotBalls: 0, bonusRuns: 0, dismissals: 0, penaltyRuns: 0, howOuts: [] };
      sessBat[name].runs += (b.grossRuns !== undefined ? b.grossRuns : b.runs);
      sessBat[name].bf += b.bf;
      sessBat[name].fours += b.fours;
      sessBat[name].sixes += b.sixes;
      sessBat[name].threes += b.threes || 0;
      sessBat[name].dotBalls += b.dotBalls || 0;
      sessBat[name].bonusRuns += b.bonusRuns || 0;
    });
  }
  let sessBowl = {}, sessField = {};
  for (const inn of innings) {
    for (const h of inn.history || []) {
      if (h.type === 'wicket') {
        const outName = h.b === 1 ? inn.b1Name : inn.b2Name;
        if (!sessBat[outName]) sessBat[outName] = { runs: 0, bf: 0, fours: 0, sixes: 0, threes: 0, dotBalls: 0, bonusRuns: 0, dismissals: 0, penaltyRuns: 0, howOuts: [] };
        sessBat[outName].dismissals++;
        sessBat[outName].penaltyRuns += -h.runs;
        let hs = '';
        switch (h.mode) {
          case 'Bowled': hs = 'b ' + h.bowler; break;
          case 'LBW': hs = 'lbw b ' + h.bowler; break;
          case 'Caught': hs = 'c ' + (h.fielder || '?') + ' b ' + h.bowler; break;
          case 'Stumped': hs = 'st ' + (h.fielder || '?') + ' b ' + h.bowler; break;
          case 'Run Out': hs = 'run out (' + (h.fielder || '?') + ')'; break;
          case 'Hit Wicket': hs = 'hit wkt b ' + h.bowler; break;
          default: hs = h.mode;
        }
        sessBat[outName].howOuts.push(hs);
      }
      if (h.bowler) {
        if (!sessBowl[h.bowler]) sessBowl[h.bowler] = { balls: 0, runs: 0, wkts: 0, wides: 0, noballs: 0, dots: 0 };
        if (h.type === 'wide') { sessBowl[h.bowler].wides++; continue; }
        if (h.type === 'noball') { sessBowl[h.bowler].noballs++; continue; }
        sessBowl[h.bowler].balls++;
        if (h.type === 'wicket' && h.mode !== 'Run Out') sessBowl[h.bowler].wkts++;
        const conceded = h.type === 'bye' || h.type === 'legbye' ? 0 : (h.runs > 0 ? h.runs : 0);
        if (conceded > 0) sessBowl[h.bowler].runs += conceded;
        if ((h.type === 'run' && h.runs === 0) || h.type === 'wicket') sessBowl[h.bowler].dots++;
      }
      if (h.type === 'wicket' && h.fielder) {
        if (!sessField[h.fielder]) sessField[h.fielder] = { catches: 0, runOuts: 0, stumpings: 0 };
        if (h.mode === 'Caught') sessField[h.fielder].catches++;
        else if (h.mode === 'Run Out') sessField[h.fielder].runOuts++;
        else if (h.mode === 'Stumped') sessField[h.fielder].stumpings++;
      }
    }
  }

  let sessHtml = '';
  const allPlayers = Object.keys(sessBat).sort();
  if (allPlayers.length > 0) {
    sessHtml += '<div class="summary-card" style="overflow-x:auto"><h2>Session Stats</h2>'
      + '<table class="summary-table" style="min-width:620px;font-size:11px">'
      + '<tr><th style="position:sticky;left:0;background:var(--card)">Player</th>'
      + '<th colspan="9" style="text-align:center;color:var(--orange)">Batting</th>'
      + '<th style="color:var(--dim)"></th>'
      + '<th colspan="7" style="text-align:center;color:var(--orange)">Bowling</th>'
      + '<th style="color:var(--dim)"></th>'
      + '<th colspan="3" style="text-align:center;color:var(--orange)">Fielding</th></tr>'
      + '<tr><th style="position:sticky;left:0;background:var(--card)">Player</th>'
      + '<th>R</th><th>B</th><th>Dots</th><th>4s</th><th>6s</th><th>3s</th><th>Bn</th><th>SR</th><th>Dismissals</th>'
      + '<th style="color:var(--dim)">|</th>'
      + '<th>O</th><th>R</th><th>W</th><th>Wd</th><th>NB</th><th>Dots</th><th>Econ</th>'
      + '<th style="color:var(--dim)">|</th>'
      + '<th>Ct</th><th>RO</th><th>St</th></tr>';

    let sessRow = 0;
    for (const name of allPlayers) {
      const rowBg = sessRow++ % 2 === 1 ? 'background:rgba(255,255,255,0.025)' : 'background:var(--card)';
      const bs = sessBat[name];
      const sr = bs.bf > 0 ? ((bs.runs / bs.bf) * 100).toFixed(0) : '-';
      const pw = bs.penaltyRuns > 0 ? ' (-' + bs.penaltyRuns + ')' : '';
      const disPen = bs.dismissals > 0 ? bs.dismissals + pw : (bs.bf > 0 ? '0' : '');
      const bw = sessBowl[name] || { balls: 0, runs: 0, wkts: 0, wides: 0, noballs: 0, dots: 0 };
      const ovs = bw.balls > 0 ? Math.floor(bw.balls / 6) + '.' + (bw.balls % 6) : '-';
      const econ = bw.balls > 0 ? (bw.runs / (bw.balls / 6)).toFixed(2) : '-';
      const fw = sessField[name] || { catches: 0, runOuts: 0, stumpings: 0 };

      sessHtml += '<tr>'
        + '<td class="name" style="position:sticky;left:0;' + rowBg + '">' + name + '</td>'
        + '<td style="font-weight:700">' + bs.runs + '</td>'
        + '<td style="color:#8b8fa3">' + bs.bf + '</td>'
        + '<td style="color:#8b8fa3">' + (bs.dotBalls || 0) + '</td>'
        + '<td>' + bs.fours + '</td>'
        + '<td>' + bs.sixes + '</td>'
        + '<td>' + (bs.threes || '') + '</td>'
        + '<td>' + (bs.bonusRuns || '') + '</td>'
        + '<td style="color:#8b8fa3">' + sr + '</td>'
        + '<td>' + disPen + '</td>'
        + '<td style="color:var(--dim)">|</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + ovs + '</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + (bw.balls ? bw.runs : '-') + '</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + (bw.balls ? bw.wkts : '-') + '</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + (bw.balls ? bw.wides : '-') + '</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + (bw.balls ? bw.noballs : '-') + '</td>'
        + '<td style="color:#8b8fa3">' + (bw.balls ? (bw.dots || 0) : '-') + '</td>'
        + '<td style="color:#8b8fa3">' + econ + '</td>'
        + '<td style="color:var(--dim)">|</td>'
        + '<td>' + (fw.catches || '') + '</td>'
        + '<td>' + (fw.runOuts || '') + '</td>'
        + '<td>' + (fw.stumpings || '') + '</td></tr>';
    }
    sessHtml += '</table></div>';
  }

  let tExt = 0;
  for (const inn of innings) tExt += (inn.extras?.wides || 0) + (inn.extras?.noBalls || 0) + (inn.extras?.byes || 0) + (inn.extras?.legByes || 0);

  const time = session.savedAt ? new Date(session.savedAt).toLocaleString() : '';

  document.getElementById('app').innerHTML = logoHTML()
    + '<div class="summary" id="session-print-area">'
    + '<div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap">'
    + '<button class="btn btn-sm btn-dark" onclick="renderSavedSessions()">\u2190 Sessions</button>'
    + '<button class="btn btn-sm btn-orange" onclick="exportSessionHTML(\'' + date + '\',' + idx + ')">Export HTML</button>'
    + '<button class="btn btn-sm btn-green" onclick="exportSessionCSV(\'' + date + '\',' + idx + ')">Export CSV</button>'
    + '<button class="btn btn-sm btn-orange" onclick="printSessionView()">Print / PDF</button>'
    + '</div>'
    + '<div class="summary-card" style="text-align:center">'
    + '<h2>Session Summary</h2><div class="sub">' + pairs.length + ' pairs \u00b7 ' + date + ' \u00b7 ' + time + '</div>'
    + '<div style="display:flex;justify-content:center;gap:20px;margin:8px 0">'
    + '<div><span style="font-size:22px;font-weight:800;color:var(--orange)">' + tRuns + '</span><br><span style="font-size:10px;color:var(--dim)">Runs</span></div>'
    + '<div><span style="font-size:22px;font-weight:800;color:var(--red)">' + tWkts + '</span><br><span style="font-size:10px;color:var(--dim)">Wickets</span></div>'
    + '<div><span style="font-size:22px;font-weight:800;color:var(--dim)">' + tExt + '</span><br><span style="font-size:10px;color:var(--dim)">Extras</span></div></div></div>'
    + pairHtml
    + sessHtml
    + '</div>';
}

// ============================
// Export / Print — Landscape per-pair pages + Session Summary
// ============================

/**
 * Generate a standalone HTML report with:
 *  - Landscape orientation (@page)
 *  - One page per pair (page-break-after: always)
 *  - A final Session Summary page
 *  - All batting, bowling, extras, and ball-by-ball details
 *
 * The HTML can be downloaded and shared (WhatsApp) or opened and printed to PDF.
 */
function generateSessionHTML(date, idx, session) {
  var innings = session.innings || [];
  var pairs = session.pairs || [];
  var allPlayers = session.allPlayers || [];

  // Fix: pairs stored as { b1: name, b2: name } - b1/b2 are names, not indices
  function pairName(p, slot) { return p ? (p['b' + slot] || '?') : '?'; }

  // Build per-pair pages
  var pairPages = '';
  innings.forEach(function(inn) {
    var hist = inn.history || [];
    var extras = inn.extras || {};

    // How-out strings per batter
    var howOut1 = [], howOut2 = [];
    hist.forEach(function(h) {
      if (h.type === 'wicket') {
        var hs = '';
        switch (h.mode) {
          case 'Bowled': hs = 'b ' + h.bowler; break;
          case 'LBW': hs = 'lbw b ' + h.bowler; break;
          case 'Hit Wicket': hs = 'hit wkt b ' + h.bowler; break;
          case 'Caught': hs = 'c ' + (h.fielder || '?') + ' b ' + h.bowler; break;
          case 'Stumped': hs = 'st ' + (h.fielder || '?') + ' b ' + h.bowler; break;
          case 'Run Out': hs = 'run out (' + (h.fielder || '?') + ')'; break;
          default: hs = h.mode;
        }
        if (h.b === 1) howOut1.push(hs); else howOut2.push(hs);
      }
    });

    // Bowling stats for this pair
    var bowlStats = {};
    hist.forEach(function(h) {
      if (!h.bowler) return;
      if (!bowlStats[h.bowler]) bowlStats[h.bowler] = { balls: 0, runs: 0, wkts: 0, wides: 0, noballs: 0, dots: 0, econ: 0 };
      if (h.type === 'wide') { bowlStats[h.bowler].wides++; return; }
      if (h.type === 'noball') { bowlStats[h.bowler].noballs++; return; }
      bowlStats[h.bowler].balls++;
      if (h.type === 'wicket' && h.mode !== 'Run Out') bowlStats[h.bowler].wkts++;
      var conceded = h.type === 'bye' || h.type === 'legbye' ? 0 : (h.runs > 0 ? h.runs : 0);
      if (conceded > 0) bowlStats[h.bowler].runs += conceded;
      if ((h.type === 'run' && h.runs === 0) || h.type === 'wicket') bowlStats[h.bowler].dots++;
    });
    var bowlNames = Object.keys(bowlStats);

    // Extras total
    var extTotal = (extras.wides||0) + (extras.noBalls||0) + (extras.byes||0) + (extras.legByes||0);
    var extParts = [];
    if (extras.byes) extParts.push('Byes ' + extras.byes);
    if (extras.legByes) extParts.push('LB ' + extras.legByes);
    if (extras.wides) extParts.push('Wides ' + extras.wides);
    if (extras.noBalls) extParts.push('NB ' + extras.noBalls);
    if (extras.penalty) extParts.push('Penalty ' + extras.penalty);

    // Ball-by-ball table rows
    var bbbRows = '';
    hist.forEach(function(h, hi) {
      var nm = h.b === 1 ? inn.b1Name : inn.b2Name;
      var desc = '';
      if (h.type === 'wicket') desc = 'WICKET - ' + nm + ' ' + h.mode + (h.fielder ? ' c ' + h.fielder : '');
      else if (h.type === 'wide') desc = 'Wide' + (h.runs > 1 ? ' (' + h.runs + ')' : '');
      else if (h.type === 'noball') desc = 'No Ball (' + h.runs + ' runs)';
      else if (h.type === 'bye') desc = h.runs + ' bye' + (h.runs > 1 ? 's' : '');
      else if (h.type === 'legbye') desc = h.runs + ' leg bye' + (h.runs > 1 ? 's' : '');

      bbbRows += '<tr' + bg + '><td class="bb">' + (h.over + 1) + '.' + h.ballNum + '</td><td class="bb">' + desc + '</td><td class="bb" style="text-align:right;font-weight:700">' + h.runningTotal + '</td></tr>';
    });

    var grossTotal = 0;

    var penaltyTotal = grossTotal - inn.total;

    pairPages += '<div class="page-break"><div class="page-content">'
      + '<div class="header"><span class="logo-text">The CREASE</span><span class="header-right">Session ' + date + ' &middot; Pair ' + inn.pairNo + '</span></div>'

      + '<td>' + (inn.b1.bonusRuns||0) + '</td>'
      + '<td>' + (inn.b1.bf > 0 ? ((inn.b1.runs/inn.b1.bf)*100).toFixed(0) : '-') + '</td>'
      + '<td>' + (howOut1.length > 0 ? howOut1.join(', ') : (inn.b1.legalBf >= 18 ? 'retired' : 'not out')) + '</td></tr>'
      + '<tr><td class="name">' + inn.b2Name + '</td>'
      + '<td>' + inn.b2.runs + '</td><td>' + inn.b2.bf + '</td><td>' + (inn.b2.dotBalls||0) + '</td>'
      + '<td>' + inn.b2.fours + '</td><td>' + inn.b2.sixes + '</td><td>' + (inn.b2.threes||0) + '</td>'
      + '<td>' + (inn.b2.bonusRuns||0) + '</td>'
      + '<td>' + (inn.b2.bf > 0 ? ((inn.b2.runs/inn.b2.bf)*100).toFixed(0) : '-') + '</td>'
      + '<td>' + (howOut2.length > 0 ? howOut2.join(', ') : (inn.b2.legalBf >= 18 ? 'retired' : 'not out')) + '</td></tr>'
      + '</table>'

      // Bowling
      + (bowlNames.length > 0
        ? '<div class="section-title">Bowling</div>'
          + '<table><tr><th>Bowler</th><th>O</th><th>R</th><th>W</th><th>Wd</th><th>NB</th><th>Dots</th><th>Econ</th></tr>'
          + bowlNames.map(function(n, bi) {
              var bs = bowlStats[n];
              var ovs = Math.floor(bs.balls/6) + '.' + (bs.balls%6);
              var econ = bs.balls > 0 ? (bs.runs / (bs.balls/6)).toFixed(2) : '-';
              return '<tr' + (bi%2===1?' style="background:#fafafa"':'') + '><td class="name">' + n + '</td><td>' + ovs + '</td><td>' + bs.runs + '</td><td>' + bs.wkts + '</td><td>' + bs.wides + '</td><td>' + bs.noballs + '</td><td>' + (bs.dots||0) + '</td><td>' + econ + '</td></tr>';
            }).join('')

        : '')

      // Ball-by-ball (compact)
      + (hist.length > 0
        ? '<div class="section-title">Ball-by-Ball</div>'
          + '<table class="bbb"><tr><th style="width:50px">Over</th><th>Event</th><th style="width:60px;text-align:right">Total</th></tr>'
          + bbbRows + '</table>'
        : '')

      + '</div></div>';
  });  // end per-pair loop

  // ===== Session Summary page =====
  // Aggregate batting across all innings
  var batStats = {};
  innings.forEach(function(inn) {
    [{name: inn.b1Name, b: inn.b1}, {name: inn.b2Name, b: inn.b2}].forEach(function(item) {
      if (!batStats[item.name]) batStats[item.name] = { runs: 0, bf: 0, fours: 0, sixes: 0, threes: 0, dotBalls: 0, bonusRuns: 0 };
      var bs = batStats[item.name];
      bs.runs += (item.b.grossRuns !== undefined ? item.b.grossRuns : item.b.runs);
      bs.bf += item.b.bf;
      bs.fours += item.b.fours;
      bs.sixes += item.b.sixes;
      bs.threes += item.b.threes || 0;
      bs.dotBalls += item.b.dotBalls || 0;
      bs.bonusRuns += item.b.bonusRuns || 0;
    });
  });
  var allBatNames = allPlayers.length > 0 ? allPlayers.slice().sort() : Object.keys(batStats).sort();
  var batRows = '';
  allBatNames.forEach(function(name) {
    var bs = batStats[name] || { runs: 0, bf: 0, fours: 0, sixes: 0, threes: 0, dotBalls: 0, bonusRuns: 0 };

  // Aggregate bowling across all innings
  var bowlStats = {};
  innings.forEach(function(inn) {
    (inn.history || []).forEach(function(h) {
      if (!h.bowler) return;
      if (!bowlStats[h.bowler]) bowlStats[h.bowler] = { balls: 0, runs: 0, wkts: 0, wides: 0, noballs: 0, dots: 0 };
      if (h.type === 'wide') { bowlStats[h.bowler].wides++; return; }
      if (h.type === 'noball') { bowlStats[h.bowler].noballs++; return; }
      bowlStats[h.bowler].balls++;
      if (h.type === 'wicket' && h.mode !== 'Run Out') bowlStats[h.bowler].wkts++;
      var conceded = h.type === 'bye' || h.type === 'legbye' ? 0 : (h.runs > 0 ? h.runs : 0);
      if (conceded > 0) bowlStats[h.bowler].runs += conceded;
      if ((h.type === 'run' && h.runs === 0) || h.type === 'wicket') bowlStats[h.bowler].dots++;
    });
  });
  var bowlNames2 = Object.keys(bowlStats).sort();
  var bowlRows2 = '';
  bowlNames2.forEach(function(name) {
    var bs = bowlStats[name];
    var ovs = Math.floor((bs.balls||0)/6) + '.' + ((bs.balls||0)%6);
    var econ = bs.balls > 0 ? (bs.runs / (bs.balls/6)).toFixed(2) : '-';
    bowlRows2 += '<tr><td class="name">' + name + '</td><td>' + ovs + '</td><td>' + (bs.runs||0) + '</td>'
      + '<td>' + (bs.wkts||0) + '</td><td>' + (bs.wides||0) + '</td><td>' + (bs.noballs||0) + '</td>'
      + '<td>' + (bs.dots||0) + '</td><td>' + econ + '</td></tr>';
  });

  // Aggregate fielding
  var fieldStats = {};
  innings.forEach(function(inn) {

        if (h.mode === 'Caught') fieldStats[h.fielder].ct++;
        else if (h.mode === 'Run Out') fieldStats[h.fielder].ro++;
        else if (h.mode === 'Stumped') fieldStats[h.fielder].st++;
      }
    });
  });
  var fieldNames = Object.keys(fieldStats).sort();
  var fieldRows = '';
  fieldNames.forEach(function(name) {

    fieldRows += '<tr><td class="name">' + name + '</td><td>' + (fs.ct||'') + '</td><td>' + (fs.ro||'') + '</td><td>' + (fs.st||'') + '</td></tr>';
  });

  var tRuns = innings.reduce(function(s, inn) { return s + (inn.total || 0); }, 0);
  var tWkts = innings.reduce(function(s, inn) { return s + (inn.wkts || 0); }, 0);
  var tExt = 0;
  innings.forEach(function(inn) {

    tExt += (e.wides||0) + (e.noBalls||0) + (e.byes||0) + (e.legByes||0) + (e.penalty||0);
  });

  // Find max overs per pair to display total overs
  var totalOvers = innings.reduce(function(s, inn) { return s + inn.over + (inn.legalBalls/6); }, 0);

  var summaryPage = '<div class="page-break"><div class="page-content">'
    + '<div class="header"><span class="logo-text">The CREASE</span><span class="header-right">Session Summary &middot; ' + date + '</span></div>'

    + '<div class="session-top">'
    + '<div class="stat-box"><strong>' + tRuns + '</strong><span>Runs</span></div>'

    // Fielding stats

        + '<table><tr><th>Fielder</th><th>Ct</th><th>RO</th><th>St</th></tr>'

    + '<div class="footer">Generated by The CREASE &mdash; ' + new Date().toLocaleString() + '</div>'
    + '</div></div>';

  // ===== Wrap everything into a complete HTML document =====
  var fullHtml = '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    + '<title>The CREASE - Session ' + date + '</title>'
    + '<style>'
    + '@page { size: landscape; margin: 12mm 15mm; }'
    + '* { margin: 0; padding: 0; box-sizing: border-box; }'
    + 'body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; color: #1a1a2e; background: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }'
    + '.page-break { page-break-after: always; page-break-inside: avoid; }'
    + '.page-content { padding: 10px 0; }'

    + '.logo-text { font-size: 20px; font-weight: 800; color: #E64D0F; letter-spacing: 1px; }'
    + '.header-right { font-size: 11px; color: #888; }'
    + '.pair-title { font-size: 18px; font-weight: 700; margin-bottom: 12px; }'
    + '.big-score { font-size: 26px; color: #E64D0F; }'
    + '.dim { color: #888; font-weight: 400; }'
    + '.section-title { font-size: 12px; font-weight: 700; color: #E64D0F; text-transform: uppercase; letter-spacing: 1px; margin: 14px 0 6px; border-bottom: 1px solid #ddd; padding-bottom: 3px; }'
    + 'table { width: 100%; border-collapse: collapse; margin-bottom: 10px; font-size: 11px; }'
    + 'th { background: #f5f5f5; padding: 5px 6px; text-align: left; border-bottom: 2px solid #ddd; font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: #666; }'

    + '@media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }'
    + '</style></head><body>'
    + pairPages
    + summaryPage
    + '</body></html>';
  return fullHtml;
}

/** Export a saved session as a standalone HTML download */
function exportSessionHTML(date, idx) {
  try {
    var all = JSON.parse(localStorage.getItem(STORAGE_SESSIONS) || '{}');
    var session = all[date] && all[date][idx];
    if (!session) { alert('Session not found'); return; }
    var html = generateSessionHTML(date, idx, session);
    var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'crease-session-' + date + '-' + (idx + 1) + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) { alert('Export error: ' + e.message); }
}

      bowlN2.forEach(function(n) {
        var bs = bowlStats2[n];
        var ovs = Math.floor(bs.balls/6) + '.' + (bs.balls%6);
        var econ = bs.balls > 0 ? (bs.runs / (bs.balls/6)).toFixed(2) : '-';
        lines.push(',' + esc(n) + ',' + ovs + ',' + bs.runs + ',' + bs.wkts + ',' + bs.wides + ',' + bs.noballs + ',' + (bs.dots||0) + ',' + econ);
      });
      lines.push('');
    }

    // Aggregate fielding
    var fieldStats2 = {};
    innings.forEach(function(inn) {
      (inn.history||[]).forEach(function(h) {
        if (h.type === 'wicket' && h.fielder) {
          if (!fieldStats2[h.fielder]) fieldStats2[h.fielder] = { ct:0, ro:0, st:0 };
          if (h.mode === 'Caught') fieldStats2[h.fielder].ct++;
          else if (h.mode === 'Run Out') fieldStats2[h.fielder].ro++;
          else if (h.mode === 'Stumped') fieldStats2[h.fielder].st++;
        }
      });
    });
    var fN2 = Object.keys(fieldStats2).sort();
    if (fN2.length > 0) {
      lines.push('FIELDING SUMMARY,Fielder,Ct,RO,St');
      fN2.forEach(function(n) {
        var fs = fieldStats2[n];
        lines.push(',' + esc(n) + ',' + (fs.ct||'') + ',' + (fs.ro||'') + ',' + (fs.st||''));
      });
      lines.push('');
    }

    // Totals
    var tRuns2 = innings.reduce(function(s, inn) { return s + (inn.total||0); }, 0);
    var tWkts2 = innings.reduce(function(s, inn) { return s + (inn.wkts||0); }, 0);
    lines.push('TOTAL,' + tRuns2 + '/' + tWkts2);

    // Download
    var csv = lines.join('\r\n');
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'crease-session-' + date + '-' + (idx + 1) + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) { alert('CSV export error: ' + e.message); }
}

/** Open the print-friendly version in a new tab for printing/PDF */
function printSessionView() {
  try {
    // Get current session data from the viewer
    var all = JSON.parse(localStorage.getItem(STORAGE_SESSIONS) || '{}');
    var dates = Object.keys(all).sort().reverse();
    // We need the session currently being viewed - use the URL params or last rendered
    // Fallback: look at the last session in local storage
    var session = null, date = '', idx = 0;
    for (var di = 0; di < dates.length && !session; di++) {
      var sessions = all[dates[di]];
      for (var si = 0; si < sessions.length; si++) {
        session = sessions[si];
        date = dates[di];
        idx = si;
        break;
      }
    }
    if (!session) { alert('No session data found.'); return; }
    var html = generateSessionHTML(date, idx, session);
    var win = window.open('', '_blank');
    if (!win) { alert('Pop-up blocked. Please allow pop-ups for this site.'); return; }
    win.document.write(html);
    win.document.close();
    win.focus();
    // Auto-trigger print after a short delay to let images/fonts load
    setTimeout(function() { win.print(); }, 500);
  } catch(e) { alert('Print error: ' + e.message); }
}

// ============================
// Auto-save hooks
// ============================
window.addEventListener('beforeunload', autoSaveSession);
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'hidden') autoSaveSession();
});

function extractSessionData() {
  var data = {};
  try { data.current = JSON.parse(localStorage.getItem('crease_current_session')); } catch(e) { data.current = '(raw) ' + localStorage.getItem('crease_current_session'); }
  try { data.sessions = JSON.parse(localStorage.getItem('crease_sessions')); } catch(e) { data.sessions = '(raw) ' + localStorage.getItem('crease_sessions'); }
  var json = JSON.stringify(data, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  // Try Web Share API with text first (works on file:// on Android)
  if (navigator.share) {
    navigator.share({ title: 'CREASE Session Data', text: json }).catch(function() {
      // Fallback: try with file
      try { navigator.share({ title: 'CREASE Session Data', files: [new File([blob], 'crease_session_data.json', { type: 'application/json' })] }); } catch(e2) {
        downloadJson(json);
      }
    });
  } else {
    downloadJson(json);
  }
  function downloadJson(j) {
    var url = URL.createObjectURL(new Blob([j], { type: 'application/json' }));
    var a = document.createElement('a');
    a.href = url; a.download = 'crease_session_data.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
  }
}

window.onerror = function(msg, source, line, col, err) {
  var app = document.getElementById('app');
  if (app && !app.innerHTML.includes('FATAL ERROR')) {
    app.innerHTML = logoHTML() + '<div class="card" style="text-align:center;padding:30px 20px;border:2px solid var(--red)"><h2 style="color:var(--red)">FATAL ERROR</h2><p style="font-size:12px;color:var(--red);margin:10px 0">' + (err && err.message ? err.message : msg) + '</p><p style="font-size:10px;color:var(--dim)">' + (source || '') + ':' + line + '</p>'
      + '<button class="btn btn-orange btn-block" onclick="resetApp()" style="margin-top:8px">Restart</button>'
      + '<button class="btn btn-dark btn-block" onclick="extractSessionData()" style="margin-top:6px">📦 Extract Session Data</button></div>';
  }
  console.error('Uncaught:', msg, source, line, col, err);
};

render();

document.addEventListener('keydown', function(e) {
  const inn = S().innings;
  if (!inn || inn.complete || S().view !== 'match') return;
  if (document.querySelector('.modal-overlay')) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.key >= '0' && e.key <= '6') {
    if (!canBat(inn.striker)) return;
    e.preventDefault(); scoreRuns(parseInt(e.key));
  }
  else if (e.key === 'w') { e.preventDefault(); wideBall(); }
  else if (e.key === 'n') { e.preventDefault(); noBall(); }
  else if (e.key === 'b') { e.preventDefault(); byes(); }
  else if (e.key === 'l') { e.preventDefault(); legByes(); }
  else if (e.key === 'x') { e.preventDefault(); wicket(); }
  else if (e.key === 'u' || e.key === 'z') { e.preventDefault(); undo(); }
  else if (e.key === 'f') { e.preventDefault(); toggleBonus(); }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
