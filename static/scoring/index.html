      + '<tr><th style="position:sticky;left:0;background:var(--card)">Player</th>'
      + '<th>R</th><th>B</th><th>Dots</th><th>4s</th><th>6s</th><th>3s</th><th>Bn</th><th>SR</th><th>Dismissals</th>'
      + '<th style="color:var(--dim)">|</th>'
      + '<th>O</th><th>R</th><th>W</th><th>Wd</th><th>NB</th><th>Dots</th><th>Econ</th>'
      + '<th style="color:var(--dim)">|</th>'
      + '<th>Ct</th><th>RO</th><th>St</th></tr>';

    let sessRow = 0;
    for (const name of allPlayers) {
      const rowBg = sessRow++ % 2 === 1 ? 'background:rgba(255,255,255,0.025)' : 'background:var(--card)';
      const bs = sessBat[name];
      const sr = bs.bf > 0 ? ((bs.runs / bs.bf) * 100).toFixed(0) : '-';
      const pw = bs.penaltyRuns > 0 ? ' (-' + bs.penaltyRuns + ')' : '';
      const disPen = bs.dismissals > 0 ? bs.dismissals + pw : (bs.bf > 0 ? '0' : '');
      const bw = sessBowl[name] || { balls: 0, runs: 0, wkts: 0, wides: 0, noballs: 0, dots: 0 };
      const ovs = bw.balls > 0 ? Math.floor(bw.balls / 6) + '.' + (bw.balls % 6) : '-';
      const econ = bw.balls > 0 ? (bw.runs / (bw.balls / 6)).toFixed(2) : '-';
      const fw = sessField[name] || { catches: 0, runOuts: 0, stumpings: 0 };

      sessHtml += '<tr>'
        + '<td class="name" style="position:sticky;left:0;' + rowBg + '">' + name + '</td>'
        + '<td style="font-weight:700">' + bs.runs + '</td>'
        + '<td style="color:#8b8fa3">' + bs.bf + '</td>'
        + '<td style="color:#8b8fa3">' + (bs.dotBalls || 0) + '</td>'
        + '<td>' + bs.fours + '</td>'
        + '<td>' + bs.sixes + '</td>'
        + '<td>' + (bs.threes || '') + '</td>'
        + '<td>' + (bs.bonusRuns || '') + '</td>'
        + '<td style="color:#8b8fa3">' + sr + '</td>'
        + '<td>' + disPen + '</td>'
        + '<td style="color:var(--dim)">|</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + ovs + '</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + (bw.balls ? bw.runs : '-') + '</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + (bw.balls ? bw.wkts : '-') + '</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + (bw.balls ? bw.wides : '-') + '</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + (bw.balls ? bw.noballs : '-') + '</td>'
        + '<td style="color:#8b8fa3">' + (bw.balls ? (bw.dots || 0) : '-') + '</td>'
        + '<td style="color:#8b8fa3">' + econ + '</td>'
        + '<td style="color:var(--dim)">|</td>'
        + '<td>' + (fw.catches || '') + '</td>'
        + '<td>' + (fw.runOuts || '') + '</td>'
        + '<td>' + (fw.stumpings || '') + '</td></tr>';
    }
    sessHtml += '</table></div>';
  }

  // Total extras
  let tExt = 0;
  for (const inn of innings) tExt += (inn.extras?.wides || 0) + (inn.extras?.noBalls || 0) + (inn.extras?.byes || 0) + (inn.extras?.legByes || 0) + (inn.extras?.penalty || 0);

  // Assemble full page
  document.getElementById('app').innerHTML = logoHTML()
    + '<div class="summary">'
    + '<div class="summary-card" style="text-align:center">'
    + '<h2>Session Complete</h2><div class="sub">' + s.pairs.length + ' pairs \u00b7 6 overs each</div>'
    + '<div style="display:flex;justify-content:center;gap:20px;margin:8px 0">'
    + '<div><span style="font-size:22px;font-weight:800;color:var(--orange)">' + tRuns + '</span><br><span style="font-size:10px;color:var(--dim)">Runs</span></div>'
    + '<div><span style="font-size:22px;font-weight:800;color:var(--red)">' + tWkts + '</span><br><span style="font-size:10px;color:var(--dim)">Wickets</span></div>'
    + '<div><span style="font-size:22px;font-weight:800;color:var(--dim)">' + tExt + '</span><br><span style="font-size:10px;color:var(--dim)">Extras</span></div></div></div>'
    + pairHtml
    + sessHtml
    + '<button class="btn btn-dark btn-block" onclick="goToScorecard()" style="margin-bottom:6px">Back to Scorecard</button>'
    + '<button class="btn btn-orange btn-block" onclick="saveSession()">Save Session &amp; New</button>'
    + '<button class="btn btn-dark btn-block" onclick="showConfirm(\'Discard all completed innings and start over?\', resetApp)" style="margin-top:6px">Discard &amp; New</button></div>';
}

function saveSession() {
  const s = S();
  if (s.completedInnings.length === 0) {
    if (!confirm('No innings to save. Start a new match?')) return;
    resetApp(); return;
  }
  try {
    const today = new Date().toISOString().slice(0, 10);
    let all = {};
    try { all = JSON.parse(localStorage.getItem('crease_sessions') || '{}'); } catch(e) {}
    if (!all[today]) all[today] = [];
    all[today].push({
      date: today,
      pairs: JSON.parse(JSON.stringify(s.pairs)),
      innings: JSON.parse(JSON.stringify(s.completedInnings)),
      savedAt: new Date().toISOString()
    });
    localStorage.setItem('crease_sessions', JSON.stringify(all));
    alert('Session saved!');
  } catch(e) { console.error('Save error', e); }
  resetApp();
}

function resetApp() {
  S().allPlayers = []; S().pairs = []; S().innings = null;
  S().completedInnings = []; S().view = 'setup'; S().currentPairIdx = 0;
  closeAllModals();
  render();
}

// ============================
// Session Persistence & Resume
// ============================
const STORAGE_SESSIONS = 'crease_sessions';
const STORAGE_CURRENT  = 'crease_current_session';

/** Save current progress for interruption recovery (called on unload/visibility) */
function autoSaveSession() {
  const s = S();
  if (!s.pairs || s.pairs.length === 0) return;
  const data = {
    type: 'interrupted',
    savedAt: new Date().toISOString(),
    allPlayers: s.allPlayers,
    pairs: s.pairs,
    numPairs: s.numPairs,
    currentPairIdx: s.currentPairIdx,
    completedInnings: s.completedInnings,
    modifiedRules: s.modifiedRules,
    view: s.view
  };
  if (s.innings && !s.innings.complete) {
    data.activeInnings = JSON.parse(JSON.stringify(s.innings));
  }
  try { localStorage.setItem(STORAGE_CURRENT, JSON.stringify(data)); } catch(e) {}
}

/** Check if there's an interrupted session to resume */
function getInterruptedSession() {
  try {
    const raw = localStorage.getItem(STORAGE_CURRENT);
    if (!raw) return null;
    const data = JSON.parse(raw);
    return data.type === 'interrupted' ? data : null;
  } catch(e) { return null; }
}

/** Clear the interrupted-session marker */
function clearInterruptedSession() {
  localStorage.removeItem(STORAGE_CURRENT);
}

/** Fully restore an interrupted or saved session */
function restoreSession(data) {
  const s = S();
  s.allPlayers = data.allPlayers || [];
  s.pairs = data.pairs || [];
  s.numPairs = data.numPairs || s.pairs.length;
  s.currentPairIdx = data.currentPairIdx || 0;
  s.completedInnings = data.completedInnings || [];
  s.modifiedRules = data.modifiedRules !== undefined ? data.modifiedRules : true;
  if (data.activeInnings) {
    s.innings = data.activeInnings;
    s.view = 'match';
  } else {
    s.innings = null;
    s.view = data.view && data.view !== 'match' ? data.view :
             (s.currentPairIdx >= s.pairs.length ? 'summary' : 'pairselect');
  }
  clearInterruptedSession();
  render();
}

// ============================
// Saved Sessions Browser
// ============================
function renderSavedSessions() {
  let all = {};
  try { all = JSON.parse(localStorage.getItem(STORAGE_SESSIONS) || '{}'); } catch(e) {}
  const dates = Object.keys(all).sort().reverse();

  let listHtml = '';
  if (dates.length === 0) {
    listHtml = '<div style="text-align:center;padding:20px;color:var(--dim);font-size:13px">No saved sessions yet.</div>';
  } else {
    for (const date of dates) {
      const sessions = all[date];
      listHtml += '<div class="card"><h2>' + date + '</h2>';
      sessions.forEach(function(sess, idx) {
        const innings = sess.innings || [];
        const tRuns = innings.reduce(function(sum, inn) { return sum + (inn.total || 0); }, 0);
        const tWkts = innings.reduce(function(sum, inn) { return sum + (inn.wkts || 0); }, 0);
        const nPairs = (sess.pairs || []).length;
        const time = sess.savedAt ? new Date(sess.savedAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
        listHtml += '<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">'
          + '<div style="flex:1;font-size:13px"><strong>Session ' + (idx + 1) + '</strong> \u00b7 ' + nPairs + ' pairs \u00b7 '
          + '<span style="color:var(--orange)">' + tRuns + '/' + tWkts + '</span> \u00b7 ' + time + '</div>'
          + '<button class="btn btn-sm btn-dark" onclick="viewSavedSession(\'' + date + '\',' + idx + ')">View</button>'
          + '<button class="btn btn-sm btn-dark" onclick="exportSessionHTML(\'' + date + '\',' + idx + ')">HTML</button>'
          + '<button class="btn btn-sm btn-red" onclick="deleteSession(\'' + date + '\',' + idx + ')">Del</button>'
          + '</div>';
      });
      listHtml += '</div>';
    }
  }

  document.getElementById('app').innerHTML = logoHTML()
    + '<div class="setup">'
    + '<button class="btn btn-dark btn-block" onclick="render()" style="margin-bottom:10px">\u2190 Back</button>'
    + '<div class="card"><h2>Saved Sessions</h2>' + listHtml + '</div>'
    + '</div>';
}

/** Delete a specific session */
function deleteSession(date, idx) {
  if (!confirm('Delete this saved session?')) return;
  try {
    let all = JSON.parse(localStorage.getItem(STORAGE_SESSIONS) || '{}');
    if (all[date]) {
      all[date].splice(idx, 1);
      if (all[date].length === 0) delete all[date];
      localStorage.setItem(STORAGE_SESSIONS, JSON.stringify(all));
    }
  } catch(e) {}
  renderSavedSessions();
}

/** View a saved session's full stats */
function viewSavedSession(date, idx) {
  try {
    const all = JSON.parse(localStorage.getItem(STORAGE_SESSIONS) || '{}');
    const session = all[date] && all[date][idx];
    if (!session) { alert('Session not found'); return; }
    renderSessionView(session, date, idx);
  } catch(e) { alert('Error loading session'); }
}

// ============================
// Session Viewer (rich display)
// ============================
function renderSessionView(session, date, idx) {
  // Store for print/export
  window._printingSessionData = { _date: date, _idx: idx, session: session };
  const innings = session.innings || [];
  const pairs = session.pairs || [];
  let tRuns = 0, tWkts = 0;
  let pairHtml = '';
  let allBatStats = [];

  for (const inn of innings) {
    tRuns += inn.total; tWkts += inn.wkts;
    allBatStats.push({
      b1: inn.b1, b1Name: inn.b1Name,
      b2: inn.b2, b2Name: inn.b2Name,
      pair: inn.pairNo,
      total: inn.total, wkts: inn.wkts,
      overs: inn.over + '.' + inn.legalBalls
    });

    const hist = inn.history || [];
    const extras = inn.extras || {};
    let howOut1 = [], howOut2 = [];
    let fieldStats = {}, bowlerStats = {};

    for (const h of hist) {
      if (h.bowler) {
        if (!bowlerStats[h.bowler]) bowlerStats[h.bowler] = { balls: 0, runs: 0, wkts: 0, wides: 0, noballs: 0, dots: 0 };
        if (h.type === 'wide') { bowlerStats[h.bowler].wides++; continue; }
        if (h.type === 'noball') { bowlerStats[h.bowler].noballs++; continue; }
        bowlerStats[h.bowler].balls++;
        if (h.type === 'wicket' && h.mode !== 'Run Out') bowlerStats[h.bowler].wkts++;
        const conceded = h.type === 'bye' || h.type === 'legbye' ? 0 : (h.runs > 0 ? h.runs : 0);
        if (conceded > 0) bowlerStats[h.bowler].runs += conceded;
        if ((h.type === 'run' && h.runs === 0) || h.type === 'wicket') bowlerStats[h.bowler].dots++;
      }
      if (h.type === 'wicket') {
        let hs = '';
        const penAmt = -h.runs;
        switch (h.mode) {
          case 'Bowled': hs = 'b ' + h.bowler; break;
          case 'LBW': hs = 'lbw b ' + h.bowler; break;
          case 'Hit Wicket': hs = 'hit wkt b ' + h.bowler; break;
          case 'Caught': hs = 'c ' + (h.fielder || '?') + ' b ' + h.bowler; break;
          case 'Stumped': hs = 'st ' + (h.fielder || '?') + ' b ' + h.bowler; break;
          case 'Run Out': hs = 'run out (' + (h.fielder || '?') + ')'; break;
          default: hs = h.mode;
        }
        if (penAmt > 0) hs += ' (-' + penAmt + ' pen)';
        if (h.b === 1) howOut1.push(hs); else howOut2.push(hs);
        if (h.fielder) {
          if (!fieldStats[h.fielder]) fieldStats[h.fielder] = { catches: 0, runOuts: 0, stumpings: 0 };
          if (h.mode === 'Caught') fieldStats[h.fielder].catches++;
          else if (h.mode === 'Run Out') fieldStats[h.fielder].runOuts++;
          else if (h.mode === 'Stumped') fieldStats[h.fielder].stumpings++;
        }
      }
    }

    let grossTotal = 0;
    for (const h of hist) { if (h.runs > 0) grossTotal += h.runs; }
    const penaltyTotal = grossTotal - inn.total;
    const totalExtras = (extras.byes || 0) + (extras.legByes || 0) + (extras.wides || 0) + (extras.noBalls || 0);

    let phtml = '';
    const penStr = penaltyTotal > 0 ? ', pen -' + penaltyTotal : '';
    phtml += '<div class="stat-box" style="margin-bottom:8px;padding:10px;background:var(--card);border-radius:8px;border:1px solid var(--border)">'
      + '<div style="font-weight:bold;font-size:14px;margin-bottom:2px">Pair ' + inn.pairNo + ': ' + inn.total + '/' + inn.wkts + ' (' + inn.over + '.' + inn.legalBalls + ' ov)'
      + ' <span style="color:#8b8fa3;font-size:11px">(gross ' + grossTotal + penStr + ')</span></div>';

    phtml += '<div style="font-weight:bold;font-size:11px;color:#8b8fa3;margin-top:4px">Batting</div>'
      + '<table style="width:100%;font-size:11px;border-collapse:collapse">'
      + '<tr style="color:#8b8fa3;border-bottom:1px solid var(--border)"><td style="padding:1px 4px">Batter</td>'
      + '<td style="padding:1px 4px;text-align:center">R</td><td style="padding:1px 4px;text-align:center">B</td>'
      + '<td style="padding:1px 4px;text-align:center">Dots</td><td style="padding:1px 4px;text-align:center">4s</td>'
      + '<td style="padding:1px 4px;text-align:center">6s</td><td style="padding:1px 4px;text-align:center">3s</td>'
      + '<td style="padding:1px 4px;text-align:center">Bn</td><td style="padding:1px 4px;text-align:center">SR</td>'
      + '<td style="padding:1px 4px">How Out</td></tr>';

    [inn.b1, inn.b2].forEach(function(b, i) {
      const name = i === 0 ? inn.b1Name : inn.b2Name;
      const hOut = i === 0 ? howOut1 : howOut2;
      const sr = b.bf > 0 ? ((b.runs / b.bf) * 100).toFixed(0) : '-';
      const howOut = hOut.length > 0 ? hOut.join(', ') : (b.legalBf >= S().maxBallsPerBatter ? 'retired' : 'not out');
      const bgSt = i % 2 === 1 ? 'background:rgba(255,255,255,0.02);' : '';
      phtml += '<tr style="' + bgSt + '">'
        + '<td style="padding:1px 4px"><strong>' + name + '</strong></td>'
        + '<td style="padding:1px 4px;text-align:center">' + (b.grossRuns !== undefined ? b.grossRuns : b.runs) + '</td>'
        + '<td style="padding:1px 4px;text-align:center">' + b.bf + '</td>'
        + '<td style="padding:1px 4px;text-align:center;color:#8b8fa3">' + (b.dotBalls || 0) + '</td>'
        + '<td style="padding:1px 4px;text-align:center">' + b.fours + '</td>'
        + '<td style="padding:1px 4px;text-align:center">' + b.sixes + '</td>'
        + '<td style="padding:1px 4px;text-align:center">' + (b.threes || 0) + '</td>'
        + '<td style="padding:1px 4px;text-align:center">' + (b.bonusRuns || 0) + '</td>'
        + '<td style="padding:1px 4px;text-align:center;color:#8b8fa3">' + sr + '</td>'
        + '<td style="padding:1px 4px;color:#8b8fa3;font-size:10px">' + howOut + '</td></tr>';
    });
    phtml += '</table>';

    const bowlerNames = Object.keys(bowlerStats);
    if (bowlerNames.length > 0) {
      phtml += '<div style="font-weight:bold;font-size:11px;color:#8b8fa3;margin-top:6px">Bowling</div>'
        + '<table style="width:100%;font-size:11px;border-collapse:collapse">'
        + '<tr style="color:#8b8fa3;border-bottom:1px solid var(--border)"><td style="padding:1px 4px">Bowler</td>'
        + '<td style="padding:1px 4px;text-align:center">O</td><td style="padding:1px 4px;text-align:center">R</td>'
        + '<td style="padding:1px 4px;text-align:center">W</td><td style="padding:1px 4px;text-align:center">Wd</td>'
        + '<td style="padding:1px 4px;text-align:center">NB</td><td style="padding:1px 4px;text-align:center">Dots</td></tr>';
      bowlerNames.forEach(function(name, idx) {
        const bs = bowlerStats[name];
        const ovs = Math.floor(bs.balls / 6) + '.' + (bs.balls % 6);
        const bgBowl = idx % 2 === 1 ? 'background:rgba(255,255,255,0.02);' : '';
        phtml += '<tr style="' + bgBowl + '"><td style="padding:1px 4px">' + name + '</td>'
          + '<td style="padding:1px 4px;text-align:center">' + ovs + '</td>'
          + '<td style="padding:1px 4px;text-align:center">' + (bs.runs || 0) + '</td>'
          + '<td style="padding:1px 4px;text-align:center">' + (bs.wkts || 0) + '</td>'
          + '<td style="padding:1px 4px;text-align:center">' + (bs.wides || 0) + '</td>'
          + '<td style="padding:1px 4px;text-align:center">' + (bs.noballs || 0) + '</td>'
          + '<td style="padding:1px 4px;text-align:center;color:#8b8fa3">' + (bs.dots || 0) + '</td></tr>';
      });
      phtml += '</table>';
    }

    const extParts = [];
    if (extras.byes) extParts.push('Bye ' + extras.byes);
    if (extras.legByes) extParts.push('LB ' + extras.legByes);
    if (extras.wides) extParts.push('Wd ' + extras.wides);
    if (extras.noBalls) extParts.push('NB ' + extras.noBalls);
    if (extras.penalty) extParts.push('Pen ' + extras.penalty);
    if (totalExtras > 0) {
      phtml += '<div style="font-size:11px;color:#8b8fa3;margin-top:4px">Extras: ' + totalExtras + ' (' + extParts.join(', ') + ')</div>';
    }

    const fielderNames = Object.keys(fieldStats);
    if (fielderNames.length > 0) {
      phtml += '<div style="font-size:11px;color:#8b8fa3;margin-top:2px">Fielding: ';
      const fieldParts = [];
      fielderNames.forEach(function(cname) {
        const fs = fieldStats[cname];
        const f = [];
        if (fs.catches) f.push(fs.catches + ' ct');
        if (fs.runOuts) f.push(fs.runOuts + ' ro');
        if (fs.stumpings) f.push(fs.stumpings + ' st');
        fieldParts.push(cname + ' (' + f.join(', ') + ')');
      });
      phtml += fieldParts.join(', ');
      phtml += '</div>';
    }
    phtml += '</div>';
    pairHtml += phtml;
  }

  // === Session Stats ===
  let sessBat = {};
  for (const ps of allBatStats) {
    [ps.b1, ps.b2].forEach(function(b, i) {
      const name = i === 0 ? ps.b1Name : ps.b2Name;
      if (!sessBat[name]) sessBat[name] = { runs: 0, bf: 0, fours: 0, sixes: 0, threes: 0, dotBalls: 0, bonusRuns: 0, dismissals: 0, penaltyRuns: 0, howOuts: [] };
      sessBat[name].runs += (b.grossRuns !== undefined ? b.grossRuns : b.runs);
      sessBat[name].bf += b.bf;
      sessBat[name].fours += b.fours;
      sessBat[name].sixes += b.sixes;
      sessBat[name].threes += b.threes || 0;
      sessBat[name].dotBalls += b.dotBalls || 0;
      sessBat[name].bonusRuns += b.bonusRuns || 0;
    });
  }
  let sessBowl = {}, sessField = {};
  for (const inn of innings) {
    for (const h of inn.history || []) {
      if (h.type === 'wicket') {
        const outName = h.b === 1 ? inn.b1Name : inn.b2Name;
        if (!sessBat[outName]) sessBat[outName] = { runs: 0, bf: 0, fours: 0, sixes: 0, threes: 0, dotBalls: 0, bonusRuns: 0, dismissals: 0, penaltyRuns: 0, howOuts: [] };
        sessBat[outName].dismissals++;
        sessBat[outName].penaltyRuns += -h.runs;
        let hs = '';
        switch (h.mode) {
          case 'Bowled': hs = 'b ' + h.bowler; break;
          case 'LBW': hs = 'lbw b ' + h.bowler; break;
          case 'Caught': hs = 'c ' + (h.fielder || '?') + ' b ' + h.bowler; break;
          case 'Stumped': hs = 'st ' + (h.fielder || '?') + ' b ' + h.bowler; break;
          case 'Run Out': hs = 'run out (' + (h.fielder || '?') + ')'; break;
          case 'Hit Wicket': hs = 'hit wkt b ' + h.bowler; break;
          default: hs = h.mode;
        }
        sessBat[outName].howOuts.push(hs);
      }
      if (h.bowler) {
        if (!sessBowl[h.bowler]) sessBowl[h.bowler] = { balls: 0, runs: 0, wkts: 0, wides: 0, noballs: 0, dots: 0 };
        if (h.type === 'wide') { sessBowl[h.bowler].wides++; continue; }
        if (h.type === 'noball') { sessBowl[h.bowler].noballs++; continue; }
        sessBowl[h.bowler].balls++;
        if (h.type === 'wicket' && h.mode !== 'Run Out') sessBowl[h.bowler].wkts++;
        const conceded = h.type === 'bye' || h.type === 'legbye' ? 0 : (h.runs > 0 ? h.runs : 0);
        if (conceded > 0) sessBowl[h.bowler].runs += conceded;
        if ((h.type === 'run' && h.runs === 0) || h.type === 'wicket') sessBowl[h.bowler].dots++;
      }
      if (h.type === 'wicket' && h.fielder) {
        if (!sessField[h.fielder]) sessField[h.fielder] = { catches: 0, runOuts: 0, stumpings: 0 };
        if (h.mode === 'Caught') sessField[h.fielder].catches++;
        else if (h.mode === 'Run Out') sessField[h.fielder].runOuts++;
        else if (h.mode === 'Stumped') sessField[h.fielder].stumpings++;
      }
    }
  }

  let sessHtml = '';
  const allPlayers = Object.keys(sessBat).sort();
  if (allPlayers.length > 0) {
    sessHtml += '<div class="summary-card" style="overflow-x:auto"><h2>Session Stats</h2>'
      + '<table class="summary-table" style="min-width:620px;font-size:11px">'
      + '<tr><th style="position:sticky;left:0;background:var(--card)">Player</th>'
      + '<th colspan="9" style="text-align:center;color:var(--orange)">Batting</th>'
      + '<th style="color:var(--dim)"></th>'
      + '<th colspan="7" style="text-align:center;color:var(--orange)">Bowling</th>'
      + '<th style="color:var(--dim)"></th>'
      + '<th colspan="3" style="text-align:center;color:var(--orange)">Fielding</th></tr>'
      + '<tr><th style="position:sticky;left:0;background:var(--card)">Player</th>'
      + '<th>R</th><th>B</th><th>Dots</th><th>4s</th><th>6s</th><th>3s</th><th>Bn</th><th>SR</th><th>Dismissals</th>'
      + '<th style="color:var(--dim)">|</th>'
      + '<th>O</th><th>R</th><th>W</th><th>Wd</th><th>NB</th><th>Dots</th><th>Econ</th>'
      + '<th style="color:var(--dim)">|</th>'
      + '<th>Ct</th><th>RO</th><th>St</th></tr>';

    let sessRow = 0;
    for (const name of allPlayers) {
      const rowBg = sessRow++ % 2 === 1 ? 'background:rgba(255,255,255,0.025)' : 'background:var(--card)';
      const bs = sessBat[name];
      const sr = bs.bf > 0 ? ((bs.runs / bs.bf) * 100).toFixed(0) : '-';
      const pw = bs.penaltyRuns > 0 ? ' (-' + bs.penaltyRuns + ')' : '';
      const disPen = bs.dismissals > 0 ? bs.dismissals + pw : (bs.bf > 0 ? '0' : '');
      const bw = sessBowl[name] || { balls: 0, runs: 0, wkts: 0, wides: 0, noballs: 0, dots: 0 };
      const ovs = bw.balls > 0 ? Math.floor(bw.balls / 6) + '.' + (bw.balls % 6) : '-';
      const econ = bw.balls > 0 ? (bw.runs / (bw.balls / 6)).toFixed(2) : '-';
      const fw = sessField[name] || { catches: 0, runOuts: 0, stumpings: 0 };

      sessHtml += '<tr>'
        + '<td class="name" style="position:sticky;left:0;' + rowBg + '">' + name + '</td>'
        + '<td style="font-weight:700">' + bs.runs + '</td>'
        + '<td style="color:#8b8fa3">' + bs.bf + '</td>'
        + '<td style="color:#8b8fa3">' + (bs.dotBalls || 0) + '</td>'
        + '<td>' + bs.fours + '</td>'
        + '<td>' + bs.sixes + '</td>'
        + '<td>' + (bs.threes || '') + '</td>'
        + '<td>' + (bs.bonusRuns || '') + '</td>'
        + '<td style="color:#8b8fa3">' + sr + '</td>'
        + '<td>' + disPen + '</td>'
        + '<td style="color:var(--dim)">|</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + ovs + '</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + (bw.balls ? bw.runs : '-') + '</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + (bw.balls ? bw.wkts : '-') + '</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + (bw.balls ? bw.wides : '-') + '</td>'
        + '<td style="color:' + (bw.balls ? '' : 'var(--dim)') + '">' + (bw.balls ? bw.noballs : '-') + '</td>'
        + '<td style="color:#8b8fa3">' + (bw.balls ? (bw.dots || 0) : '-') + '</td>'
        + '<td style="color:#8b8fa3">' + econ + '</td>'
        + '<td style="color:var(--dim)">|</td>'
        + '<td>' + (fw.catches || '') + '</td>'
        + '<td>' + (fw.runOuts || '') + '</td>'
        + '<td>' + (fw.stumpings || '') + '</td></tr>';
    }
    sessHtml += '</table></div>';
  }

  let tExt = 0;
  for (const inn of innings) tExt += (inn.extras?.wides || 0) + (inn.extras?.noBalls || 0) + (inn.extras?.byes || 0) + (inn.extras?.legByes || 0) + (inn.extras?.penalty || 0);

  const time = session.savedAt ? new Date(session.savedAt).toLocaleString() : '';

  document.getElementById('app').innerHTML = logoHTML()
    + '<div class="summary" id="session-print-area">'
    + '<div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap">'
    + '<button class="btn btn-sm btn-dark" onclick="renderSavedSessions()">\u2190 Sessions</button>'
    + '<button class="btn btn-sm btn-orange" onclick="exportSessionHTML(\'' + date + '\',' + idx + ')">Export HTML</button>'
    + '<button class="btn btn-sm btn-orange" onclick="printSessionView()">Print / PDF</button>'
    + '</div>'
    + '<div class="summary-card" style="text-align:center">'
    + '<h2>Session Summary</h2><div class="sub">' + pairs.length + ' pairs \u00b7 ' + date + ' \u00b7 ' + time + '</div>'
    + '<div style="display:flex;justify-content:center;gap:20px;margin:8px 0">'
    + '<div><span style="font-size:22px;font-weight:800;color:var(--orange)">' + tRuns + '</span><br><span style="font-size:10px;color:var(--dim)">Runs</span></div>'
    + '<div><span style="font-size:22px;font-weight:800;color:var(--red)">' + tWkts + '</span><br><span style="font-size:10px;color:var(--dim)">Wickets</span></div>'
    + '<div><span style="font-size:22px;font-weight:800;color:var(--dim)">' + tExt + '</span><br><span style="font-size:10px;color:var(--dim)">Extras</span></div></div></div>'
    + pairHtml
    + sessHtml
    + '</div>';
}

// ============================
// Export / Print
// ============================

/** Export a saved session as a standalone landscape HTML download with per-pair pages */
function exportSessionHTML(date, idx) {
  try {
    const all = JSON.parse(localStorage.getItem(STORAGE_SESSIONS) || '{}');
    const session = all[date] && all[date][idx];
    if (!session) { alert('Session not found'); return; }

    const html = generateLandscapeReportHTML(session, date, idx);

    // Trigger download
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'crease-session-' + date + '-' + (idx + 1) + '.html';
    a.click();
    URL.revokeObjectURL(url);
  } catch(e) { alert('Export error: ' + e.message); }
}

/** Trigger browser print dialog (user can Save as PDF) — uses landscape layout */
function printSessionView() {
  const sd = window._printingSessionData;
  if (!sd || !sd.session) { window.print(); return; }
  try {
    const html = generateLandscapeReportHTML(sd.session, sd._date || 'session', sd._idx || 0);
    const w = window.open('', '_blank', 'width=900,height=600');
    if (!w) { alert('Pop-up blocked. Please allow pop-ups for this site.'); return; }
    w.document.write(html);
    w.document.close();
    w.focus();
    setTimeout(function() { w.print(); }, 500);
  } catch(e) {
    console.error(e);
    window.print();
  }
}

function generateLandscapeReportHTML(session, date, idx) {
  // Shared function to build landscape HTML — reused by export and print
  const innings = session.innings || [];
  const pairs = session.pairs || [];

  // Aggregate session batting
  const batStats = {};
  innings.forEach(function(inn) {
    [ { name: inn.b1Name, b: inn.b1 }, { name: inn.b2Name, b: inn.b2 } ].forEach(function(item) {
      if (!batStats[item.name]) batStats[item.name] =
        { runs: 0, bf: 0, fours: 0, sixes: 0, threes: 0, dotBalls: 0, bonusRuns: 0, dismissals: 0, penaltyRuns: 0, howOuts: [] };
      const bs = batStats[item.name];
      bs.runs += (item.b.grossRuns !== undefined ? item.b.grossRuns : item.b.runs);
      bs.bf += item.b.bf;
      bs.fours += item.b.fours;
      bs.sixes += item.b.sixes;
      bs.threes += item.b.threes || 0;
      bs.dotBalls += item.b.dotBalls || 0;
      bs.bonusRuns += item.b.bonusRuns || 0;
    });
  });
  innings.forEach(function(inn) {
    (inn.history || []).forEach(function(h) {
      if (h.type === 'wicket') {
        const nm = h.b === 1 ? inn.b1Name : inn.b2Name;
        if (batStats[nm]) {
          batStats[nm].dismissals++;
          let hs = '';
          switch (h.mode) {
            case 'Bowled': hs = 'b ' + h.bowler; break;
            case 'LBW': hs = 'lbw b ' + h.bowler; break;
            case 'Caught': hs = 'c ' + (h.fielder || '?') + ' b ' + h.bowler; break;
            case 'Stumped': hs = 'st ' + (h.fielder || '?') + ' b ' + h.bowler; break;
            case 'Run Out': hs = 'run out (' + (h.fielder || '?') + ')'; break;
            case 'Hit Wicket': hs = 'hit wkt b ' + h.bowler; break;
            default: hs = h.mode;
          }
          batStats[nm].howOuts.push(hs);
        }
      }
    });
  });

  const bowlStats = {};
  innings.forEach(function(inn) {
    (inn.history || []).forEach(function(h) {
      if (!h.bowler) return;
      if (!bowlStats[h.bowler]) bowlStats[h.bowler] = { balls: 0, runs: 0, wkts: 0, wides: 0, noballs: 0, dots: 0 };
      if (h.type === 'wide') { bowlStats[h.bowler].wides++; return; }
      if (h.type === 'noball') { bowlStats[h.bowler].noballs++; return; }
      bowlStats[h.bowler].balls++;
      if (h.type === 'wicket' && h.mode !== 'Run Out') bowlStats[h.bowler].wkts++;
      const conceded = h.type === 'bye' || h.type === 'legbye' ? 0 : (h.runs > 0 ? h.runs : 0);
      if (conceded > 0) bowlStats[h.bowler].runs += conceded;
      if ((h.type === 'run' && h.runs === 0) || h.type === 'wicket') bowlStats[h.bowler].dots++;
    });
  });

  const tRuns = innings.reduce(function(s, inn) { return s + (inn.total || 0); }, 0);
  const tWkts = innings.reduce(function(s, inn) { return s + (inn.wkts || 0); }, 0);

  let batRows = '';
  Object.keys(batStats).sort().forEach(function(name) {
    const bs = batStats[name];
    const sr = bs.bf > 0 ? ((bs.runs / bs.bf) * 100).toFixed(0) : '-';
    const dis = bs.dismissals > 0 ? bs.dismissals : (bs.bf > 0 ? '0' : '');
    batRows += '<tr><td class="name">' + name + '</td><td>' + bs.runs + '</td><td>' + bs.bf + '</td>'
      + '<td>' + bs.dotBalls + '</td><td>' + bs.fours + '</td><td>' + bs.sixes + '</td><td>' + (bs.threes || '') + '</td>'
      + '<td>' + (bs.bonusRuns || '') + '</td><td>' + sr + '</td><td>' + dis + '</td></tr>';
  });

  let bowlRows = '';
  Object.keys(bowlStats).forEach(function(name) {
    const bs = bowlStats[name];
    const ovs = Math.floor((bs.balls || 0) / 6) + '.' + ((bs.balls || 0) % 6);
    const econ = bs.balls > 0 ? (bs.runs / (bs.balls / 6)).toFixed(2) : '-';
    bowlRows += '<tr><td class="name">' + name + '</td><td>' + ovs + '</td><td>' + (bs.runs || 0) + '</td>'
      + '<td>' + (bs.wkts || 0) + '</td><td>' + (bs.wides || 0) + '</td><td>' + (bs.noballs || 0) + '</td>'
      + '<td>' + (bs.dots || 0) + '</td><td>' + econ + '</td></tr>';
  });

  // Per-pair pages
  let pairPages = '';
  for (const inn of innings) {
    const hist = inn.history || [];
    const extras = inn.extras || {};
    let howOut1 = [], howOut2 = [];
    let bowlerStatsP = {}, fieldStatsP = {};
    for (const h of hist) {
      if (h.bowler) {
        if (!bowlerStatsP[h.bowler]) bowlerStatsP[h.bowler] = { balls: 0, runs: 0, wkts: 0, wides: 0, noballs: 0, dots: 0 };
        if (h.type === 'wide') { bowlerStatsP[h.bowler].wides++; continue; }
        if (h.type === 'noball') { bowlerStatsP[h.bowler].noballs++; continue; }
        bowlerStatsP[h.bowler].balls++;
        if (h.type === 'wicket' && h.mode !== 'Run Out') bowlerStatsP[h.bowler].wkts++;
        const conceded = h.type === 'bye' || h.type === 'legbye' ? 0 : (h.runs > 0 ? h.runs : 0);
        if (conceded > 0) bowlerStatsP[h.bowler].runs += conceded;
        if ((h.type === 'run' && h.runs === 0) || h.type === 'wicket') bowlerStatsP[h.bowler].dots++;
      }
      if (h.type === 'wicket') {
        let hs = '';
        const penAmt = -h.runs;
        switch (h.mode) {
          case 'Bowled': hs = 'b ' + h.bowler; break;
          case 'LBW': hs = 'lbw b ' + h.bowler; break;
          case 'Hit Wicket': hs = 'hit wkt b ' + h.bowler; break;
          case 'Caught': hs = 'c ' + (h.fielder || '?') + ' b ' + h.bowler; break;
          case 'Stumped': hs = 'st ' + (h.fielder || '?') + ' b ' + h.bowler; break;
          case 'Run Out': hs = 'run out (' + (h.fielder || '?') + ')'; break;
          default: hs = h.mode;
        }
        if (penAmt > 0) hs += ' (-' + penAmt + ' pen)';
        if (h.b === 1) howOut1.push(hs); else howOut2.push(hs);
        if (h.fielder) {
          if (!fieldStatsP[h.fielder]) fieldStatsP[h.fielder] = { catches: 0, runOuts: 0, stumpings: 0 };
          if (h.mode === 'Caught') fieldStatsP[h.fielder].catches++;
          else if (h.mode === 'Run Out') fieldStatsP[h.fielder].runOuts++;
          else if (h.mode === 'Stumped') fieldStatsP[h.fielder].stumpings++;
        }
      }
    }

    let grossTotal = 0;
    for (const h of hist) { if (h.runs > 0) grossTotal += h.runs; }
    const penaltyTotal = grossTotal - inn.total;
    const totalExtras = (extras.byes || 0) + (extras.legByes || 0) + (extras.wides || 0) + (extras.noBalls || 0) + (extras.penalty || 0);
    const penStr = penaltyTotal > 0 ? ', pen -' + penaltyTotal : '';

    let pBat = '';
    const pBatters = [
      { name: inn.b1Name, b: inn.b1, howOut: howOut1 },
      { name: inn.b2Name, b: inn.b2, howOut: howOut2 }
    ];
    for (const bd of pBatters) {
      const b = bd.b;
      const sr = b.bf > 0 ? ((b.runs / b.bf) * 100).toFixed(0) : '-';
      const howOut = bd.howOut.length > 0 ? bd.howOut.join(', ') : (b.legalBf >= 18 ? 'retired' : 'not out');
      pBat += '<tr><td class="name">' + bd.name + '</td><td>' + (b.grossRuns !== undefined ? b.grossRuns : b.runs) + '</td>'
        + '<td>' + b.bf + '</td><td>' + (b.dotBalls || 0) + '</td><td>' + b.fours + '</td><td>' + b.sixes + '</td>'
        + '<td>' + (b.threes || 0) + '</td><td>' + (b.bonusRuns || 0) + '</td><td>' + sr + '</td>'
        + '<td style="font-size:9px;color:#666">' + howOut + '</td></tr>';
    }

    let pBowl = '';
    Object.keys(bowlerStatsP).forEach(function(bnm) {
      const bs = bowlerStatsP[bnm];
      const ovs = Math.floor((bs.balls || 0) / 6) + '.' + ((bs.balls || 0) % 6);
      pBowl += '<tr><td class="name">' + bnm + '</td><td>' + ovs + '</td><td>' + (bs.runs || 0) + '</td>'
        + '<td>' + (bs.wkts || 0) + '</td><td>' + (bs.wides || 0) + '</td><td>' + (bs.noballs || 0) + '</td>'
        + '<td>' + (bs.dots || 0) + '</td></tr>';
    });

    const extPartsP = [];
    if (extras.byes) extPartsP.push('Bye ' + extras.byes);
    if (extras.legByes) extPartsP.push('LB ' + extras.legByes);
    if (extras.wides) extPartsP.push('Wd ' + extras.wides);
    if (extras.noBalls) extPartsP.push('NB ' + extras.noBalls);
    if (extras.penalty) extPartsP.push('Pen ' + extras.penalty);

    let bbb = '';
    for (const h of hist) {
      let txt = '';
      const nm = h.b === 1 ? inn.b1Name : inn.b2Name;
      if (h.type === 'wicket') txt = nm + ' ' + h.mode + (h.fielder ? ' c ' + h.fielder : '');
      else if (h.type === 'wide') txt = 'Wide' + (h.runs > 1 ? ' +' + (h.runs-1) : '');
      else if (h.type === 'noball') txt = 'NB ' + h.runs + 'r';
      else if (h.type === 'bye') txt = h.runs + ' bye' + (h.runs > 1 ? 's' : '');
      else if (h.type === 'legbye') txt = h.runs + ' leg bye' + (h.runs > 1 ? 's' : '');
    else if (h.type === 'penalty') txt = 'Penalty ' + h.runs;
      else if (h.type === 'bonus') txt = '+1 bonus ' + (h.bonusBatter || nm);
      else txt = nm + ' ' + h.runs;
      bbb += '<span class="bbb-item">' + h.over + '.' + h.ballNum + ' ' + txt + ' (' + h.runningTotal + ')</span>';
    }

    let fieldLine = '';
    const fn = Object.keys(fieldStatsP);
    if (fn.length > 0) {
      const fparts = [];
      fn.forEach(function(fnm) {
        const fs = fieldStatsP[fnm];
        const f = [];
        if (fs.catches) f.push(fs.catches + ' ct');
        if (fs.runOuts) f.push(fs.runOuts + ' ro');
        if (fs.stumpings) f.push(fs.stumpings + ' st');
        fparts.push(fnm + ' (' + f.join(', ') + ')');
      });
      fieldLine = '<p><strong>Fielding:</strong> ' + fparts.join(', ') + '</p>';
    }

    pairPages += '<div class="pair-page">'
      + '<div class="pair-header">'
      + '<div class="pair-title">Pair ' + inn.pairNo + ': ' + inn.b1Name + ' &amp; ' + inn.b2Name + '</div>'
      + '<div class="pair-score">' + inn.total + '/' + inn.wkts + ' <span class="dim">(' + inn.over + '.' + inn.legalBalls + ' ov</span>' + (penStr ? ' <span class="dim">' + penStr + '</span>' : '') + ')</div>'
      + '</div>'
      + '<h3>Batting</h3>'
      + '<table><tr><th>Batter</th><th>R</th><th>B</th><th>Dots</th><th>4s</th><th>6s</th><th>3s</th><th>Bn</th><th>SR</th><th>How Out</th></tr>'
      + pBat + '</table>'
      + (pBowl ? '<h3>Bowling</h3><table><tr><th>Bowler</th><th>O</th><th>R</th><th>W</th><th>Wd</th><th>NB</th><th>Dots</th></tr>' + pBowl + '</table>' : '')
      + (totalExtras > 0 ? '<p><strong>Extras:</strong> ' + totalExtras + ' (' + extPartsP.join(', ') + ')</p>' : '')
      + fieldLine
      + '<h3>Ball-by-Ball</h3><div class="bbb">' + (bbb || '<span class="dim">No balls recorded</span>') + '</div>'
      + '</div>';
  }

  return '<!DOCTYPE html><html><head><meta charset="UTF-8">'
    + '<title>The CREASE - Session ' + date + '</title>'
    + '<style>'
    + '@page { size: landscape; margin: 15mm; }'
    + 'body{font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:#fff;color:#1a1a2e;margin:0;padding:20px}'
    + 'h1{font-size:24px;margin-bottom:2px;color:#E55000}'
    + 'h2{font-size:18px;color:#E55000;border-bottom:2px solid #E55000;padding-bottom:4px;margin-top:0}'
    + 'h3{font-size:13px;color:#333;margin:8px 0 4px}'
    + '.sub{font-size:12px;color:#666;margin-bottom:12px}'
    + '.dim{color:#999}'
    + 'table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:11px}'
    + 'th{background:#f5f5f5;padding:4px 6px;text-align:left;border-bottom:2px solid #ddd;font-size:9px;text-transform:uppercase;color:#666}'
    + 'td{padding:3px 6px;border-bottom:1px solid #eee}'
    + '.name{font-weight:700}'
    + '.totals{display:flex;gap:24px;margin:8px 0 16px}'
    + '.totals .num{font-size:28px;font-weight:800;color:#1a1a2e}'
    + '.totals .label{font-size:10px;color:#999;display:block}'
    + '.logo{text-align:center;margin-bottom:8px}'
    + '.logo img{height:40px}'
    + '.pair-page{page-break-before:always;padding-top:10px}'
    + '.pair-page:first-of-type{page-break-before:avoid}'
    + '.pair-header{background:#fafafa;padding:10px 14px;border-radius:8px;margin-bottom:10px;border-left:4px solid #E55000}'
    + '.pair-title{font-size:16px;font-weight:700}'
    + '.pair-score{font-size:20px;font-weight:800;color:#E55000}'
    + '.bbb{font-size:10px;color:#555;line-height:1.6;display:flex;flex-wrap:wrap;gap:3px}'
    + '.bbb-item{background:#f5f5f5;padding:2px 6px;border-radius:3px;white-space:nowrap}'
    + '@media print{body{padding:0}.pair-page{page-break-before:always}}'
    + '</style></head><body>'
    + '<div class="logo"><img src="crease_logo.png" alt="The CREASE"></div>'
    + '<h1>The CREASE \u2014 Session Report</h1>'
    + '<div class="sub">' + date + ' \u00b7 ' + pairs.length + ' pairs \u00b7 ' + innings.length + ' innings \u00b7 ' + tRuns + '/' + tWkts + ' runs/wkts</div>'
    + '<div class="totals"><div><span class="num">' + tRuns + '</span><span class="label">Total Runs</span></div>'
    + '<div><span class="num">' + tWkts + '</span><span class="label">Wickets</span></div>'
    + '<div><span class="num">' + pairs.length + '</span><span class="label">Pairs</span></div></div>'
    + '<h2>Session Batting</h2>'
    + '<table><tr><th>Batter</th><th>R</th><th>B</th><th>Dots</th><th>4s</th><th>6s</th><th>3s</th><th>Bn</th><th>SR</th><th>Dismissals</th></tr>'
    + batRows + '</table>'
    + (bowlRows ? '<h2>Session Bowling</h2><table><tr><th>Bowler</th><th>O</th><th>R</th><th>W</th><th>Wd</th><th>NB</th><th>Dots</th><th>Econ</th></tr>' + bowlRows + '</table>' : '')
    + pairPages
    + '<div style="text-align:center;font-size:10px;color:#999;margin-top:20px;page-break-before:avoid">Generated by The CREASE \u2014 ' + new Date().toLocaleString() + '</div>'
    + '</body></html>';
}

// Auto-save hooks

window.addEventListener('beforeunload', autoSaveSession);
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'hidden') autoSaveSession();
});

window.onerror = function(msg, source, line, col, err) {
  var app = document.getElementById('app');
  if (app && !app.innerHTML.includes('FATAL ERROR')) {
    app.innerHTML = logoHTML() + '<div class="card" style="text-align:center;padding:30px 20px;border:2px solid var(--red)"><h2 style="color:var(--red)">FATAL ERROR</h2><p style="font-size:12px;color:var(--red);margin:10px 0">' + (err && err.message ? err.message : msg) + '</p><p style="font-size:10px;color:var(--dim)">' + (source || '') + ':' + line + '</p><button class="btn btn-orange btn-block" onclick="resetApp()">Restart</button></div>';
  }
  console.error('Uncaught:', msg, source, line, col, err);
};

render();

document.addEventListener('keydown', function(e) {
  const inn = S().innings;
  if (!inn || inn.complete || S().view !== 'match') return;
  if (document.querySelector('.modal-overlay')) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.key >= '0' && e.key <= '6') {
    if (!canBat(inn.striker)) return;
    e.preventDefault(); scoreRuns(parseInt(e.key));
  }
  else if (e.key === 'w') { e.preventDefault(); wideBall(); }
  else if (e.key === 'n') { e.preventDefault(); noBall(); }
  else if (e.key === 'b') { e.preventDefault(); byes(); }
  else if (e.key === 'l') { e.preventDefault(); legByes(); }
  else if (e.key === 'x') { e.preventDefault(); wicket(); }
  else if (e.key === 'u' || e.key === 'z') { e.preventDefault(); undo(); }
  else if (e.key === 'f') { e.preventDefault(); toggleBonus(); }
});

</script>
</body>
