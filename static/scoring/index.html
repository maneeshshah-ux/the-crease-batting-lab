<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-256.png">
<link rel="icon" type="image/png" sizes="256x256" href="icon-256.png">
<title>The CREASE — Match Scoring</title>
<style>
:root {
  --orange: #E64D0F; --orange-h: #e55a2b; --orange-glow: #ff8c5a;
  --bg: #0d1117; --card: #161b24; --card2: #1c2333; --border: #2d3548;
  --text: #e6e8ed; --dim: #8b8fa3; --green: #238636; --red: #da3633;
  --blue: #1f6feb; --purple: #8957e5; --amber: #d29922; --teal: #1ea885;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
.container { max-width: 800px; margin: 0 auto; padding: 12px; }
.logo { text-align: center; padding: 12px 0 6px; }
.logo img { height: 44px; }
.setup { max-width: 520px; margin: 0 auto; padding-top: 4px; }
.card { background: var(--card); border-radius: 16px; padding: 18px; margin-bottom: 10px; border: 1px solid var(--border); }
.card h2 { font-size: 13px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
.card label { display: block; font-size: 12px; color: var(--dim); margin-bottom: 3px; }
.card input, .card select, .card textarea { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; margin-bottom: 6px; }
.card textarea { resize: vertical; min-height: 80px; font-family: inherit; }
.card input:focus, .card select:focus, .card textarea:focus { outline: none; border-color: var(--orange); }
.card .hint { font-size: 11px; color: var(--dim); margin-top: -4px; margin-bottom: 6px; }
.pair-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; align-items: end; }
.pair-row .pair-label { font-size: 11px; color: var(--orange); font-weight: 700; margin-bottom: 4px; grid-column: 1 / -1; }
.btn { display: inline-flex; align-items: center; justify-content: center; padding: 11px 18px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.12s; user-select: none; -webkit-tap-highlight-color: transparent; gap: 4px; }
.btn:active { transform: scale(0.95); }
.btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }
.btn-orange { background: var(--orange); color: #fff; }
.btn-orange:hover:not(:disabled) { background: var(--orange-h); }
.btn-dark { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
.btn-dark:hover:not(:disabled) { background: var(--border); }
.btn-red { background: var(--red); color: #fff; }
.btn-sm { padding: 7px 12px; font-size: 12px; border-radius: 8px; }
.btn-block { width: 100%; }
.btn-green { background: var(--green); color: #fff; }
.match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
.match-header .info { font-size: 12px; color: var(--dim); }
.match-header .info strong { color: var(--orange); }
.bowler-select { display: flex; align-items: center; gap: 6px; }
.bowler-select label { font-size: 11px; color: var(--dim); white-space: nowrap; }
.bowler-select select { padding: 6px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card2); color: var(--text); font-size: 13px; }
.new-over-badge { font-size: 9px; padding: 2px 8px; border-radius: 10px; background: #76ff03; color: #000; font-weight: 700; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.scoreboard { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; margin-bottom: 8px; }
.bat-card { background: var(--card); border-radius: 14px; padding: 10px; text-align: center; border: 2px solid transparent; transition: all 0.25s; }
.bat-card.striker { border-color: var(--orange); background: linear-gradient(135deg, var(--card) 0%, #1f1a30 100%); }
.bat-card .name { font-size: 14px; font-weight: 700; margin-bottom: 1px; }
.bat-card .runs { font-size: 26px; font-weight: 800; color: var(--orange); line-height: 1.1; }
.bat-card .stat { font-size: 11px; color: var(--dim); display: flex; justify-content: center; gap: 8px; margin-top: 1px; }
.bat-card .stat span { color: var(--text); }
.bat-card .dismissal-info { font-size: 10px; color: var(--red); margin-top: 2px; }
.bat-card .retired { font-size: 9px; color: var(--amber); margin-top: 2px; font-weight: 600; }
.match-bar { background: var(--card); border-radius: 14px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; border: 1px solid var(--border); }
.match-bar .score { font-size: 22px; font-weight: 800; color: var(--orange); }
.match-bar .score small { font-size: 13px; color: var(--dim); font-weight: 400; }
.match-bar .meta { text-align: right; font-size: 12px; color: var(--dim); }
.match-bar .meta strong { color: var(--text); font-size: 15px; }
.match-bar .meta .fh { color: #76ff03; font-weight: 700; font-size: 11px; }
.over-tracker { display: flex; gap: 4px; margin-bottom: 8px; justify-content: center; flex-wrap: wrap; }
.ball-dot { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
.ball-dot.empty { background: var(--card2); color: #444; border: 1px solid var(--border); }
.ball-dot.runs { background: var(--green); }
.ball-dot.wicket { background: var(--red); }
.ball-dot.wide { background: #e65100; }
.ball-dot.noball { background: var(--purple); }
.ball-dot.byes { background: var(--blue); }
.ball-dot.legbyes { background: var(--teal); }
.controls { background: var(--card); border-radius: 14px; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
.controls .sec-label { font-size: 10px; color: var(--dim); margin-bottom: 5px; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 1px; }
.controls .sec-label .badge { font-size: 8px; padding: 2px 7px; border-radius: 10px; font-weight: 700; letter-spacing: 0; }
.badge-fh { background: #76ff03; color: #000; }
.badge-bonus { background: var(--orange); color: #fff; }
.run-btns { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px; }
.run-btns .btn { padding: 12px 0; font-size: 18px; font-weight: 800; border-radius: 10px; }
.run-btns .r0 { background: #2d3548; color: #666; }
.run-btns .r1 { background: #1b5e20; }
.run-btns .r2 { background: #238636; }
.run-btns .r3 { background: #d29922; }
.run-btns .r4 { background: #1f6feb; }
.run-btns .r5 { background: #8957e5; }
.run-btns .r6 { background: #6a1b9a; }
.run-btns .btn.retired-btn { opacity: 0.25; cursor: not-allowed; }
.extras-btns { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 8px; }
.extras-btns .btn { padding: 9px 0; font-size: 12px; font-weight: 700; border-radius: 8px; }
.action-btns { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
.action-btns .btn { padding: 9px 0; font-size: 11px; border-radius: 8px; font-weight: 700; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
.modal { background: var(--card); border-radius: 18px; padding: 22px; max-width: 400px; width: 100%; border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 15px; margin-bottom: 14px; color: var(--orange); }
.modal .field { margin-bottom: 12px; }
.modal .field label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 3px; }
.modal .field select, .modal .field input { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; color-scheme: dark; }
.modal .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.modal .mode-grid .btn { padding: 9px; font-size: 11px; border: 2px solid transparent; background: var(--card2); color: var(--text); }
.modal .mode-grid .btn.selected { border-color: var(--orange); background: var(--orange); color: #fff; }
.modal .modal-actions { display: flex; gap: 8px; margin-top: 14px; }
.modal .modal-actions .btn { flex: 1; }
.modal .pick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.modal .pick-grid .btn { padding: 14px 0; font-size: 18px; font-weight: 800; border-radius: 10px; }
.history { background: var(--card); border-radius: 14px; padding: 10px; max-height: 180px; overflow-y: auto; border: 1px solid var(--border); }
.history .hdr { font-size: 10px; color: var(--dim); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
.hist-item { display: flex; justify-content: space-between; padding: 2px 0; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.03); gap: 6px; }
.hist-item .ball { color: var(--dim); min-width: 44px; flex-shrink: 0; }
.hist-item .evt { flex: 1; }
.hist-item .evt.wide { color: #ff8a65; }
.hist-item .evt.nb { color: #ce93d8; }
.hist-item .evt.bye { color: #64b5f6; }
.hist-item .evt.wkt { color: var(--red); }
.hist-item .evt.bonus { color: var(--orange); }
.hist-item .total { color: var(--orange); font-weight: 600; font-size: 11px; }
.summary { max-width: 600px; margin: 0 auto; }
.summary-card { background: var(--card); border-radius: 16px; padding: 18px; margin-bottom: 10px; border: 1px solid var(--border); }
.summary-card h2 { font-size: 16px; color: var(--orange); margin-bottom: 3px; }
.summary-card .sub { font-size: 11px; color: var(--dim); margin-bottom: 10px; }
.summary-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.summary-table th { text-align: left; font-size: 9px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; padding: 3px 5px; border-bottom: 1px solid var(--border); }
.summary-table td { padding: 4px 5px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.summary-table .name { font-weight: 600; }
.summary-table .total { font-weight: 700; color: var(--orange); }
.stat-box { line-height: 1.6; }
.stat-box strong { color: var(--orange); }
.stat-box table td { padding: 3px 5px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.stat-box table th { font-size: 10px; color: var(--dim); padding: 2px 5px; border-bottom: 1px solid var(--border); }
.summary-table tr:nth-child(even) td,
.stat-box table tr:nth-child(even) td { background: rgba(255,255,255,0.025); }
.scorecard-view { max-width: 700px; margin: 0 auto; }
.scorecard-view .sc-header { text-align: center; margin-bottom: 12px; }
.scorecard-view .sc-header h2 { font-size: 18px; color: var(--orange); }
.scorecard-view .sc-header p { font-size: 11px; color: var(--dim); }
.sc-tabs { display: flex; gap: 4px; margin-bottom: 10px; }
.sc-tabs .btn { flex: 1; font-size: 11px; padding: 8px; }
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
.toggle-row label { font-size: 13px; color: var(--text); }
.toggle { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle .slider { position: absolute; cursor: pointer; inset: 0; background: var(--border); border-radius: 24px; transition: 0.2s; }
.toggle .slider::before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
.toggle input:checked + .slider { background: var(--orange); }
.toggle input:checked + .slider::before { transform: translateX(20px); }
@media (max-width: 500px) {
  .container { padding: 6px; }
  .scoreboard { gap: 5px; }
  .bat-card .runs { font-size: 22px; }
  .run-btns .btn { font-size: 16px; padding: 11px 0; }
  .logo img { height: 34px; }
  .ball-dot { width: 30px; height: 30px; font-size: 11px; }
  .extras-btns .btn, .action-btns .btn { padding: 11px 0; font-size: 12px; }
  .modal .mode-grid .btn { padding: 12px 8px; font-size: 12px; }
  .bowler-select select { padding: 8px 10px; font-size: 14px; }
  .history { max-height: 130px; }
}
@media (max-width: 400px) {
  .run-btns { gap: 3px; }
  .run-btns .btn { font-size: 14px; padding: 10px 0; }
  .scoreboard { grid-template-columns: 1fr; text-align: center; }
  .scoreboard .match-bar { order: -1; }
  .match-header { flex-direction: column; align-items: stretch; text-align: center; }
  .bowler-select { justify-content: center; }
  .ball-dot { width: 26px; height: 26px; font-size: 10px; }
  .modal { padding: 16px; }
  .modal .mode-grid { grid-template-columns: 1fr 1fr; gap: 4px; }
  .extras-btns { grid-template-columns: repeat(2, 1fr); }
  .action-btns { grid-template-columns: repeat(3, 1fr); }
  .pair-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>

const state = {
  allPlayers: [],
  pairs: [],
  numPairs: 2,
  innings: null,
  completedInnings: [],
  view: 'setup',
  currentPairIdx: 0,
  modifiedRules: true
};
const S = () => state;

function striker() { const i = S().innings; return i ? (i.striker === 1 ? i.b1 : i.b2) : null; }
function oversDisplay(i) { return i ? i.over + '.' + (i.legalBalls + 1) : '0.0'; }
function mb() { return { runs: 0, grossRuns: 0, bf: 0, legalBf: 0, dotBalls: 0, dismissals: 0, fours: 0, sixes: 0, threes: 0, bonusRuns: 0, howOut: null, fielder: null, bowlerOut: null }; }

function readPlayersFromInput() {
  const el = document.getElementById('playerInput');
  if (!el) return;
  const names = el.value.split('\n').map(s => s.trim()).filter(Boolean);
  if (names.length > 0) S().allPlayers = names;
}

function makeInnings(pairIdx) {
  const p = S().pairs[pairIdx];
  if (!p) return null;
  const b1IsRunner = (p.b1 || '').indexOf('(runner)') !== -1;
  const b2IsRunner = (p.b2 || '').indexOf('(runner)') !== -1;
  // If one batter is a runner, the non-runner starts on strike
  const startStriker = b1IsRunner ? 2 : (b2IsRunner ? 1 : 1);
  return {
    pairIdx, pairNo: pairIdx + 1,
    b1: mb(), b2: mb(),
    b1Name: p.b1, b2Name: p.b2,
    striker: startStriker, total: 0, wkts: 0,
    runner: b1IsRunner ? 1 : (b2IsRunner ? 2 : 0),
    extras: { wides: 0, noBalls: 0, byes: 0, legByes: 0 },
    over: 0, legalBalls: 0, totalBalls: 0,
    freeHit: false, bonusActive: false,
    currentBowler: S().allPlayers[0] || '',
    prevBowler: '',
    complete: false, maxOvers: 6,
    history: []
  };
}

function cloneInnings() {
  const inn = S().innings;
  if (!inn) return null;
  const u = inn._undo;
  delete inn._undo;
  const c = JSON.parse(JSON.stringify(inn));
  inn._undo = u;
  c._undo = [];
  return c;
}
function restoreInnings(snap) { if (!snap) return; const inn = S().innings; if (!inn) return; Object.assign(inn, snap); }

function pushUndo() {
  const inn = S().innings;
  if (!inn) return;
  if (!inn._undo) inn._undo = [];
  inn._undo.push(cloneInnings());
  if (inn._undo.length > 50) inn._undo.shift();
}

function canBat(num) {
  const inn = S().innings;
  if (!inn) return false;
  const b = num === 1 ? inn.b1 : inn.b2;
  if (S().modifiedRules) return b.legalBf < 18;
  return !b.howOut && b.legalBf < 18;
}

function closeAllModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.remove());
}

// RENDER
function render() {
  const v = S().view;
  try {
    if (v === 'setup') return renderSetup();
    if (v === 'summary') return renderSummary();
    if (v === 'scorecard') return renderScorecard();
    renderMatch();
  } catch (e) {
    console.error(e);
    document.getElementById('app').innerHTML = logoHTML() + '<div class="card" style="text-align:center;padding:30px 20px"><h2>Error</h2><p style="color:var(--red);margin:12px 0">' + e.message + '</p><button class="btn btn-orange" onclick="resetApp()">Restart</button></div>';
  }
}

function logoHTML(small) {
  return '<div class="logo"><img src="crease_logo.png" alt="The CREASE"' + (small ? ' style="height:34px"' : '') + '></div>';
}

function renderSetup() {
  const s = S();
  const players = s.allPlayers || [];
  const tags = players.map((p, i) =>
    '<span style="display:inline-flex;align-items:center;gap:4px;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px">' + p + '<span onclick="removePlayer(' + i + ')" style="cursor:pointer;color:var(--red);font-size:14px;line-height:1;padding:0 2px">\u2715</span></span>'
  ).join('');

  let pc = '';
  for (let i = 0; i < s.numPairs; i++) {
    const p = s.pairs[i] || { b1: '', b2: '' };
    const o1 = players.map(n => '<option value="' + n + '"' + (n === p.b1 ? ' selected' : '') + '>' + n + '</option>').join('');
    const o2 = players.map(n => '<option value="' + n + '"' + (n === p.b2 ? ' selected' : '') + '>' + n + '</option>').join('');
    pc += '<div class="pair-row"><div class="pair-label">Pair ' + (i + 1) + '</div>'
      + '<select onchange="setPair(' + i + ',1,this.value)"><option value="">Select batter</option>' + o1 + '</select>'
      + '<select onchange="setPair(' + i + ',2,this.value)"><option value="">Select batter</option>' + o2 + '</select></div>';
  }

  // Check for interrupted session to show resume prompt (only if match was in progress)
  const interrupted = getInterruptedSession();
  const hasMatchData = interrupted && (interrupted.activeInnings || (interrupted.completedInnings && interrupted.completedInnings.length > 0));
  // Silently clear setup-only saves (just players/pairs, no match) so they don't linger
  if (interrupted && !hasMatchData) clearInterruptedSession();
  const resumeHtml = hasMatchData
    ? '<div class="card" style="border:2px solid var(--orange);text-align:center;padding:14px">'
      + '<h2 style="color:var(--orange);margin-bottom:6px">\u26a0 Resume Session</h2>'
      + '<p style="font-size:12px;color:var(--dim);margin-bottom:10px">You have an unfinished session from '
      + (interrupted.savedAt ? new Date(interrupted.savedAt).toLocaleString() : 'earlier')
      + '</p>'
      + '<div style="display:flex;gap:8px;justify-content:center">'
      + '<button class="btn btn-orange" onclick="restoreSession(getInterruptedSession())" style="flex:1">Resume Session</button>'
      + '<button class="btn btn-dark" onclick="clearInterruptedSession();render()" style="flex:1">Discard</button>'
      + '</div></div>'
    : '';

  document.getElementById('app').innerHTML = logoHTML()
    + '<div class="setup">'
    + resumeHtml
    + '<div class="card" style="display:flex;gap:8px;justify-content:center;padding:12px">'
    + '<button class="btn btn-sm btn-dark" onclick="renderSavedSessions()" style="flex:1">&#x1f4c2; Saved Sessions</button>'
    + '</div>'
    + '<div class="card"><h2>Players</h2><textarea id="playerInput" placeholder="Enter player names, one per line">' + players.join('\n') + '</textarea>'
    + '<button class="btn btn-sm btn-dark" onclick="loadPlayers()">Update Players</button>'
    + (tags ? '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">' + tags + '</div>' : '<div style="font-size:11px;color:var(--dim);margin-top:4px">Enter names above and click Update Players</div>')
    + '</div>'
    + '<div class="card"><h2>Batting Pairs</h2><label>Number of pairs</label>'
    + '<select id="numPairs" onchange="changeNumPairs()">'
    + [1,2,3,4,5,6,7,8].map(n => '<option value="' + n + '"' + (n === s.numPairs ? ' selected' : '') + '>' + n + ' pair' + (n > 1 ? 's' : '') + '</option>').join('')
    + '</select><div id="pairConfig">' + pc + '</div>'
    + '<button class="btn btn-sm btn-dark" onclick="autoAssignPairs()" style="margin-top:4px">Auto-assign Pairs</button></div>'
    + '<div class="card"><h2>Rules</h2>'
    + '<div class="toggle-row"><label>Modified rules (3\u21924 runs, bonus run, wicket penalty)</label>'
    + '<label class="toggle"><input type="checkbox" id="rulesToggle"' + (s.modifiedRules ? ' checked' : '') + ' onchange="S().modifiedRules=this.checked"><span class="slider"></span></label></div>'
    + '<div style="font-size:10px;color:var(--dim);line-height:1.5;margin-top:6px"><strong>Modified:</strong> 3 runs scored as 4 \u00b7 +1 bonus run toggle \u00b7 wicket penalty -5 (ov 1-4) / -2 (ov 5-6) \u00b7 pair bats all 6 overs regardless of wickets</div></div>'
    + '<button class="btn btn-orange btn-block" onclick="startMatch()">Start Match \u2192</button>'
    + '<div style="font-size:11px;color:var(--dim);text-align:center;margin-top:6px">6 overs per pair \u00b7 18 balls max per batter</div></div>';
}

function loadPlayers() { readPlayersFromInput(); autoAssignPairs(); }

function removePlayer(i) {
  S().allPlayers.splice(i, 1);
  for (const p of S().pairs) { if (!S().allPlayers.includes(p.b1)) p.b1 = ''; if (!S().allPlayers.includes(p.b2)) p.b2 = ''; }
  render();
}

function changeNumPairs() {
  const n = parseInt(document.getElementById('numPairs').value);
  S().numPairs = n;
  while (S().pairs.length < n) S().pairs.push({ b1: '', b2: '' });
  while (S().pairs.length > n) S().pairs.pop();
  render();
}

function setPair(idx, slot, val) {
  if (!S().pairs[idx]) S().pairs[idx] = { b1: '', b2: '' };
  if (slot === 1) S().pairs[idx].b1 = val; else S().pairs[idx].b2 = val;
}

function autoAssignPairs() {
  readPlayersFromInput();
  const pl = S().allPlayers || [];
  if (pl.length === 0) { alert('Enter player names first'); return; }
  const pairs = [];
  for (let i = 0; i < pl.length; i += 2) {
    if (i + 1 < pl.length) pairs.push({ b1: pl[i], b2: pl[i + 1] });
    else pairs.push({ b1: pl[i], b2: pl[i] + ' (runner)' });
  }
  S().numPairs = pairs.length;
  S().pairs = pairs;
  render();
}

function startMatch() {
  readPlayersFromInput();
  const pl = S().allPlayers || [];
  if (pl.length < 2) { alert('Enter at least 2 players'); return; }
  for (const p of S().pairs) { if (!p.b1 || !p.b2) { alert('All pairs need 2 batters selected'); return; } }
  S().completedInnings = [];
  S().currentPairIdx = 0;
  S().view = 'pairselect';
  saveOnAction();  // save immediately so match start is persisted
  render();
}

function renderPairSelect() {
  const s = S();
  const completedNos = new Set(s.completedInnings.map(function(i) { return i.pairNo; }));
  // Build a list of pairs that haven't completed yet
  var availPairs = [];
  for (var pp = 0; pp < s.pairs.length; pp++) {
    if (!completedNos.has(pp + 1)) availPairs.push(pp);
  }
  if (availPairs.length === 0) { s.view = 'summary'; render(); return; }

  var html = logoHTML(true) + '<div class="card" style="text-align:center;padding:20px 20px">'
    + '<h2>Select Next Pair</h2>'
    + '<div style="font-size:12px;color:var(--dim);margin-bottom:12px">' + s.completedInnings.length + ' completed, ' + availPairs.length + ' remaining</div>';

  availPairs.forEach(function(pi) {
    const pair = s.pairs[pi];
    var prevScore = '';
    var innDone = s.completedInnings.find(function(i) { return i.pairNo === pi + 1; });
    if (innDone) {
      prevScore = ' <span style="color:var(--dim);font-size:11px">(batted: ' + innDone.total + '/' + innDone.wkts + ')</span>';
    }
    const bowlerOpts = s.allPlayers.filter(function(n) { return n !== pair.b1 && n !== pair.b2; }).map(function(n) { return '<option value="' + n + '">' + n + '</option>'; }).join('');
    html += '<div style="border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;background:var(--card2)">'
      + '<div style="font-weight:700;font-size:15px;margin-bottom:6px">Pair ' + (pi + 1) + ': ' + pair.b1 + ' &amp; ' + pair.b2 + prevScore + '</div>'
      + '<div style="display:flex;gap:8px;align-items:center;justify-content:center">'
      + '<select id="bowler_' + pi + '" style="flex:1;padding:8px 10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;color-scheme:dark">'
      + '<option value="">Select bowler...</option>' + bowlerOpts + '</select>'
      + '<button class="btn btn-orange" onclick="beginInnings(' + pi + ')" style="white-space:nowrap">\u25b6 Start</button></div></div>';
  });

  html += '<button class="btn btn-dark btn-block" onclick="S().view=\'summary\';render()" style="margin-top:4px">End Session</button></div>';
  document.getElementById('app').innerHTML = html;
}

function beginInnings(pairIdx) {
  const sel = document.getElementById('bowler_' + pairIdx);
  if (!sel || !sel.value) { alert('Select a bowler first'); return; }
  S().currentPairIdx = pairIdx;
  const inn = makeInnings(pairIdx);
  if (!inn) { alert('Error creating innings. Please restart.'); return; }
  inn.currentBowler = sel.value;
  S().innings = inn;
  S().view = 'match';
  closeAllModals();
  render();
}
function renderMatch() {
  const inn = S().innings;
  if (!inn) return;

  const card = (b, num) => {
    const nn = num === 1 ? inn.b1Name : inn.b2Name;
    const isStriker = inn.striker === num;
    const isRetired = b.legalBf >= 18 && !b.howOut;
    return '<div class="bat-card' + (isStriker ? ' striker' : '') + '">'
      + '<div class="name">' + nn + (isStriker ? ' \u2726' : '') + '</div>'
      + '<div class="runs">' + (b.grossRuns !== undefined ? b.grossRuns : b.runs) + '</div>'
      + '<div class="stat"><span>' + b.bf + ' b</span><span>' + b.dotBalls + ' dots</span><span>' + b.fours + ' 4s</span><span>' + b.sixes + ' 6s</span></div>'
      + (b.howOut ? '<div class="dismissal-info">' + b.howOut + '</div>' : '')
      + (isRetired ? '<div class="retired">RETIRED</div>' : '')
      + '</div>';
  };

  // Ball-by-ball display for the current over (shows ALL deliveries: legal + extras)
  const overEvents = inn.history.filter(function(h) { return h.over === inn.over; });
  const dots = overEvents.map(function(ev) {
    var cls = 'runs', lbl = ev.runs;
    if (ev.type === 'wicket') { cls = 'wicket'; lbl = 'W'; }
    else if (ev.type === 'wide') { cls = 'wide'; lbl = 'Wd' + (ev.runs > 1 ? ev.runs : ''); }
    else if (ev.type === 'noball') { cls = 'noball'; lbl = 'NB' + (ev.runs > 1 ? ev.runs : ''); }
    else if (ev.type === 'bye') { cls = 'byes'; lbl = ev.runs + 'b'; }
    else if (ev.type === 'legbye') { cls = 'legbyes'; lbl = ev.runs + 'lb'; }
    else if (ev.type === 'penalty') { cls = 'noball'; lbl = ev.runs > 0 ? '+' + ev.runs : String(ev.runs); }
    return '<div class="ball-dot ' + cls + '">' + lbl + '</div>';
  });
  // Pad with empty dots up to 6 legal balls so the layout stays stable
  var legalCount = overEvents.filter(function(h) { return h.type !== 'wide' && h.type !== 'noball'; }).length;
  for (var pi = legalCount; pi < 6; pi++) {
    dots.push('<div class="ball-dot empty">-</div>');
  }

  const ext = inn.extras;
  const extTotal = ext.wides + ext.noBalls + ext.byes + ext.legByes;
  const isNewOver = inn.legalBalls === 0 && inn.totalBalls > 0;

  const hist = [...inn.history].reverse().slice(0, 30).map(h => {
    let txt = '', cls = '';
    const nm = h.b === 1 ? inn.b1Name : inn.b2Name;
    if (h.type === 'wicket') { txt = nm + ' ' + h.mode + (h.fielder ? ' c ' + h.fielder : ''); cls = 'wkt'; }
    else if (h.type === 'wide') { txt = 'Wide' + (h.runs > 1 ? ' +' + (h.runs-1) : ''); cls = 'wide'; }
    else if (h.type === 'noball') { txt = 'NB ' + h.runs + 'r \u2726FH'; cls = 'nb'; }
    else if (h.type === 'bye') { txt = h.runs + ' bye' + (h.runs > 1 ? 's' : ''); cls = 'bye'; }
    else if (h.type === 'legbye') { txt = h.runs + ' leg bye' + (h.runs > 1 ? 's' : ''); cls = 'bye'; }
    else if (h.type === 'penalty') { txt = 'Pen ' + (h.runs > 0 ? '+' : '') + h.runs; cls = 'nb'; }
    else { txt = nm + ' ' + h.runs + (h.bonus ? '+1' : ''); if (h.bonus) cls = 'bonus'; }
    return '<div class="hist-item"><span class="ball">' + h.over + '.' + h.ballNum + '</span><span class="evt ' + cls + '">' + txt + '</span><span class="total">' + h.runningTotal + '</span></div>';
  }).join('');

  const excludes = [inn.b1Name, inn.b2Name];
  const bowlerOpts = S().allPlayers.filter(n => !excludes.includes(n)).map(n =>
    '<option value="' + n + '"' + (n === inn.currentBowler ? ' selected' : '') + '>' + n + '</option>'
  ).join('');

  const strikerCanBat = canBat(inn.striker);

  document.getElementById('app').innerHTML = logoHTML(true)
    + '<div style="display:flex;gap:4px;margin-bottom:8px">'
    + '<button class="btn btn-sm btn-dark" onclick="S().view=\'match\';closeAllModals();render()" style="flex:1' + (S().view === 'match' ? ';border-color:var(--orange)' : '') + '">Scoring</button>'
    + '<button class="btn btn-sm btn-dark" onclick="showScorecard()" style="flex:1">Scorecard</button>'
    + '<button class="btn btn-sm btn-dark" onclick="showSessionSummary()" style="flex:1">Session</button></div>'
    + '<div class="match-header">'
    + '<div class="info"><strong>Pair ' + inn.pairNo + '/' + S().pairs.length + '</strong> \u00b7 ' + inn.b1Name + ' &amp; ' + inn.b2Name + '</div>'
    + '<div class="bowler-select"><label>Bowler</label><select onchange="S().innings.currentBowler=this.value">' + bowlerOpts + '</select>'
    + (isNewOver ? '<span class="new-over-badge">NEW OVER</span>' : '') + '</div></div>'
    + '<div class="match-bar"><div>'
    + '<div class="score">' + inn.total + '/' + inn.wkts + (extTotal > 0 ? ' <small>ext ' + extTotal + '</small>' : '') + '</div>'
    + '<div style="font-size:10px;color:var(--dim)">' + inn.b1Name + ': ' + inn.b1.runs + ' &nbsp; ' + inn.b2Name + ': ' + inn.b2.runs + '</div></div>'
    + '<div class="meta"><div><strong>' + oversDisplay(inn) + '</strong></div>'
    + '<div>Over ' + (inn.over + 1) + '/' + inn.maxOvers + '</div>'
    + (inn.freeHit ? '<div class="fh">\u2726 FREE HIT</div>' : '') + '</div></div>'
    + '<div class="scoreboard">' + card(inn.b1, 1) + '<div style="display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--dim)">vs</div>' + card(inn.b2, 2) + '</div>'
    + (inn.complete
      ? inningsCompleteHtml(inn)
        + '<button class="btn btn-orange btn-block" onclick="nextPair()" style="margin-top:10px;margin-bottom:10px">' + (S().currentPairIdx + 1 < S().pairs.length ? 'Next Pair \u2192' : 'View Match Summary') + '</button>'
      : '<div class="over-tracker">' + dots.join('') + '</div>'
      + '<div class="controls">'
      + '<div class="sec-label">Runs' + (inn.freeHit ? '<span class="badge badge-fh">\u2726 FREE HIT</span>' : '') + (inn.bonusActive ? '<span class="badge badge-bonus">+1 BONUS</span>' : '') + '</div>'
      + '<div class="run-btns">'
      + [0,1,2,3,4,5,6].map(n => '<button class="btn r' + n + (strikerCanBat ? '' : ' retired-btn') + '" onclick="scoreRuns(' + n + ')"' + (strikerCanBat ? '' : ' disabled') + '>' + n + '</button>').join('')
      + '</div>'
      + '<div class="sec-label">Extras</div>'
      + '<div class="extras-btns">'
      + '<button class="btn btn-dark" onclick="wideBall()">Wide</button>'
      + '<button class="btn btn-dark" onclick="noBall()">No Ball</button>'
      + '<button class="btn btn-dark" onclick="byes()">Bye</button>'
      + '<button class="btn btn-dark" onclick="legByes()">Leg Bye</button>'
      + '<button class="btn btn-dark" onclick="penalty()">Penalty</button></div>'
      + '<div class="action-btns">'
      + '<button class="btn ' + (inn.bonusActive ? 'btn-orange' : 'btn-dark') + '" onclick="toggleBonus()">+1 Bonus</button>'
      + '<button class="btn btn-red" onclick="wicket()">WICKET</button>'
      + '<button class="btn btn-dark" onclick="undo()">\u21a9 Undo</button>'
      + '<button class="btn btn-dark" onclick="switchStrike()">\u2194 Strike</button>'
      + '<button class="btn btn-dark" onclick="endInnings()">End Inns</button>'
      + '<button class="btn btn-dark" onclick="endMatch()">End All</button></div></div>')
    + '<div class="history"><div class="hdr">Ball-by-ball</div>'
    + (hist || '<div style="font-size:11px;color:var(--dim)">No balls yet</div>') + '</div>';
}

function showScorecard() { S().view = 'scorecard'; closeAllModals(); render(); }
function showSessionSummary() { S().view = 'summary'; closeAllModals(); render(); }

/** Build HTML showing batting + bowling stats for a completed innings */
function inningsCompleteHtml(inn) {
  var ext = inn.extras || {};
  var extTotal = (ext.wides||0) + (ext.noBalls||0) + (ext.byes||0) + (ext.legByes||0);

  // Batting rows
  var bHtml = '';
  [inn.b1, inn.b2].forEach(function(b, i) {
    var name = i === 0 ? inn.b1Name : inn.b2Name;
    var sr = b.bf > 0 ? ((b.runs / b.bf) * 100).toFixed(0) : '-';
    var howOut = b.howOut || (b.legalBf >= 18 ? 'retired' : 'not out');
    bHtml += '<tr><td class="name">' + name + '</td>'
      + '<td>' + (b.grossRuns !== undefined ? b.grossRuns : b.runs) + '</td>'
      + '<td>' + b.bf + '</td>'
      + '<td style="color:#8b8fa3">' + (b.dotBalls || 0) + '</td>'
      + '<td>' + b.fours + '</td>'
      + '<td>' + b.sixes + '</td>'
      + '<td>' + (b.threes || 0) + '</td>'
      + '<td>' + (b.bonusRuns || 0) + '</td>'
      + '<td style="color:#8b8fa3;font-size:10px">' + howOut + '</td></tr>';
  });

  // Bowling stats from history
  var bd = {};
  (inn.history || []).forEach(function(h) {
    if (!h.bowler) return;
    if (!bd[h.bowler]) bd[h.bowler] = { balls:0, runs:0, wkts:0, wides:0, noballs:0, dots:0 };
    if (h.type === 'wide') { bd[h.bowler].wides++; return; }
    if (h.type === 'noball') { bd[h.bowler].noballs++; return; }
    bd[h.bowler].balls++;
    if (h.type === 'wicket' && h.mode !== 'Run Out') bd[h.bowler].wkts++;
    var conceded = (h.type === 'bye' || h.type === 'legbye') ? 0 : (h.runs > 0 ? h.runs : 0);
    if (conceded > 0) bd[h.bowler].runs += conceded;
    if ((h.type === 'run' && h.runs === 0) || h.type === 'wicket') bd[h.bowler].dots++;
  });
  var bowlRows = Object.keys(bd).map(function(name) {
    var bs = bd[name];
    var ovs = Math.floor(bs.balls/6) + '.' + (bs.balls%6);
    return '<tr><td class="name">' + name + '</td><td>' + ovs + '</td><td>' + (bs.runs||0) + '</td><td>' + (bs.wkts||0) + '</td><td>' + (bs.wides||0) + '</td><td>' + (bs.noballs||0) + '</td><td>' + (bs.dots||0) + '</td></tr>';
  }).join('');

  // Extras breakdown
  var extParts = [];
  if (ext.byes) extParts.push('Bye ' + ext.byes);
  if (ext.legByes) extParts.push('LB ' + ext.legByes);
  if (ext.wides) extParts.push('Wd ' + ext.wides);
  if (ext.noBalls) extParts.push('NB ' + ext.noBalls);

  return '<div class="summary-card" style="margin-bottom:8px;text-align:center;background:linear-gradient(135deg, rgba(255,107,53,0.08) 0%, transparent 100%)">'
    + '<h2 style="color:var(--orange);margin-bottom:2px">Pair ' + inn.pairNo + ' Complete</h2>'
    + '<div style="font-size:20px;font-weight:800;color:var(--orange)">' + inn.total + '/' + inn.wkts + ' <span style="font-size:12px;font-weight:400;color:var(--dim)">(' + inn.over + '.' + inn.legalBalls + ' ov)</span></div>'
    + '</div>'
    + '<div class="summary-card" style="margin-bottom:8px"><h2>Batting</h2>'
    + '<table class="summary-table" style="font-size:11px">'
    + '<tr><th>Batter</th><th>R</th><th>B</th><th>Dots</th><th>4s</th><th>6s</th><th>3s</th><th>Bn</th><th>How Out</th></tr>'
    + bHtml + '</table></div>'
    + (bowlRows
      ? '<div class="summary-card" style="margin-bottom:8px"><h2>Bowling</h2>'
        + '<table class="summary-table" style="font-size:11px">'
        + '<tr><th>Bowler</th><th>O</th><th>R</th><th>W</th><th>Wd</th><th>NB</th><th>Dots</th></tr>'
        + bowlRows + '</table></div>'
      : '')
    + (extTotal > 0
      ? '<div class="summary-card" style="margin-bottom:8px;padding:6px 10px;font-size:11px;color:var(--amber)">Extras: <span style="color:var(--text);font-weight:600">' + extTotal + '</span> <span style="color:var(--dim)">(' + extParts.join(', ') + ')</span></div>'
      : '');
}

function renderScorecard() {
  const inn = S().innings;
  if (!inn) { S().view = 'match'; render(); return; }
  const b1 = inn.b1, b2 = inn.b2;
  const ext = inn.extras;
  const extTotal = ext.wides + ext.noBalls + ext.byes + ext.legByes;

  let bHtml = '';
  for (const b of [{ name: inn.b1Name, runs: b1.runs, balls: b1.bf, dotBalls: b1.dotBalls, fours: b1.fours, sixes: b1.sixes, threes: b1.threes || 0, bonusRuns: b1.bonusRuns, howOut: b1.howOut, retired: b1.legalBf >= 18 }, { name: inn.b2Name, runs: b2.runs, balls: b2.bf, dotBalls: b2.dotBalls, fours: b2.fours, sixes: b2.sixes, threes: b2.threes || 0, bonusRuns: b2.bonusRuns, howOut: b2.howOut, retired: b2.legalBf >= 18 }]) {
    const dis = b.howOut || (b.retired ? 'Retired' : (inn.complete ? 'Not Out' : 'Batting'));
    bHtml += '<tr><td class="name">' + b.name + '</td><td>' + (b.grossRuns !== undefined ? b.grossRuns : b.runs) + '</td><td>' + b.balls + '</td><td>' + b.dotBalls + '</td><td>' + b.fours + '</td><td>' + b.sixes + '</td><td>' + b.threes + '</td><td>' + (b.bonusRuns || '') + '</td><td style="font-size:10px;color:var(--dim)">' + dis + '</td></tr>';
  }

  const bd = {};
  for (const h of inn.history) {
    if (!h.bowler) continue;
    if (!bd[h.bowler]) bd[h.bowler] = { balls: 0, runs: 0, wkts: 0, wides: 0, noballs: 0, dots: 0 };
    if (h.type !== 'wide' && h.type !== 'noball') {
      bd[h.bowler].balls++;
      if (h.runs === 0 && (h.type === 'run' || h.type === 'wicket')) bd[h.bowler].dots++;
    }
    if (h.type === 'wicket' && h.mode !== 'Run Out') bd[h.bowler].wkts++;
    if (h.type === 'wide') bd[h.bowler].wides++;
    if (h.type === 'noball') bd[h.bowler].noballs++;
    if (h.runs > 0 && h.type !== 'bye' && h.type !== 'legbye') bd[h.bowler].runs += h.runs;
  }
  let bowlHtml = '';
  for (const [name, st] of Object.entries(bd)) {
    const ovs = Math.floor((st.balls || 0) / 6) + '.' + ((st.balls || 0) % 6);
    bowlHtml += '<tr><td class="name">' + name + '</td><td>' + ovs + '</td><td>' + (st.runs || 0) + '</td><td>' + (st.wkts || 0) + '</td><td>' + (st.wides || 0) + '</td><td>' + (st.noballs || 0) + '</td><td>' + (st.dots || 0) + '</td></tr>';
  }

  const histHtml = [...inn.history].reverse().slice(0, 50).map(h => {
    let txt = '';
    const nm = h.b === 1 ? inn.b1Name : inn.b2Name;
    if (h.type === 'wicket') txt = nm + ' ' + h.mode + (h.fielder ? ' c ' + h.fielder : '') + ' (' + h.runs + 'r)';
    else if (h.type === 'wide') txt = 'Wide' + (h.runs > 1 ? ' +' + (h.runs-1) : '');
    else if (h.type === 'noball') txt = 'NB ' + h.runs + 'r';
    else if (h.type === 'bye') txt = h.runs + ' bye' + (h.runs > 1 ? 's' : '');
    else if (h.type === 'legbye') txt = h.runs + ' leg bye' + (h.runs > 1 ? 's' : '');
    else txt = nm + ' ' + h.runs + (h.bonus ? '+1' : '');
    return '<div class="hist-item"><span class="ball">' + h.over + '.' + h.ballNum + '</span><span class="evt">' + txt + '</span><span class="total">' + h.runningTotal + '</span></div>';
  }).join('') || '<div style="font-size:11px;color:var(--dim)">No balls yet</div>';

  document.getElementById('app').innerHTML = logoHTML(true)
    + '<div style="display:flex;gap:4px;margin-bottom:8px">'
    + '<button class="btn btn-sm btn-dark" onclick="S().view=\'match\';render()" style="flex:1">Scoring</button>'
    + '<button class="btn btn-sm btn-dark" onclick="showScorecard()" style="flex:1;border-color:var(--orange)">Scorecard</button>'
    + '<button class="btn btn-sm btn-dark" onclick="showSessionSummary()" style="flex:1">Session</button></div>'
    + '<div class="scorecard-view">'
    + '<div class="sc-header"><h2>Pair ' + inn.pairNo + '</h2><p>' + inn.b1Name + ' &amp; ' + inn.b2Name + ' \u00b7 Over ' + (inn.over + 1) + '/' + inn.maxOvers + '</p></div>'
    + '<div class="summary-card"><h2>Batting</h2><table class="summary-table">'
    + '<tr><th>Batter</th><th>R</th><th>B</th><th>Dots</th><th>4s</th><th>6s</th><th>3s</th><th>Bonus</th><th>How Out</th></tr>'
    + bHtml
    + '<tr><td style="font-weight:700;padding-top:6px;border-top:1px solid var(--border)">Extras</td><td colspan="8" style="padding-top:6px;border-top:1px solid var(--border);font-size:10px;color:var(--dim)">b ' + ext.byes + ' \u00b7 lb ' + ext.legByes + ' \u00b7 w ' + ext.wides + ' \u00b7 nb ' + ext.noBalls + ' \u00b7 <strong>Total ' + extTotal + '</strong></td></tr>'
    + '<tr><td style="font-weight:700;font-size:14px;color:var(--orange)">Total</td><td colspan="8" style="font-weight:800;font-size:16px;color:var(--orange)">' + inn.total + '/' + inn.wkts + ' <span style="font-weight:400;font-size:12px;color:var(--dim)">(' + inn.over + '.' + inn.legalBalls + ' ov)</span></td></tr>'
    + '</table></div>'
    + (bowlHtml ? '<div class="summary-card"><h2>Bowling</h2><table class="summary-table"><tr><th>Bowler</th><th>O</th><th>R</th><th>W</th><th>Wd</th><th>NB</th><th>Dots</th></tr>' + bowlHtml + '</table></div>' : '')
    + '<div class="summary-card"><h2>Ball-by-ball</h2><div class="history" style="max-height:300px">' + histHtml + '</div></div>'
    + '<button class="btn btn-dark btn-block" onclick="S().view=\'match\';render()">\u2190 Back to Scoring</button></div>';
}

function scoreRuns(runs) {
  const inn = S().innings;
  if (!inn || inn.complete) return;
  const st = striker();
  if (!st || !canBat(inn.striker)) {
    tryRotateStrike();
    saveOnAction(); render();
    return;
  }
  if (inn.bonusActive) {
    pushUndo();
    applyRuns(runs, true, inn.striker);
    tryRotateStrike(); checkOver(); checkLimits(); saveOnAction(); render();
    return;
  }
  pushUndo();
  applyRuns(runs, false, null);
  tryRotateStrike(); checkOver(); checkLimits(); saveOnAction(); render();
}

function applyRuns(runs, hadBonus, bonusBatter) {
  const inn = S().innings;
  if (!inn) return;
  let total = runs;
  if (S().modifiedRules && runs === 3) total = 4;

  const st = striker();
  if (!st) return;
  if (!hadBonus || !bonusBatter || runs !== 1) {
    st.runs += total; st.grossRuns += total; st.bf++; if (st.legalBf < 18) st.legalBf++;
    if (total === 0) st.dotBalls++;
    if (runs === 3) st.threes++;
    if (runs === 4) st.fours++;
    if (runs === 6) st.sixes++;
    inn.total += total;
    inn.legalBalls++; inn.totalBalls++;
    if (runs % 2 === 1) inn.striker = inn.striker === 1 ? 2 : 1;
    inn.history.push({
      type: 'run', over: inn.over, ballNum: inn.legalBalls,
      b: inn.striker === 1 ? 2 : 1, runs: total, bonus: hadBonus,
      freeHit: inn.freeHit, bowler: inn.currentBowler, runningTotal: inn.total
    });
  } else {
    st.runs += runs; st.grossRuns += runs; st.bf++; if (st.legalBf < 18) st.legalBf++;
    if (runs === 0) st.dotBalls++;
    if (runs === 3) st.threes++;
    st.bonusRuns++;
    if (runs === 4) st.fours++;
    if (runs === 6) st.sixes++;
    const bb = bonusBatter === 1 ? inn.b1 : inn.b2;
    bb.runs += 1; bb.grossRuns += 1;
    if (bb.bf === 0) { bb.bf++; if (bb.legalBf < 18) bb.legalBf++; }
    inn.total += total + 1;  // base runs + bonus run
    inn.legalBalls++; inn.totalBalls++;
    if (runs % 2 === 1) inn.striker = inn.striker === 1 ? 2 : 1;
    inn.history.push({
      type: 'run', over: inn.over, ballNum: inn.legalBalls,
      b: inn.striker === 1 ? 2 : 1, runs: total, bonus: true,
      freeHit: inn.freeHit, bowler: inn.currentBowler, runningTotal: inn.total
    });
  }

  inn.bonusActive = false;
  inn.freeHit = false;
}

function tryRotateStrike() {
  const inn = S().innings;
  if (!inn) return;
  if (!canBat(inn.striker)) {
    const other = inn.striker === 1 ? 2 : 1;
    if (canBat(other)) inn.striker = other;
  }
}

function switchStrike() {
  const inn = S().innings;
  if (!inn || inn.complete) return;
  const other = inn.striker === 1 ? 2 : 1;
  if (!canBat(other)) { alert('The other batter cannot bat (already retired or out of legal balls).'); return; }
  pushUndo();
  inn.striker = other;
  saveOnAction(); render();
}

function processWkt(mode, fielder, outB) {
  const inn = S().innings;
  const bat = outB === 1 ? inn.b1 : inn.b2;

  if (S().modifiedRules) {
    const penalty = inn.over <= 3 ? 5 : 2;
    bat.runs -= penalty;
    inn.total -= penalty;
    inn.extras.penalty = (inn.extras.penalty || 0) + penalty;
    bat.bf++;
    if (bat.legalBf < 18) bat.legalBf++;
    inn.wkts++;
    inn.legalBalls++;
    inn.totalBalls++;
    if (inn.legalBalls % 6 === 0) inn.ball6 = true;
    inn.history.push({
      type: 'wicket', over: inn.over, ballNum: inn.legalBalls,
      b: outB, runs: -penalty, mode: mode, fielder: fielder,
      bowler: inn.currentBowler, freeHit: false, runningTotal: inn.total
    });
    inn.freeHit = false;
    checkOver();
    if (inn.over >= inn.maxOvers) inn.complete = true;
    if ((inn.b1.legalBf >= 18 || !canBat(1)) && (inn.b2.legalBf >= 18 || !canBat(2))) inn.complete = true;
    tryRotateStrike();
    saveOnAction(); render();
  } else {
    bat.bf++;
    if (bat.legalBf < 18) bat.legalBf++;
    bat.dotBalls++;
    bat.dismissals++;
    bat.howOut = mode;
    bat.fielder = fielder;
    bat.bowlerOut = inn.currentBowler;
    inn.wkts++;
    inn.legalBalls++;
    inn.totalBalls++;
    if (mode === 'Run Out' && outB !== inn.striker) {
      // non-striker out, striker keeps strike
    } else {
      inn.striker = inn.striker === 1 ? 2 : 1;
    }
    inn.history.push({
      type: 'wicket', over: inn.over, ballNum: inn.legalBalls,
      b: outB, runs: 0, mode: mode, fielder: fielder,
      bowler: inn.currentBowler, freeHit: false, runningTotal: inn.total
    });
    inn.freeHit = false;
    checkOver();
    if (inn.b1.howOut && inn.b2.howOut) inn.complete = true;
    checkLimits();
    tryRotateStrike();
    saveOnAction(); render();
  }
}

function checkOver() {
  const inn = S().innings;
  if (!inn) return;
  if (inn.legalBalls >= 6) {
    inn.prevBowler = inn.currentBowler;
    inn.striker = inn.striker === 1 ? 2 : 1;
    inn.over++;
    inn.legalBalls = 0;
    inn.freeHit = false;
    tryRotateStrike();
    if (inn.over >= inn.maxOvers) inn.complete = true;
    if (!inn.complete && S().view === 'match') {
      showBowlerSelect('Over complete! Next bowler?');
    }
  }
}

function checkLimits() {
  const inn = S().innings;
  if (!inn) return;
  if (inn.over >= inn.maxOvers) inn.complete = true;
  if (S().modifiedRules) {
    if ((inn.b1.legalBf >= 18 || !canBat(1)) && (inn.b2.legalBf >= 18 || !canBat(2))) inn.complete = true;
  } else {
    if (inn.wkts >= 2) inn.complete = true;
    if ((inn.b1.legalBf >= 18 || inn.b1.howOut) && (inn.b2.legalBf >= 18 || inn.b2.howOut)) inn.complete = true;
  }
  if (inn.complete) tryRotateStrike();
}

function getAvailableBowlers() {
  const inn = S().innings;
  if (!inn) return [];
  const excludes = [inn.b1Name, inn.b2Name];
  // Don't allow same bowler as previous over
  if (inn.prevBowler && inn.over > 0) excludes.push(inn.prevBowler);
  let avail = S().allPlayers.filter(function(n) { return !excludes.includes(n); });
  // If no one else is available, allow previous bowler
  if (avail.length === 0 && inn.prevBowler) {
    avail = S().allPlayers.filter(function(n) { return n !== inn.b1Name && n !== inn.b2Name; });
  }
  return avail;
}

function showBowlerSelect(msg) {
  const inn = S().innings;
  if (!inn || inn.complete) return;
  closeAllModals();
  let avail = getAvailableBowlers();
  if (avail.length === 0 && inn.currentBowler) {
    avail = [inn.currentBowler];
  }
  if (avail.length === 0) {
    avail = S().allPlayers.filter(function(n) { return n !== inn.b1Name && n !== inn.b2Name; });
  }
  if (avail.length === 0) { endInnings(); return; }
  const opts = avail.map(function(n) {
    return '<option value="' + n + '"' + (n === inn.currentBowler ? ' selected' : '') + '>' + n + '</option>';
  }).join('');
  const m = document.createElement('div');
  m.className = 'modal-overlay'; m.id = 'bm';
  m.innerHTML = '<div class="modal" style="text-align:center">'
    + '<h3>' + msg + '</h3>'
    + '<div class="field"><select id="bowlerSel" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;color-scheme:dark">' + opts + '</select></div>'
    + '<div class="modal-actions"><button class="btn btn-orange" onclick="confirmBowler()" style="flex:1">Set Bowler</button><button class="btn btn-dark" onclick="closeAllModals();render()" style="flex:1">Cancel</button></div></div>';

function endMatch() { if (confirm('End entire match?')) { S().innings.complete = true; nextPair(); } }

// UNDO
function undo() {
  const inn = S().innings;
  if (!inn || !inn._undo || inn._undo.length === 0) { alert('Nothing to undo'); return; }
  if (!confirm('Undo last ball?')) return;
  const snap = inn._undo.pop();
