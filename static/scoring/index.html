<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#E55000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="The CREASE">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<title>The CREASE — Cricket Scoring</title>
<style>
:root {
  --orange: #E55000; --orange-h: #e55a2b; --orange-glow: #ff8c5a;
  --bg: #0d1117; --card: #161b24; --card2: #1c2333; --border: #2d3548;
  --text: #e6e8ed; --dim: #8b8fa3; --green: #238636; --red: #da3633;
  --blue: #1f6feb; --purple: #8957e5; --amber: #d29922;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; min-height: -webkit-fill-available;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none; -webkit-overflow-scrolling: touch;
  padding-bottom: var(--safe-bottom); padding-top: var(--safe-top);
  user-select: none; -webkit-user-select: none;
}
/* PWA standalone mode adjustments */
@media all and (display-mode: standalone) {
  body { padding-top: calc(var(--safe-top) + 8px); }
}
.container { max-width: 800px; margin: 0 auto; padding: 8px; padding-bottom: calc(8px + var(--safe-bottom)); }
.logo { text-align: center; padding: 8px 0 4px; }
.logo img { height: 38px; }
.setup { max-width: 520px; margin: 0 auto; padding-top: 2px; }
.card { background: var(--card); border-radius: 14px; padding: 14px; margin-bottom: 8px; border: 1px solid var(--border); }
.card h2 { font-size: 12px; font-weight: 700; color: var(--dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }
.card label { display: block; font-size: 12px; color: var(--dim); margin-bottom: 2px; }
.card input, .card select, .card textarea {
  width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--bg); color: var(--text); font-size: 16px; /* 16px prevents iOS zoom */ margin-bottom: 5px;
}
.card textarea { resize: vertical; min-height: 70px; font-family: inherit; }
.card input:focus, .card select:focus, .card textarea:focus { outline: none; border-color: var(--orange); }
.card .hint { font-size: 11px; color: var(--dim); margin-top: -3px; margin-bottom: 5px; }
.pair-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; align-items: end; }
.pair-row .pair-label { font-size: 11px; color: var(--orange); font-weight: 700; margin-bottom: 3px; grid-column: 1 / -1; }

/* === BUTTONS – 44px min tap target === */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 12px 16px; min-height: 44px;
  border: none; border-radius: 10px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.12s; user-select: none; -webkit-tap-highlight-color: transparent;
  gap: 4px; touch-action: manipulation;
}
.btn:active { transform: scale(0.95); }
.btn:disabled { opacity: 0.25; cursor: not-allowed; transform: none; }
.btn-orange { background: var(--orange); color: #fff; }
.btn-orange:hover:not(:disabled) { background: var(--orange-h); }
.btn-dark { background: var(--card2); color: var(--text); border: 1px solid var(--border); }
.btn-dark:hover:not(:disabled) { background: var(--border); }
.btn-red { background: var(--red); color: #fff; }
.btn-sm { padding: 8px 12px; min-height: 36px; font-size: 12px; border-radius: 8px; }
.btn-block { width: 100%; }
.btn-green { background: var(--green); color: #fff; }

.match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; flex-wrap: wrap; gap: 5px; }
.match-header .info { font-size: 11px; color: var(--dim); }
.match-header .info strong { color: var(--orange); }
.bowler-select { display: flex; align-items: center; gap: 5px; }
.bowler-select label { font-size: 11px; color: var(--dim); white-space: nowrap; }
.bowler-select select { padding: 8px 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card2); color: var(--text); font-size: 14px; min-height: 40px; }
.new-over-badge { font-size: 8px; padding: 2px 7px; border-radius: 10px; background: #76ff03; color: #000; font-weight: 700; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

.scoreboard { display: grid; grid-template-columns: 1fr auto 1fr; gap: 6px; margin-bottom: 6px; }
.bat-card { background: var(--card); border-radius: 12px; padding: 8px; text-align: center; border: 2px solid transparent; transition: all 0.25s; }
.bat-card.striker { border-color: var(--orange); background: linear-gradient(135deg, var(--card) 0%, #1f1a30 100%); }
.bat-card .name { font-size: 13px; font-weight: 700; margin-bottom: 1px; }
.bat-card .runs { font-size: 24px; font-weight: 800; color: var(--orange); line-height: 1.1; }
.bat-card .stat { font-size: 10px; color: var(--dim); display: flex; justify-content: center; gap: 6px; margin-top: 1px; flex-wrap: wrap; }
.bat-card .stat span { color: var(--text); }
.bat-card .dismissal-info { font-size: 9px; color: var(--red); margin-top: 2px; }
.bat-card .retired { font-size: 9px; color: var(--amber); margin-top: 2px; font-weight: 600; }

.match-bar { background: var(--card); border-radius: 12px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; border: 1px solid var(--border); gap: 6px; }
.match-bar .score { font-size: 20px; font-weight: 800; color: var(--orange); white-space: nowrap; }
.match-bar .score small { font-size: 12px; color: var(--dim); font-weight: 400; }
.match-bar .meta { text-align: right; font-size: 11px; color: var(--dim); }
.match-bar .meta strong { color: var(--text); font-size: 14px; }
.match-bar .meta .fh { color: #76ff03; font-weight: 700; font-size: 10px; }

.over-tracker { display: flex; gap: 3px; margin-bottom: 6px; justify-content: center; flex-wrap: wrap; }
.ball-dot { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; }
.ball-dot.empty { background: var(--card2); color: #444; border: 1px solid var(--border); }
.ball-dot.runs { background: var(--green); }
.ball-dot.wicket { background: var(--red); }
.ball-dot.wide { background: #e65100; }
.ball-dot.noball { background: var(--purple); }
.ball-dot.byes { background: var(--blue); }

/* RUN BUTTONS – mobile-optimized grid */
.controls { background: var(--card); border-radius: 12px; padding: 10px; margin-bottom: 8px; border: 1px solid var(--border); }
.controls .sec-label { font-size: 9px; color: var(--dim); margin-bottom: 4px; display: flex; align-items: center; gap: 5px; text-transform: uppercase; letter-spacing: 1px; }
.controls .sec-label .badge { font-size: 7px; padding: 2px 6px; border-radius: 10px; font-weight: 700; letter-spacing: 0; }
.badge-fh { background: #76ff03; color: #000; }
.badge-bonus { background: var(--orange); color: #fff; }

.run-btns { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
.run-btns .btn { padding: 14px 0; min-height: 50px; font-size: 20px; font-weight: 800; border-radius: 10px; }
.run-btns .r0 { background: #2d3548; color: #666; }
.run-btns .r1 { background: #1b5e20; }
.run-btns .r2 { background: #238636; }
.run-btns .r3 { background: #d29922; }
.run-btns .r4 { background: #1f6feb; }
.run-btns .r5 { background: #8957e5; }
.run-btns .r6 { background: #6a1b9a; }
.run-btns .btn.retired-btn { opacity: 0.25; cursor: not-allowed; }

.extras-btns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 6px; }
.extras-btns .btn { padding: 12px 0; min-height: 44px; font-size: 12px; font-weight: 700; border-radius: 8px; }

.action-btns { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
.action-btns .btn { padding: 12px 0; min-height: 44px; font-size: 11px; border-radius: 8px; font-weight: 700; }

/* MODAL – full-screen on mobile */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 12px; }
.modal { background: var(--card); border-radius: 16px; padding: 20px; max-width: 400px; width: 100%; border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.modal h3 { font-size: 15px; margin-bottom: 12px; color: var(--orange); }
.modal .field { margin-bottom: 10px; }
.modal .field label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 2px; }
.modal .field select, .modal .field input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 16px; color-scheme: dark; min-height: 44px; }
.modal .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.modal .mode-grid .btn { padding: 12px 8px; min-height: 44px; font-size: 12px; border: 2px solid transparent; background: var(--card2); color: var(--text); }
.modal .mode-grid .btn.selected { border-color: var(--orange); background: var(--orange); color: #fff; }
.modal .modal-actions { display: flex; gap: 8px; margin-top: 12px; }
.modal .modal-actions .btn { flex: 1; min-height: 44px; }
.modal .pick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
.modal .pick-grid .btn { padding: 16px 0; min-height: 52px; font-size: 20px; font-weight: 800; border-radius: 10px; }

.history { background: var(--card); border-radius: 12px; padding: 8px; max-height: 150px; overflow-y: auto; border: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
.history .hdr { font-size: 9px; color: var(--dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
.hist-item { display: flex; justify-content: space-between; padding: 2px 0; font-size: 11px; border-bottom: 1px solid rgba(255,255,255,0.03); gap: 5px; }
.hist-item .ball { color: var(--dim); min-width: 38px; flex-shrink: 0; }
.hist-item .evt { flex: 1; }
.hist-item .evt.wide { color: #ff8a65; }
.hist-item .evt.nb { color: #ce93d8; }
.hist-item .evt.bye { color: #64b5f6; }
.hist-item .evt.wkt { color: var(--red); }
.hist-item .evt.bonus { color: var(--orange); }
.hist-item .evt.penalty { color: var(--red); }
.hist-item .total { color: var(--orange); font-weight: 600; font-size: 10px; }

.summary { max-width: 600px; margin: 0 auto; }
.summary-card { background: var(--card); border-radius: 14px; padding: 14px; margin-bottom: 8px; border: 1px solid var(--border); }
.summary-card h2 { font-size: 15px; color: var(--orange); margin-bottom: 2px; }
.summary-card .sub { font-size: 10px; color: var(--dim); margin-bottom: 8px; }
.summary-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.summary-table th { text-align: left; font-size: 8px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; padding: 2px 4px; border-bottom: 1px solid var(--border); }
.summary-table td { padding: 3px 4px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.summary-table .name { font-weight: 600; }
.summary-table .total { font-weight: 700; color: var(--orange); white-space: nowrap; }
.stat-box { line-height: 1.5; }
.stat-box strong { color: var(--orange); }
.stat-box table td { padding: 2px 4px; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 11px; }
.stat-box table th { font-size: 9px; color: var(--dim); padding: 2px 4px; border-bottom: 1px solid var(--border); }
.summary-table tr:nth-child(even) td,
.stat-box table tr:nth-child(even) td { background: rgba(255,255,255,0.025); }

.scorecard-view { max-width: 700px; margin: 0 auto; }
.scorecard-view .sc-header { text-align: center; margin-bottom: 10px; }
.scorecard-view .sc-header h2 { font-size: 16px; color: var(--orange); }
.scorecard-view .sc-header p { font-size: 10px; color: var(--dim); }
.sc-tabs { display: flex; gap: 3px; margin-bottom: 8px; }
.sc-tabs .btn { flex: 1; font-size: 10px; padding: 10px 4px; min-height: 38px; }

.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; }
.toggle-row label { font-size: 12px; color: var(--text); }
.toggle { position: relative; display: inline-block; width: 44px; height: 24px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle .slider { position: absolute; cursor: pointer; inset: 0; background: var(--border); border-radius: 24px; transition: 0.2s; }
.toggle .slider::before { content: ''; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
.toggle input:checked + .slider { background: var(--orange); }
.toggle input:checked + .slider::before { transform: translateX(20px); }

/* === MOBILE-FIRST RESPONSIVE === */
@media (max-width: 600px) {
  .container { padding: 6px; }
  .run-btns .btn { padding: 12px 0; font-size: 18px; min-height: 46px; }
  .extras-btns .btn, .action-btns .btn { min-height: 44px; font-size: 11px; }
  .ball-dot { width: 28px; height: 28px; font-size: 10px; }
  .match-bar .score { font-size: 18px; }
  .match-bar .meta { font-size: 10px; }
  .bat-card { padding: 6px; }
  .bat-card .runs { font-size: 20px; }
  .logo img { height: 32px; }
  .history { max-height: 120px; }
}
@media (max-width: 480px) {
  .container { padding: 4px; }
  .scoreboard { grid-template-columns: 1fr 1fr; }
  .scoreboard .match-bar { grid-column: 1 / -1; }
  .bat-card .runs { font-size: 18px; }
  .bat-card .name { font-size: 11px; }
  .match-bar .score { font-size: 16px; }
  .match-bar .meta strong { font-size: 12px; }
  .run-btns { gap: 3px; }
  .run-btns .btn { padding: 10px 0; font-size: 16px; min-height: 42px; border-radius: 8px; }
  .extras-btns { gap: 3px; }
  .action-btns { gap: 3px; }
  .extras-btns .btn { padding: 10px 0; min-height: 40px; font-size: 10px; }
  .action-btns .btn { padding: 10px 0; min-height: 40px; font-size: 10px; }
  .ball-dot { width: 24px; height: 24px; font-size: 9px; }
  .modal { padding: 16px; border-radius: 14px; }
  .modal .pick-grid .btn { padding: 14px 0; min-height: 46px; font-size: 18px; }
  .modal .mode-grid .btn { padding: 10px 6px; min-height: 40px; font-size: 11px; }
  .card { padding: 12px; }
  .summary-card { padding: 12px; }
  .over-tracker { gap: 2px; }
  .logo img { height: 28px; }
  .pair-row { grid-template-columns: 1fr; }
  .bowler-select select { font-size: 16px; padding: 10px; }
}
@media (max-width: 380px) {
  .scoreboard { grid-template-columns: 1fr; }
  .run-btns .btn { font-size: 14px; padding: 8px 0; min-height: 38px; }
  .extras-btns { grid-template-columns: repeat(2, 1fr); }
  .action-btns { grid-template-columns: repeat(3, 1fr); }
  .modal .mode-grid { grid-template-columns: 1fr; }
  .match-header { flex-direction: column; align-items: stretch; text-align: center; }
  .bowler-select { justify-content: center; }
}
/* Prevent iOS zoom on input focus */
@media screen and (-webkit-min-device-pixel-ratio: 0) {
  select, textarea, input { font-size: 16px !important; }
}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
// Register service worker for offline support
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

const state = {
  allPlayers: [],
  pairs: [],
  numPairs: 2,
  innings: null,
  completedInnings: [],
  view: 'setup',
  currentPairIdx: 0,
  modifiedRules: true,
  maxOvers: 6,
  maxBallsPerBatter: 18
};
const S = () => state;

function striker() { const i = S().innings; if (!i) return null; if (i.isSolo) return i.b1; return i.striker === 1 ? i.b1 : i.b2; }
function oversDisplay(i) { return i ? i.over + '.' + (i.legalBalls + 1) : '0.0'; }
function mb() { return { runs: 0, grossRuns: 0, bf: 0, legalBf: 0, dotBalls: 0, dismissals: 0, fours: 0, sixes: 0, threes: 0, bonusRuns: 0, howOut: null, fielder: null, bowlerOut: null }; }

function readPlayersFromInput() {
  const el = document.getElementById('playerInput');
  if (!el) return;
  const names = el.value.split('\n').map(s => s.trim()).filter(Boolean);
  if (names.length > 0) S().allPlayers = names;
}

function makeInnings(pairIdx) {
  const p = S().pairs[pairIdx];
  if (!p) return null;
  const solo = !p.b2;
  return {
    pairIdx, pairNo: pairIdx + 1,
    b1: mb(), b2: mb(),
    b1Name: p.b1, b2Name: solo ? '' : p.b2,
    striker: 1, total: 0, wkts: 0,
    extras: { wides: 0, noBalls: 0, byes: 0, legByes: 0 },
    over: 0, legalBalls: 0, totalBalls: 0,
    freeHit: false, bonusActive: false,
    currentBowler: S().allPlayers[0] || '',
    prevBowler: '',
    complete: false, maxOvers: S().maxOvers,
    lastLegalStriker: null,
    history: [],
    isSolo: solo
  };
}

function cloneInnings() {
  const inn = S().innings;
  if (!inn) return null;
  const u = inn._undo;
  delete inn._undo;
  const c = JSON.parse(JSON.stringify(inn));
  inn._undo = u;
  c._undo = [];
  return c;
}
function restoreInnings(snap) { if (!snap) return; const inn = S().innings; if (!inn) return; Object.assign(inn, snap); }

function pushUndo() {
  const inn = S().innings;
  if (!inn) return;
  if (!inn._undo) inn._undo = [];
  inn._undo.push(cloneInnings());
  if (inn._undo.length > 50) inn._undo.shift();
}

function canBat(num) {
  const inn = S().innings;
  if (!inn) return false;
  if (inn.isSolo && num === 2) return false;
  const b = num === 1 ? inn.b1 : inn.b2;
  const maxBf = S().maxBallsPerBatter;
  if (S().modifiedRules) return b.legalBf < maxBf;
  return !b.howOut && b.legalBf < maxBf;
}

function closeAllModals() {
  document.querySelectorAll('.modal-overlay').forEach(m => m.remove());
}

// DOM-based dialog helpers (work in WebView without WebChromeClient)
function showAlert(msg) {
  closeAllModals();
  const m = document.createElement('div');
  m.className = 'modal-overlay';
  m.innerHTML = '<div class="modal" style="text-align:center;max-width:320px"><p style="margin:12px 0">'
    + msg + '</p><div class="modal-actions"><button class="btn btn-orange" onclick="closeAllModals()" style="flex:1">OK</button></div></div>';
  document.body.appendChild(m);
}

function showConfirm(msg, onYes) {
  closeAllModals();
  const m = document.createElement('div');
  m.className = 'modal-overlay';
  m.innerHTML = '<div class="modal" style="text-align:center;max-width:320px"><p style="margin:12px 0">'
    + msg + '</p><div class="modal-actions">'
    + '<button class="btn btn-dark" onclick="closeAllModals()" style="flex:1">No</button>'
    + '<button class="btn btn-orange" id="confirm-yes" onclick="closeAllModals()" style="flex:1">Yes</button></div></div>';
  document.body.appendChild(m);
  document.getElementById('confirm-yes').addEventListener('click', onYes);
}

function goToScorecard() {
  S().view = 'scorecard';
  closeAllModals();
  render();
}

// RENDER
function render() {
  const v = S().view;
  if (v === 'setup') return renderSetup();
  if (v === 'summary') return renderSummary();
  if (v === 'pairselect') return renderPairSelect();
  if (v === 'scorecard') return renderScorecard();
  try { renderMatch(); } catch (e) {
    console.error(e);
    document.getElementById('app').innerHTML = logoHTML() + '<div class="card" style="text-align:center;padding:30px 20px"><h2>Error</h2><p style="color:var(--red);margin:12px 0">' + e.message + '</p><button class="btn btn-orange" onclick="resetApp()">Restart</button></div>';
  }
}

function logoHTML(small) {
  return '<div class="logo"><img src="crease_logo.png" alt="The CREASE"' + (small ? ' style="height:34px"' : '') + '></div>';
}

function renderSetup() {
  const s = S();
  const tags = s.allPlayers.map((p, i) =>
    '<span style="display:inline-flex;align-items:center;gap:4px;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:12px">' + p + '<span onclick="removePlayer(' + i + ')" style="cursor:pointer;color:var(--red);font-size:14px;line-height:1;padding:0 2px">\u2715</span></span>'
  ).join('');

  let pc = '';
  for (let i = 0; i < s.numPairs; i++) {
    const p = s.pairs[i] || { b1: '', b2: '' };
    const o1 = s.allPlayers.map(n => '<option value="' + n + '"' + (n === p.b1 ? ' selected' : '') + '>' + n + '</option>').join('');
    const o2 = s.allPlayers.map(n => '<option value="' + n + '"' + (n === p.b2 ? ' selected' : '') + '>' + n + '</option>').join('');
    pc += '<div class="pair-row"><div class="pair-label">Pair ' + (i + 1) + '</div>'
      + '<select onchange="setPair(' + i + ',1,this.value)"><option value="">Select batter</option>' + o1 + '</select>'
      + (p.b2 === null
        ? '<span style="font-size:11px;color:var(--orange);padding:0 8px;display:flex;align-items:center">Solo</span>'
        : '<select onchange="setPair(' + i + ',2,this.value)"><option value="">Select batter</option>' + o2 + '</select>') + '</div>';
  }

  // Check for interrupted session to show resume prompt
  const interrupted = getInterruptedSession();
  const resumeHtml = interrupted
    ? '<div class="card" style="border:2px solid var(--orange);text-align:center;padding:14px">'
      + '<h2 style="color:var(--orange);margin-bottom:6px">\u26a0 Resume Session</h2>'
      + '<p style="font-size:12px;color:var(--dim);margin-bottom:10px">You have an unfinished session from '
      + (interrupted.savedAt ? new Date(interrupted.savedAt).toLocaleString() : 'earlier')
      + '</p>'
      + '<div style="display:flex;gap:8px;justify-content:center">'
      + '<button class="btn btn-orange" onclick="restoreSession(getInterruptedSession())" style="flex:1">Resume Session</button>'
      + '<button class="btn btn-dark" onclick="clearInterruptedSession();render()" style="flex:1">Discard</button>'
      + '</div></div>'
    : '';

  document.getElementById('app').innerHTML = logoHTML()
    + '<div class="setup">'
    + resumeHtml
    + '<div class="card" style="display:flex;gap:8px;justify-content:center;padding:12px">'
    + '<button class="btn btn-sm btn-dark" onclick="renderSavedSessions()" style="flex:1">&#x1f4c2; Saved Sessions</button>'
    + '</div>'
    + '<div class="card"><h2>Players</h2><textarea id="playerInput" placeholder="Enter player names, one per line">' + s.allPlayers.join('\n') + '</textarea>'
    + '<button class="btn btn-sm btn-dark" onclick="loadPlayers()">Update Players</button>'
    + (tags ? '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px">' + tags + '</div>' : '<div style="font-size:11px;color:var(--dim);margin-top:4px">Enter names above and click Update Players</div>')
    + '</div>'
    + '<div class="card"><h2>Batting Pairs</h2><label>Number of pairs</label>'
    + '<select id="numPairs" onchange="changeNumPairs()">'
    + [1,2,3,4,5,6,7,8].map(n => '<option value="' + n + '"' + (n === s.numPairs ? ' selected' : '') + '>' + n + ' pair' + (n > 1 ? 's' : '') + '</option>').join('')
    + '</select><div id="pairConfig">' + pc + '</div>'
    + '<button class="btn btn-sm btn-dark" onclick="autoAssignPairs()" style="margin-top:4px">Auto-assign Pairs</button></div>'
    + '<div class="card"><h2>Session Settings</h2>'
    + '<label>Overs per pair</label>'
    + '<input type="number" id="maxOversInput" value="' + s.maxOvers + '" min="1" max="20" onchange="updateSessionSettings()">'
    + '<label>Max balls per batter</label>'
    + '<input type="number" id="maxBallsInput" value="' + s.maxBallsPerBatter + '" min="1" max="60" onchange="updateSessionSettings()">'
    + '<div class="toggle-row" style="margin-top:8px"><label>Variation Mode <span style="color:var(--orange);font-size:10px">(Custom rules)</span></label>'
    + '<label class="toggle"><input type="checkbox" id="rulesToggle"' + (s.modifiedRules ? ' checked' : '') + ' onchange="S().modifiedRules=this.checked;updateRulesDesc()"><span class="slider"></span></label></div>'
    + '<div style="font-size:10px;color:var(--dim);line-height:1.5;margin-top:6px" id="rulesDesc">'
    + (s.modifiedRules
      ? '<strong>Variation ON:</strong> 3 runs scored as 4 \u00b7 +1 bonus run per ball \u00b7 wicket penalty −5 (ov 1-4) / −2 (ov 5-6) — subtracted from total \u00b7 pair bats all overs regardless of wickets'
      : '<strong>Standard Rules:</strong> Normal cricket scoring. Runs as scored. No wicket penalty. Innings ends after 2 wickets or overs limit.')
    + '</div></div>'
    + '<button class="btn btn-orange btn-block" onclick="startMatch()">Start Match \u2192</button>'
    + '<div style="font-size:11px;color:var(--dim);text-align:center;margin-top:6px" id="sessionSummaryLine">' + s.maxOvers + ' overs per pair \u00b7 ' + s.maxBallsPerBatter + ' balls max per batter</div></div>';
}

function loadPlayers() { readPlayersFromInput(); autoAssignPairs(); }

function updateSessionSettings() {
  const mo = document.getElementById('maxOversInput');
  const mb = document.getElementById('maxBallsInput');
  if (mo) S().maxOvers = parseInt(mo.value) || 6;
  if (mb) S().maxBallsPerBatter = parseInt(mb.value) || 18;
  const sl = document.getElementById('sessionSummaryLine');
  if (sl) sl.textContent = S().maxOvers + ' overs per pair \u00b7 ' + S().maxBallsPerBatter + ' balls max per batter';
}

function updateRulesDesc() {
  const d = document.getElementById('rulesDesc');
  if (!d) return;
  d.innerHTML = S().modifiedRules
    ? '<strong>Variation ON:</strong> 3 runs scored as 4 \u00b7 +1 bonus run per ball \u00b7 wicket penalty −5 (ov 1-4) / −2 (ov 5-6) — subtracted from total \u00b7 pair bats all overs regardless of wickets'
    : '<strong>Standard Rules:</strong> Normal cricket scoring. Runs as scored. No wicket penalty. Innings ends after 2 wickets or overs limit.';
}

function removePlayer(i) {
  S().allPlayers.splice(i, 1);
  for (const p of S().pairs) { if (!S().allPlayers.includes(p.b1)) p.b1 = ''; if (!S().allPlayers.includes(p.b2)) p.b2 = ''; }
  render();
}

function changeNumPairs() {
  const n = parseInt(document.getElementById('numPairs').value);
  S().numPairs = n;
  while (S().pairs.length < n) S().pairs.push({ b1: '', b2: '' });
  while (S().pairs.length > n) S().pairs.pop();
  render();
}

function setPair(idx, slot, val) {
  if (!S().pairs[idx]) S().pairs[idx] = { b1: '', b2: '' };
  if (slot === 1) S().pairs[idx].b1 = val; else S().pairs[idx].b2 = val;
}

function autoAssignPairs() {
  readPlayersFromInput();
  const pl = S().allPlayers;
  if (pl.length === 0) { alert('Enter player names first'); return; }
  const pairs = [];
  for (let i = 0; i < pl.length; i += 2) {
    if (i + 1 < pl.length) pairs.push({ b1: pl[i], b2: pl[i + 1] });
    else pairs.push({ b1: pl[i], b2: null });
  }
  S().numPairs = pairs.length;
  S().pairs = pairs;
  render();
}

function startMatch() {
  readPlayersFromInput();
  updateSessionSettings();
  if (S().allPlayers.length < 2) { alert('Enter at least 2 players'); return; }
  for (const p of S().pairs) { if (!p.b1) { alert('All pairs need at least 1 batter selected'); return; } }
  S().completedInnings = [];
  S().currentPairIdx = 0;
  S().view = 'pairselect';
  render();
}

function getCompletedPairIndices() {
  return S().completedInnings.map(function(inn) { return inn.pairIdx; });
}

function renderPairSelect() {
  const s = S();
  const completed = getCompletedPairIndices();
  const allDone = s.pairs.every(function(p, i) { return completed.includes(i); });
  if (allDone && s.completedInnings.length > 0) { s.view = 'summary'; render(); return; }
  if (allDone && s.completedInnings.length === 0) { s.view = 'setup'; render(); return; }

  let pairCards = '';
  for (let i = 0; i < s.pairs.length; i++) {
    const p = s.pairs[i];
    const done = completed.includes(i);
    pairCards += '<div class="card" style="' + (done ? 'opacity:0.5' : 'cursor:pointer') + '">'
      + '<div style="display:flex;justify-content:space-between;align-items:center">'
      + '<div><strong style="font-size:14px;color:var(--orange)">Pair ' + (i+1) + '</strong>'
      + '<div style="font-size:15px;margin-top:4px">' + p.b1 + (p.b2 ? ' &amp; ' + p.b2 : ' <span style="color:var(--orange)">(solo)</span>') + '</div></div>'
      + (done
        ? '<span style="color:var(--green);font-size:12px">\u2713 Completed</span>'
        : '<button class="btn btn-orange" onclick="beginInnings(' + i + ')" style="min-width:100px">\u25b6 Bat</button>')
      + '</div></div>';
  }

  document.getElementById('app').innerHTML = logoHTML(true)
    + '<div class="card"><h2>Select Pair to Bat</h2><div style="font-size:11px;color:var(--dim);margin-bottom:8px">'
    + s.maxOvers + ' overs per pair \u00b7 max ' + s.maxBallsPerBatter + ' balls each</div>'
    + pairCards
    + '<button class="btn btn-dark btn-block" onclick="S().view=\'summary\';render()" style="margin-top:8px">View Session Summary</button></div>'
    + '<button class="btn btn-dark btn-block" onclick="showBowlerSelectBeforeMatch()">Set Bowler for Next Pair</button></div>';
}

function beginInnings(pairIdx) {
  const idx = pairIdx !== undefined ? pairIdx : S().currentPairIdx;
  const p = S().pairs[idx];
  if (!p || !p.b1) { alert('Pair not configured'); return; }
  // Default bowler if not set
  const existing = S()._nextBowler || '';
  const excludes = p.b2 ? [p.b1, p.b2] : [p.b1];
  let avail = S().allPlayers.filter(function(n) { return !excludes.includes(n); });
  if (!existing || !avail.includes(existing)) {
    S()._nextBowler = avail[0] || '';
  }
  const inn = makeInnings(idx);
  if (!inn) { alert('Error creating innings. Please restart.'); return; }
  inn.currentBowler = S()._nextBowler || S().allPlayers[0] || '';
  S().innings = inn;
  S().currentPairIdx = idx;
  S().view = 'match';
  closeAllModals();
  render();
}

function showBowlerSelectBeforeMatch() {
  const p = S().pairs[0];
  if (!p) return;
  const excludes = p.b2 ? [p.b1, p.b2] : [p.b1];
  // Pre-select next bowler from all players not in first pair
  let avail = S().allPlayers.filter(function(n) { return !excludes.includes(n); });
  if (avail.length === 0) avail = S().allPlayers;
  const opts = avail.map(function(n) {
    return '<option value="' + n + '"' + (n === (S()._nextBowler || '') ? ' selected' : '') + '>' + n + '</option>';
  }).join('');
  const m = document.createElement('div');
  m.className = 'modal-overlay';
  m.innerHTML = '<div class="modal"><h3>Default Bowler</h3><div class="field"><label>Bowler for next pair</label>'
    + '<select id="preBowlerSel" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;color-scheme:dark">' + opts + '</select></div>'
    + '<div class="modal-actions"><button class="btn btn-orange" onclick="setPreBowler()" style="flex:1">Set</button>'
    + '<button class="btn btn-dark" onclick="closeAllModals()">Cancel</button></div></div>';
  document.body.appendChild(m);
}
function setPreBowler() {
  const sel = document.getElementById('preBowlerSel');
  if (sel && sel.value) S()._nextBowler = sel.value;
  closeAllModals();
}
function renderMatch() {
  const inn = S().innings;
  if (!inn) return;

  const card = (b, num) => {
    const nn = num === 1 ? inn.b1Name : inn.b2Name;
    const isStriker = inn.striker === num;
    const isRetired = b.legalBf >= S().maxBallsPerBatter && !b.howOut;
    return '<div class="bat-card' + (isStriker ? ' striker' : '') + '">'
      + '<div class="name">' + nn + (isStriker ? ' \u2726' : '') + '</div>'
      + '<div class="runs">' + (b.grossRuns !== undefined ? b.grossRuns : b.runs) + '</div>'
      + '<div class="stat"><span>' + b.bf + ' b</span><span>' + b.dotBalls + ' dots</span><span>' + b.fours + ' 4s</span><span>' + b.sixes + ' 6s</span></div>'
      + (b.howOut ? '<div class="dismissal-info">' + b.howOut + '</div>' : '')
      + (isRetired ? '<div class="retired">RETIRED</div>' : '')
      + '</div>';
  };

  // Over tracker: bonus/penalty entries are associated with previous ball, skip them
  const overEvents = inn.history.filter(h => h.over === inn.over && h.type !== 'bonus' && h.type !== 'penalty');
  const dots = [];
  let legalCount = 0;
  for (const ev of overEvents) {
    if (ev.type === 'wide' || ev.type === 'noball') {
      let cls = 'runs', lbl = ev.runs;
      if (ev.type === 'wide') { cls = 'wide'; lbl = 'Wd' + (ev.runs > 1 ? ev.runs : ''); }
      else if (ev.type === 'noball') { cls = 'noball'; lbl = 'NB' + (ev.runs > 1 ? ev.runs : ''); }
      dots.push('<div class="ball-dot ' + cls + '">' + lbl + '</div>');
    } else {
      legalCount++;
      let cls = 'runs', lbl = ev.runs;
      if (ev.type === 'wicket') { cls = 'wicket'; lbl = 'W'; }
      else if (ev.type === 'bye' || ev.type === 'legbye') { cls = 'byes'; lbl = ev.runs + 'b'; }
      dots.push('<div class="ball-dot ' + cls + '">' + lbl + '</div>');
    }
  }
  for (let i = legalCount + 1; i <= 6; i++) {
    dots.push('<div class="ball-dot empty">-</div>');
  }

  const ext = inn.extras;
  const extTotal = ext.wides + ext.noBalls + ext.byes + ext.legByes;
  const isNewOver = inn.legalBalls === 0 && inn.totalBalls > 0;

  const hist = [...inn.history].reverse().slice(0, 30).map(h => {
    let txt = '', cls = '';
    const nm = h.b === 1 ? inn.b1Name : inn.b2Name;
    if (h.type === 'wicket') { txt = nm + ' ' + h.mode + (h.fielder ? ' c ' + h.fielder : ''); cls = 'wkt'; }
    else if (h.type === 'wide') { txt = 'Wide' + (h.runs > 1 ? ' +' + (h.runs-1) : ''); cls = 'wide'; }
    else if (h.type === 'noball') { txt = 'NB ' + h.runs + 'r \u2726FH'; cls = 'nb'; }
    else if (h.type === 'bye') { txt = h.runs + ' bye' + (h.runs > 1 ? 's' : ''); cls = 'bye'; }
    else if (h.type === 'legbye') { txt = h.runs + ' leg bye' + (h.runs > 1 ? 's' : ''); cls = 'bye'; }
    else if (h.type === 'bonus') { txt = '+1 bonus ' + (h.bonusBatter || nm); cls = 'bonus'; }
    else if (h.type === 'penalty') { txt = 'Penalty ' + h.runs; cls = 'penalty'; }
    else { txt = nm + ' ' + h.runs + (h.bonus ? '+1' : ''); if (h.bonus) cls = 'bonus'; }
    return '<div class="hist-item"><span class="ball">' + h.over + '.' + h.ballNum + '</span><span class="evt ' + cls + '">' + txt + '</span><span class="total">' + h.runningTotal + '</span></div>';
  }).join('');

  const excludes = [inn.b1Name, inn.b2Name].filter(Boolean);
  const bowlerOpts = S().allPlayers.filter(n => !excludes.includes(n)).map(n =>
    '<option value="' + n + '"' + (n === inn.currentBowler ? ' selected' : '') + '>' + n + '</option>'
  ).join('');

  const strikerCanBat = canBat(inn.striker);

  document.getElementById('app').innerHTML = logoHTML(true)
    + '<div style="display:flex;gap:4px;margin-bottom:8px">'
    + '<button class="btn btn-sm btn-dark" onclick="S().view=\'match\';closeAllModals();render()" style="flex:1' + (S().view === 'match' ? ';border-color:var(--orange)' : '') + '">Scoring</button>'
    + '<button class="btn btn-sm btn-dark" onclick="showScorecard()" style="flex:1">Scorecard</button></div>'
    + '<div class="match-header">'
    + '<div class="info"><strong>Pair ' + inn.pairNo + '/' + S().pairs.length + '</strong> \u00b7 ' + inn.b1Name + (inn.isSolo ? ' (solo)' : ' &amp; ' + inn.b2Name) + '</div>'
    + '<div class="bowler-select"><label>Bowler</label><select onchange="S().innings.currentBowler=this.value">' + bowlerOpts + '</select>'
    + (isNewOver ? '<span class="new-over-badge">NEW OVER</span>' : '') + '</div></div>'
    + '<div class="match-bar"><div>'
    + '<div class="score">' + inn.total + '/' + inn.wkts + (extTotal > 0 ? ' <small>ext ' + extTotal + '</small>' : '') + '</div>'
    + '<div style="font-size:10px;color:var(--dim)">' + inn.b1Name + ': ' + inn.b1.runs + (inn.isSolo ? '' : ' &nbsp; ' + inn.b2Name + ': ' + inn.b2.runs) + '</div></div>'
    + '<div class="meta"><div><strong>' + oversDisplay(inn) + '</strong></div>'
    + '<div>Over ' + (inn.over + 1) + '/' + inn.maxOvers + '</div>'
    + (inn.freeHit ? '<div class="fh">\u2726 FREE HIT</div>' : '') + '</div></div>'
    + (inn.isSolo
      ? '<div class="scoreboard">' + card(inn.b1, 1) + '</div>'
      : '<div class="scoreboard">' + card(inn.b1, 1) + '<div style="display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--dim)">vs</div>' + card(inn.b2, 2) + '</div>')
    + (inn.complete
      ? '<button class="btn btn-orange btn-block" onclick="nextPair()" style="margin-bottom:10px">\u2713 Pair Complete — Select Next Pair</button>'
      : '<div class="over-tracker">' + dots.join('') + '</div>'
      + '<div class="controls">'
      + '<div class="sec-label">Runs' + (inn.freeHit ? '<span class="badge badge-fh">\u2726 FREE HIT</span>' : '') + (inn.bonusActive ? '<span class="badge badge-bonus">+1 BONUS</span>' : '') + '</div>'
      + '<div class="run-btns">'
      + [0,1,2,3,4,5,6].map(n => '<button class="btn r' + n + (strikerCanBat ? '' : ' retired-btn') + '" onclick="scoreRuns(' + n + ')"' + (strikerCanBat ? '' : ' disabled') + '>' + n + '</button>').join('')
      + '</div>'
      + '<div class="sec-label">Extras</div>'
      + '<div class="extras-btns">'
      + '<button class="btn btn-dark" onclick="wideBall()">Wide</button>'
      + '<button class="btn btn-dark" onclick="noBall()">No Ball</button>'
      + '<button class="btn btn-dark" onclick="byes()">Bye</button>'
      + '<button class="btn btn-dark" onclick="legByes()">Leg Bye</button>'
      + '<button class="btn btn-dark" onclick="penaltyRuns()">Penalty</button></div>'
      + '<div class="action-btns">'
      + '<button class="btn ' + (inn.bonusActive ? 'btn-orange' : 'btn-dark') + '" onclick="toggleBonus()">+1 Bonus</button>'
      + (inn.isSolo ? '' : '<button class="btn btn-dark" onclick="swapStrike()">\u21c4 Swap</button>')
      + '<button class="btn btn-red" onclick="wicket()">WICKET</button>'
      + '<button class="btn btn-dark" onclick="undo()">\u21a9 Undo</button>'
      + '<button class="btn btn-dark" onclick="showLiveSessionStats()">Session Stats</button>'
      + '<button class="btn btn-dark" onclick="endInnings()">End Inns</button>'
      + '<button class="btn btn-dark" onclick="endMatch()">End All</button></div></div>')
    + '<div class="history"><div class="hdr">Ball-by-ball</div>'
    + (hist || '<div style="font-size:11px;color:var(--dim)">No balls yet</div>') + '</div>';
}

function showScorecard() { S().view = 'scorecard'; closeAllModals(); render(); }

function renderScorecard() {
  const inn = S().innings;
  if (!inn) { S().view = 'match'; render(); return; }
  const b1 = inn.b1, b2 = inn.b2;
  const ext = inn.extras;
  const extTotal = ext.wides + ext.noBalls + ext.byes + ext.legByes;

  const bData = inn.isSolo
    ? [{ name: inn.b1Name, runs: b1.runs, balls: b1.bf, dotBalls: b1.dotBalls, fours: b1.fours, sixes: b1.sixes, threes: b1.threes || 0, bonusRuns: b1.bonusRuns, howOut: b1.howOut, retired: b1.legalBf >= S().maxBallsPerBatter }]
    : [{ name: inn.b1Name, runs: b1.runs, balls: b1.bf, dotBalls: b1.dotBalls, fours: b1.fours, sixes: b1.sixes, threes: b1.threes || 0, bonusRuns: b1.bonusRuns, howOut: b1.howOut, retired: b1.legalBf >= S().maxBallsPerBatter }, { name: inn.b2Name, runs: b2.runs, balls: b2.bf, dotBalls: b2.dotBalls, fours: b2.fours, sixes: b2.sixes, threes: b2.threes || 0, bonusRuns: b2.bonusRuns, howOut: b2.howOut, retired: b2.legalBf >= S().maxBallsPerBatter }];
  let bHtml = '';
  for (const b of bData) {
    const dis = b.howOut || (b.retired ? 'Retired' : (inn.complete ? 'Not Out' : 'Batting'));
    bHtml += '<tr><td class="name">' + b.name + '</td><td>' + (b.grossRuns !== undefined ? b.grossRuns : b.runs) + '</td><td>' + b.balls + '</td><td>' + b.dotBalls + '</td><td>' + b.fours + '</td><td>' + b.sixes + '</td><td>' + b.threes + '</td><td>' + (b.bonusRuns || '') + '</td><td style="font-size:10px;color:var(--dim)">' + dis + '</td></tr>';
  }

  const bd = {};
  for (const h of inn.history) {
    if (!h.bowler) continue;
    if (!bd[h.bowler]) bd[h.bowler] = { balls: 0, runs: 0, wkts: 0, wides: 0, noballs: 0, dots: 0 };
    if (h.type !== 'wide' && h.type !== 'noball') {
      bd[h.bowler].balls++;
      if (h.runs === 0 && (h.type === 'run' || h.type === 'wicket')) bd[h.bowler].dots++;
    }
    if (h.type === 'wicket' && h.mode !== 'Run Out') bd[h.bowler].wkts++;
    if (h.type === 'wide') bd[h.bowler].wides++;
    if (h.type === 'noball') bd[h.bowler].noballs++;
    if (h.runs > 0 && h.type !== 'bye' && h.type !== 'legbye') bd[h.bowler].runs += h.runs;
  }
  let bowlHtml = '';
  for (const [name, st] of Object.entries(bd)) {
    const ovs = Math.floor((st.balls || 0) / 6) + '.' + ((st.balls || 0) % 6);
    bowlHtml += '<tr><td class="name">' + name + '</td><td>' + ovs + '</td><td>' + (st.runs || 0) + '</td><td>' + (st.wkts || 0) + '</td><td>' + (st.wides || 0) + '</td><td>' + (st.noballs || 0) + '</td><td>' + (st.dots || 0) + '</td></tr>';
  }

  const histHtml = [...inn.history].reverse().slice(0, 50).map(h => {
    let txt = '';
    const nm = h.b === 1 ? inn.b1Name : inn.b2Name;
    if (h.type === 'wicket') txt = nm + ' ' + h.mode + (h.fielder ? ' c ' + h.fielder : '') + ' (' + h.runs + 'r)';
    else if (h.type === 'wide') txt = 'Wide' + (h.runs > 1 ? ' +' + (h.runs-1) : '');
    else if (h.type === 'noball') txt = 'NB ' + h.runs + 'r';
    else if (h.type === 'bye') txt = h.runs + ' bye' + (h.runs > 1 ? 's' : '');
    else if (h.type === 'legbye') txt = h.runs + ' leg bye' + (h.runs > 1 ? 's' : '');
    else if (h.type === 'penalty') txt = 'Penalty ' + h.runs;
    else txt = nm + ' ' + h.runs + (h.bonus ? '+1' : '');
    return '<div class="hist-item"><span class="ball">' + h.over + '.' + h.ballNum + '</span><span class="evt">' + txt + '</span><span class="total">' + h.runningTotal + '</span></div>';
  }).join('') || '<div style="font-size:11px;color:var(--dim)">No balls yet</div>';

  document.getElementById('app').innerHTML = logoHTML(true)
    + '<div style="display:flex;gap:4px;margin-bottom:8px">'
    + '<button class="btn btn-sm btn-dark" onclick="S().view=\'match\';render()" style="flex:1">Scoring</button>'
    + '<button class="btn btn-sm btn-dark" onclick="showScorecard()" style="flex:1;border-color:var(--orange)">Scorecard</button></div>'
    + '<div class="scorecard-view">'
    + '<div class="sc-header"><h2>Pair ' + inn.pairNo + '</h2><p>' + inn.b1Name + ' &amp; ' + inn.b2Name + ' \u00b7 Over ' + (inn.over + 1) + '/' + inn.maxOvers + '</p></div>'
    + '<div class="summary-card"><h2>Batting</h2><table class="summary-table">'
    + '<tr><th>Batter</th><th>R</th><th>B</th><th>Dots</th><th>4s</th><th>6s</th><th>3s</th><th>Bonus</th><th>How Out</th></tr>'
    + bHtml
    + '<tr><td style="font-weight:700;padding-top:6px;border-top:1px solid var(--border)">Extras</td><td colspan="8" style="padding-top:6px;border-top:1px solid var(--border);font-size:10px;color:var(--dim)">b ' + ext.byes + ' \u00b7 lb ' + ext.legByes + ' \u00b7 w ' + ext.wides + ' \u00b7 nb ' + ext.noBalls + ' \u00b7 <strong>Total ' + extTotal + '</strong></td></tr>'
    + '<tr><td style="font-weight:700;font-size:14px;color:var(--orange)">Total</td><td colspan="8" style="font-weight:800;font-size:16px;color:var(--orange)">' + inn.total + '/' + inn.wkts + ' <span style="font-weight:400;font-size:12px;color:var(--dim)">(' + inn.over + '.' + inn.legalBalls + ' ov)</span></td></tr>'
    + '</table></div>'
    + (bowlHtml ? '<div class="summary-card"><h2>Bowling</h2><table class="summary-table"><tr><th>Bowler</th><th>O</th><th>R</th><th>W</th><th>Wd</th><th>NB</th><th>Dots</th></tr>' + bowlHtml + '</table></div>' : '')
    + '<div class="summary-card"><h2>Ball-by-ball</h2><div class="history" style="max-height:300px">' + histHtml + '</div></div>'
    + '<button class="btn btn-dark btn-block" onclick="S().view=\'match\';render()">\u2190 Back to Scoring</button></div>';
}

function scoreRuns(runs) {
  const inn = S().innings;
  if (!inn || inn.complete) return;
  const st = striker();
  if (!st || !canBat(inn.striker)) {
    tryRotateStrike();
    render();
    return;
  }
  if (inn.bonusActive) {
    pushUndo();
    applyRuns(runs, true, inn.striker);
    tryRotateStrike(); checkOver(); checkLimits(); render();
    return;
  }
  pushUndo();
  applyRuns(runs, false, null);
  tryRotateStrike(); checkOver(); checkLimits(); render();
}

function applyRuns(runs, hadBonus, bonusBatter) {
  const inn = S().innings;
  if (!inn) return;
  let total = runs;
  if (S().modifiedRules && runs === 3) total = 4;

  const st = striker();
  if (!st) return;
  
  // The batter facing this ball (the striker at the start of this ball)
  inn.lastLegalStriker = inn.striker;
  
  if (!hadBonus || !bonusBatter || runs !== 1) {
    st.runs += total; st.grossRuns += total; st.bf++; if (st.legalBf < S().maxBallsPerBatter) st.legalBf++;
    if (total === 0) st.dotBalls++;
    if (runs === 3) st.threes++;
    if (runs === 4) st.fours++;
    if (runs === 6) st.sixes++;
    inn.total += total;
    inn.legalBalls++; inn.totalBalls++;
    if (runs % 2 === 1 && !inn.isSolo) inn.striker = inn.striker === 1 ? 2 : 1;
    inn.history.push({
      type: 'run', over: inn.over, ballNum: inn.legalBalls,
      b: inn.lastLegalStriker, runs: total, bonus: hadBonus,
      freeHit: inn.freeHit, bowler: inn.currentBowler, runningTotal: inn.total
    });
  } else {
    st.runs += runs; st.grossRuns += runs; st.bf++; if (st.legalBf < S().maxBallsPerBatter) st.legalBf++;
    if (runs === 0) st.dotBalls++;
    if (runs === 3) st.threes++;
    st.bonusRuns++;
    if (runs === 4) st.fours++;
    if (runs === 6) st.sixes++;
    const bb = bonusBatter === 1 ? inn.b1 : inn.b2;
    bb.runs += 1; bb.grossRuns += 1;
    if (bb.bf === 0) { bb.bf++; if (bb.legalBf < S().maxBallsPerBatter) bb.legalBf++; }
    inn.total += total;
    inn.legalBalls++; inn.totalBalls++;
    if (runs % 2 === 1) inn.striker = inn.striker === 1 ? 2 : 1;
    inn.history.push({
      type: 'run', over: inn.over, ballNum: inn.legalBalls,
      b: inn.lastLegalStriker, runs: total, bonus: true,
      freeHit: inn.freeHit, bowler: inn.currentBowler, runningTotal: inn.total
    });
  }

  inn.bonusActive = false;
  inn.freeHit = false;
}

function showBonusPick(runs) {

function pickBonus(batterNum) {
  closeAllModals();
  const inn = S().innings;
  if (!inn || inn.complete) return;
  const d = window._bonusData || { runs: 0 };
  window._bonusData = null;

}

function cancelBonus() {
  closeAllModals();

}

function showPickModal(title, values) {
  closeAllModals();

function handlePick() {
  const v = window._pickVal;
  window._pickVal = null;
  if (v === null) return;
  const inn = S().innings;
  if (!inn || inn.complete) return;
  if (window._pickFn) {
    const fn = window._pickFn;
    window._pickFn = null;
    fn(v);
  }
}

function wideBall() {
  const inn = S().innings;
  if (!inn || inn.complete) return;
  window._pickFn = function(extra) {
    const inn2 = S().innings;
    if (!inn2 || inn2.complete) return;
    pushUndo();
    const total = 1 + extra;
    inn2.total += total;
    inn2.extras.wides += total;
    inn2.totalBalls++;
    const wideStriker = inn2.striker;
    if (extra % 2 === 1 && !inn2.isSolo) inn2.striker = inn2.striker === 1 ? 2 : 1;
    const wbNum = inn2.totalBalls;
    inn2.history.push({
      type: 'wide', over: inn2.over, ballNum: wbNum,
      displayOrder: inn2.totalBalls,
      b: wideStriker, runs: total, freeHit: false,
      bowler: inn2.currentBowler, runningTotal: inn2.total
    });
    tryRotateStrike();
    render();
  };
  showPickModal('Wide \u2014 runs batted?', [0, 1, 2, 3, 4]);
}

function noBall() {
  const inn = S().innings;
  if (!inn || inn.complete) return;
  window._pickFn = function(runs) {
    const inn2 = S().innings;
    if (!inn2 || inn2.complete) return;
    pushUndo();
    const st = striker();
    if (!st) return;
    if (runs === 3) st.threes++;
    const batRuns = S().modifiedRules && runs === 3 ? 4 : runs;
    st.runs += batRuns; st.grossRuns += batRuns; st.bf++;
    if (batRuns === 0) st.dotBalls++;
    if (runs === 4) st.fours++;
    if (runs === 6) st.sixes++;
    inn2.total += 1 + batRuns;
    inn2.extras.noBalls += 1;
    inn2.totalBalls++;
    const nbStriker = inn2.striker;
    if (runs % 2 === 1 && !inn2.isSolo) inn2.striker = inn2.striker === 1 ? 2 : 1;
    const nbNum = inn2.totalBalls;
    inn2.history.push({
      type: 'noball', over: inn2.over, ballNum: nbNum,
      displayOrder: inn2.totalBalls,
      b: nbStriker, runs: 1 + batRuns, freeHit: false,
      bowler: inn2.currentBowler, runningTotal: inn2.total
    });
    inn2.freeHit = true;
    tryRotateStrike();
    render();
  };
  showPickModal('No Ball \u2014 runs scored?', [0, 1, 2, 3, 4, 6]);
}

function byes() {

    const inn2 = S().innings;

    if (!canBat(inn2.striker)) { tryRotateStrike(); render(); return; }
    pushUndo();
    const st = striker();
    if (!st) return;
    st.bf++; if (st.legalBf < S().maxBallsPerBatter) st.legalBf++; st.dotBalls++;
    inn2.total += runs;
    inn2.extras.byes += runs;
    inn2.legalBalls++;
    inn2.totalBalls++;
    const byeStriker = inn2.striker;
    if (runs % 2 === 1 && !inn2.isSolo) inn2.striker = inn2.striker === 1 ? 2 : 1;
    inn2.history.push({
      type: 'bye', over: inn2.over, ballNum: inn2.legalBalls,
      b: byeStriker, runs: runs, freeHit: false,
      bowler: inn2.currentBowler, runningTotal: inn2.total
    });
    inn2.freeHit = false; tryRotateStrike(); checkOver(); checkLimits(); render();
  };
  showPickModal('How many byes?', [1, 2, 3, 4]);
}

function penaltyRuns() {
  const inn = S().innings;
  if (!inn || inn.complete) return;
  window._pickFn = function(runs) {
    const inn2 = S().innings;
    if (!inn2 || inn2.complete) return;

    // Penalty subtracts from team score
    inn2.total -= runs;
    inn2.extras.penalty = (inn2.extras.penalty || 0) + runs;
    inn2.history.push({
      type: 'penalty', over: inn2.over, ballNum: inn2.legalBalls + 1,
      b: inn2.striker, runs: -runs, freeHit: false,
      bowler: inn2.currentBowler, runningTotal: inn2.total
    });
    render();
  };
  showPickModal('Penalty runs (−)?', [1, 2, 3, 4]);

function wicket() {
  const inn = S().innings;
  if (!inn || inn.complete) return;
  closeAllModals();
  const modes = inn.freeHit ? ['Run Out'] : ['Bowled','LBW','Caught','Run Out','Stumped','Hit Wicket'];
  const m = document.createElement('div');
  m.className = 'modal-overlay'; m.id = 'wm';
  m.innerHTML = '<div class="modal"><h3>Dismissal' + (inn.freeHit ? ' <span style="font-size:10px;color:var(--amber)">(Free hit - Run out only)</span>' : '') + '</h3>'
    + '<div class="field"><label>Mode</label><div class="mode-grid" id="mg">'
    + modes.map(function(md) {
      return '<button class="btn btn-sm" onclick="selMode(\'' + md + '\')" data-m="' + md + '" style="background:var(--card2);color:var(--text);padding:9px;font-size:11px;border:2px solid transparent;border-radius:8px">' + md + '</button>';
    }).join('')
    + '</div></div>'
    + '<div class="field" id="ff" style="display:none"><label>Fielder</label>'
    + '<select id="fs" style="color-scheme:dark"><option value="">Select fielder</option>'
    + S().allPlayers.map(function(n) { return '<option value="' + n + '" style="color:var(--text);background:var(--bg)">' + n + '</option>'; }).join('')
    + '<option value="other" style="color:var(--text);background:var(--bg)">Other...</option></select>'
    + '<input id="fo" placeholder="Fielder name" style="display:none;margin-top:4px"></div>'
    + '<div class="field" id="rf" style="display:none"><label>Batter out</label>'
    + '<select id="rb" style="color-scheme:dark"><option value="1">' + inn.b1Name + ' (striker)</option><option value="2">' + inn.b2Name + ' (non-striker)</option></select></div>'
    + '<div class="modal-actions"><button class="btn btn-dark" onclick="closeWktModal()">Cancel</button>'
    + '<button class="btn btn-orange" onclick="confirmWkt()">Confirm</button></div></div>';

}

function closeWktModal() { const m = document.getElementById('wm'); if (m) m.remove(); window._wd = null; }

function selMode(m) {
  document.querySelectorAll('#mg .btn').forEach(function(b) { b.classList.remove('selected'); });
  const btn = document.querySelector('[data-m="' + m + '"]');
  if (btn) btn.classList.add('selected');
  window._wd.mode = m;
  if (m === 'Bowled' || m === 'LBW' || m === 'Hit Wicket') {
    pushUndo();
    closeWktModal();
    processWkt(m, null, S().innings.striker);
    return;
  }
  const ff = document.getElementById('ff'), rf = document.getElementById('rf');
  ff.style.display = (m === 'Caught' || m === 'Run Out' || m === 'Stumped') ? 'block' : 'none';
  rf.style.display = m === 'Run Out' ? 'block' : 'none';
}

function confirmWkt() {
  const inn = S().innings;
  if (!inn) return;
  const d = window._wd;
  if (!d || !d.mode) { alert('Select a dismissal mode'); return; }
  pushUndo();
  let f = null;
  if (d.mode === 'Caught' || d.mode === 'Run Out' || d.mode === 'Stumped') {
    const sel = document.getElementById('fs');
    if (sel) {
      const fo = document.getElementById('fo');
      f = sel.value === 'other' ? ((fo && fo.value && fo.value.trim()) || 'Unknown') : (sel.value || 'Unknown');
    }
  }
  let ob = inn.striker;
  if (d.mode === 'Run Out') {
    const rb = document.getElementById('rb');
    if (rb) ob = parseInt(rb.value);
    // Show runs picker first
    closeWktModal();
    window._runOutData = { mode: d.mode, fielder: f, outB: ob };
    showPickModal('Runs completed before run out?', [0, 1, 2, 3, 4]);
    window._pickFn = function(runs) {
      const rod = window._runOutData;
      window._runOutData = null;
      if (!rod) return;
      processWkt(rod.mode, rod.fielder, rod.outB, runs);
    };
    return;
  }
  closeWktModal();
  processWkt(d.mode, f, ob);
}

function swapStrike() {
  const inn = S().innings;
  if (!inn || inn.complete) return;
  pushUndo();
  inn.striker = inn.striker === 1 ? 2 : 1;
  render();
}

function tryRotateStrike() {
  const inn = S().innings;
  if (!inn || inn.isSolo) return;
  if (!canBat(inn.striker)) {
    const other = inn.striker === 1 ? 2 : 1;
    if (canBat(other)) inn.striker = other;
  }
}

function processWkt(mode, fielder, outB, runOutRuns) {
  const inn = S().innings;
  const bat = outB === 1 ? inn.b1 : inn.b2;

  // Handle runs completed on a run out
  let runsOnPlay = 0;
  if (mode === 'Run Out' && runOutRuns > 0) {
    runsOnPlay = runOutRuns;
    // Credit runs to the striker
    const st = striker();
    if (st) {
      st.runs += runsOnPlay;
      st.grossRuns = (st.grossRuns || 0) + runsOnPlay;
      st.bf++;
      if (st.legalBf < S().maxBallsPerBatter) st.legalBf++;
      if (runsOnPlay === 4) st.fours++;
      if (runsOnPlay === 6) st.sixes++;
    }
    inn.total += runsOnPlay;
    if (!inn.isSolo && runOutRuns % 2 === 1 && outB !== inn.striker) {
      // Runs completed involved striker, change strike
      inn.striker = inn.striker === 1 ? 2 : 1;
    }
  }

  if (S().modifiedRules) {
    const penalty = inn.over <= 3 ? 5 : 2;
    bat.runs -= penalty;
    inn.total -= penalty;
    inn.extras.penalty = (inn.extras.penalty || 0) + penalty;
    // Only count ball+legalBf if batter didn't already get credit from runs
    if (runsOnPlay === 0) {
      bat.bf++;
      if (bat.legalBf < S().maxBallsPerBatter) bat.legalBf++;
    }
    inn.wkts++;
    inn.legalBalls++;
    inn.totalBalls++;
    if (inn.legalBalls % 6 === 0) inn.ball6 = true;
    inn.history.push({
      type: 'wicket', over: inn.over, ballNum: inn.legalBalls,
      b: outB, runs: (runsOnPlay - penalty), mode: mode, fielder: fielder,
      bowler: inn.currentBowler, freeHit: false, runningTotal: inn.total
    });
    inn.freeHit = false;
    checkOver();
    if (inn.over >= inn.maxOvers) inn.complete = true;
    if ((inn.b1.legalBf >= S().maxBallsPerBatter || !canBat(1)) && (inn.b2.legalBf >= S().maxBallsPerBatter || !canBat(2))) inn.complete = true;
    tryRotateStrike();
    render();
  } else {
    // Standard rules - only count ball/bf if not already credited
    if (runsOnPlay === 0) {
      bat.bf++;
      if (bat.legalBf < S().maxBallsPerBatter) bat.legalBf++;
      bat.dotBalls++;
    }
    bat.dismissals++;
    bat.howOut = mode;
    bat.fielder = fielder;
    bat.bowlerOut = inn.currentBowler;
    inn.wkts++;
    inn.legalBalls++;
    inn.totalBalls++;
    if (mode === 'Run Out' && outB !== inn.striker) {
      // non-striker out, striker keeps strike
    } else if (!inn.isSolo) {
      inn.striker = inn.striker === 1 ? 2 : 1;
    }
    inn.history.push({
      type: 'wicket', over: inn.over, ballNum: inn.legalBalls,
      b: outB, runs: runsOnPlay, mode: mode, fielder: fielder,
      bowler: inn.currentBowler, freeHit: false, runningTotal: inn.total
    });
    inn.freeHit = false;
    checkOver();
    if (inn.b1.howOut && inn.b2.howOut) inn.complete = true;
    checkLimits();
    tryRotateStrike();
    render();
  }
}

function checkOver() {
  const inn = S().innings;
  if (!inn) return;
  if (inn.legalBalls >= 6) {
    inn.prevBowler = inn.currentBowler;
    if (!inn.isSolo) inn.striker = inn.striker === 1 ? 2 : 1;
    inn.over++;
    inn.legalBalls = 0;
    inn.freeHit = false;
    tryRotateStrike();
    if (inn.over >= inn.maxOvers) inn.complete = true;
    if (!inn.complete && S().view === 'match') {
      showBowlerSelect('Over complete! Next bowler?');
    }
  }
}

function checkLimits() {
  const inn = S().innings;
  if (!inn) return;
  if (inn.over >= inn.maxOvers) inn.complete = true;
  if (inn.isSolo) {
    if (inn.b1.legalBf >= S().maxBallsPerBatter || !canBat(1)) inn.complete = true;
  } else if (S().modifiedRules) {
    if ((inn.b1.legalBf >= S().maxBallsPerBatter || !canBat(1)) && (inn.b2.legalBf >= S().maxBallsPerBatter || !canBat(2))) inn.complete = true;
  } else {
    if (inn.wkts >= 2) inn.complete = true;
    if ((inn.b1.legalBf >= S().maxBallsPerBatter || inn.b1.howOut) && (inn.b2.legalBf >= S().maxBallsPerBatter || inn.b2.howOut)) inn.complete = true;
  }
  if (inn.complete) tryRotateStrike();
}

function getAvailableBowlers() {
  const inn = S().innings;
  if (!inn) return [];
  const excludes = [inn.b1Name, inn.b2Name];
  // Don't allow same bowler as previous over
  if (inn.prevBowler && inn.over > 0) excludes.push(inn.prevBowler);
  let avail = S().allPlayers.filter(function(n) { return !excludes.includes(n); });
  // If no one else is available, allow previous bowler
  if (avail.length === 0 && inn.prevBowler) {
    avail = S().allPlayers.filter(function(n) { return n !== inn.b1Name && n !== inn.b2Name; });
  }
  return avail;
}

function showBowlerSelect(msg) {
  const inn = S().innings;
  if (!inn || inn.complete) return;
  closeAllModals();
  let avail = getAvailableBowlers();
  if (avail.length === 0 && inn.currentBowler) {
    avail = [inn.currentBowler];
  }
  if (avail.length === 0) {
    avail = S().allPlayers.filter(function(n) { return n !== inn.b1Name && n !== inn.b2Name; });
  }
  if (avail.length === 0) { endInnings(); return; }
  const opts = avail.map(function(n) {
    return '<option value="' + n + '"' + (n === inn.currentBowler ? ' selected' : '') + '>' + n + '</option>';
  }).join('');
  const m = document.createElement('div');
  m.className = 'modal-overlay'; m.id = 'bm';
  m.innerHTML = '<div class="modal" style="text-align:center">'
    + '<h3>' + msg + '</h3>'
    + '<div class="field"><select id="bowlerSel" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;color-scheme:dark">' + opts + '</select></div>'
    + '<div class="modal-actions"><button class="btn btn-orange" onclick="confirmBowler()" style="flex:1">Set Bowler</button><button class="btn btn-dark" onclick="closeAllModals();render()" style="flex:1">Cancel</button></div></div>';
  document.body.appendChild(m);
}

function confirmBowler() {
  const inn = S().innings;
  if (!inn || inn.complete) { closeAllModals(); render(); return; }
  const sel = document.getElementById('bowlerSel');
  if (sel && sel.value) inn.currentBowler = sel.value;
  closeAllModals();
  render();
}

function toggleBonus() {
  const inn = S().innings;
  if (!inn || inn.complete) return;
  // Direct credit to last legal striker (no pre-activation mode)
  const targetBatter = inn.lastLegalStriker === 1 ? inn.b1 : (inn.lastLegalStriker === 2 ? inn.b2 : striker());
  if (!targetBatter) return;
  pushUndo();
  targetBatter.runs += 1;
  targetBatter.grossRuns = (targetBatter.grossRuns || 0) + 1;
  targetBatter.bonusRuns = (targetBatter.bonusRuns || 0) + 1;
  inn.total += 1;
  // Add bonus history entry linked to the last ball
  const lastEntry = inn.history.length > 0 ? inn.history[inn.history.length - 1] : null;
  const bonusBallNum = lastEntry ? lastEntry.ballNum : (inn.legalBalls + 1);
  const bonusOver = lastEntry ? lastEntry.over : inn.over;
  const bonusBatter = inn.lastLegalStriker === 1 ? inn.b1Name : (inn.lastLegalStriker === 2 ? inn.b2Name : inn.b1Name);
  inn.history.push({
    type: 'bonus', over: bonusOver, ballNum: bonusBallNum,
    b: inn.lastLegalStriker || inn.striker, runs: 1, bonus: true,
    bonusBatter: bonusBatter,
    freeHit: false, bowler: inn.currentBowler, runningTotal: inn.total
  });
  inn.bonusActive = false;
  inn.freeHit = false;
  render();
}

function endInnings() { if (confirm('End this innings?')) { S().innings.complete = true; closeAllModals(); render(); } }
function endMatch() { if (confirm('End entire match?')) { S().innings.complete = true; nextPair(); } }
function saveInnings() { S().completedInnings.push(JSON.parse(JSON.stringify(S().innings))); }

// Live session stats modal
function showLiveSessionStats() {
  const s = S();
  const completed = s.completedInnings;
  if (completed.length === 0) { alert('No completed innings yet'); return; }
  
  // Aggregate batting
  const bat = {};
  for (const inn of completed) {
    [ {name: inn.b1Name, b: inn.b1}, {name: inn.b2Name, b: inn.b2} ].forEach(function(item) {
      if (!bat[item.name]) bat[item.name] = {runs:0, bf:0, dots:0, fours:0, sixes:0, threes:0, bonus:0, dismissals:0};
      const b = bat[item.name];
      b.runs += (item.b.grossRuns !== undefined ? item.b.grossRuns : item.b.runs);
      b.bf += item.b.bf;
      b.dots += item.b.dotBalls || 0;
      b.fours += item.b.fours;
      b.sixes += item.b.sixes;
      b.threes += item.b.threes || 0;
      b.bonus += item.b.bonusRuns || 0;
    });
    for (const h of inn.history || []) {
      if (h.type === 'wicket') {
        const nm = h.b === 1 ? inn.b1Name : inn.b2Name;
        if (bat[nm]) bat[nm].dismissals++;
      }
    }
  }
  
  // Aggregate bowling
  const bowl = {};
  for (const inn of completed) {
    for (const h of inn.history || []) {
      if (!h.bowler) continue;
      if (!bowl[h.bowler]) bowl[h.bowler] = {balls:0, runs:0, wkts:0, wides:0, noballs:0, dots:0};
      if (h.type === 'wide') { bowl[h.bowler].wides++; continue; }
      if (h.type === 'noball') { bowl[h.bowler].noballs++; continue; }
      bowl[h.bowler].balls++;
      if (h.type === 'wicket' && h.mode !== 'Run Out') bowl[h.bowler].wkts++;
      const conceded = h.type === 'bye' || h.type === 'legbye' ? 0 : (h.runs > 0 ? h.runs : 0);
      if (conceded > 0) bowl[h.bowler].runs += conceded;
      if ((h.type === 'run' && h.runs === 0) || h.type === 'wicket') bowl[h.bowler].dots++;
    }
  }
  
  let bHtml = '';
  Object.keys(bat).sort().forEach(function(name) {
    const b = bat[name];
    const sr = b.bf > 0 ? ((b.runs / b.bf) * 100).toFixed(0) : '-';
    bHtml += '<tr><td style="font-weight:600;padding:3px 6px">' + name + '</td>'

      + '<td style="padding:3px 6px;text-align:center;color:var(--dim)">' + b.dots + '</td>'
      + '<td style="padding:3px 6px;text-align:center">' + b.fours + '</td>'
      + '<td style="padding:3px 6px;text-align:center">' + b.sixes + '</td>'

      + '<td style="padding:3px 6px;text-align:center;color:var(--orange)">' + (b.bonus || '') + '</td>'
      + '<td style="padding:3px 6px;text-align:center">' + sr + '</td>'
      + '<td style="padding:3px 6px;text-align:center;color:var(--red)">' + (b.dismissals || '') + '</td></tr>';
  });
  
  let bowlHtml = '';
  Object.keys(bowl).forEach(function(name) {
    const bw = bowl[name];
    const ovs = Math.floor((bw.balls || 0) / 6) + '.' + ((bw.balls || 0) % 6);
    const econ = bw.balls > 0 ? (bw.runs / (bw.balls / 6)).toFixed(2) : '-';
    bowlHtml += '<tr><td style="font-weight:600;padding:3px 6px">' + name + '</td>'
      + '<td style="padding:3px 6px;text-align:center">' + ovs + '</td>'
      + '<td style="padding:3px 6px;text-align:center">' + (bw.runs || 0) + '</td>'
      + '<td style="padding:3px 6px;text-align:center">' + (bw.wkts || 0) + '</td>'
      + '<td style="padding:3px 6px;text-align:center;color:var(--dim)">' + (bw.wides || 0) + '</td>'
      + '<td style="padding:3px 6px;text-align:center;color:var(--dim)">' + (bw.noballs || 0) + '</td>'
      + '<td style="padding:3px 6px;text-align:center;color:var(--dim)">' + (bw.dots || 0) + '</td>'
      + '<td style="padding:3px 6px;text-align:center;color:var(--dim)">' + econ + '</td></tr>';
  });
  
  const tRuns = completed.reduce(function(s, inn) { return s + (inn.total || 0); }, 0);
  const tWkts = completed.reduce(function(s, inn) { return s + (inn.wkts || 0); }, 0);
  
  closeAllModals();

    + '<h3>Session Stats <span style="font-size:12px;color:var(--dim)">(' + completed.length + '/' + s.pairs.length + ' pairs)</span></h3>'
    + '<div style="display:flex;gap:12px;margin-bottom:10px;justify-content:center">'
    + '<div style="text-align:center"><span style="font-size:20px;font-weight:800;color:var(--orange)">' + tRuns + '</span><br><span style="font-size:10px;color:var(--dim)">Runs</span></div>'
    + '<div style="text-align:center"><span style="font-size:20px;font-weight:800;color:var(--red)">' + tWkts + '</span><br><span style="font-size:10px;color:var(--dim)">Wickets</span></div>'

  document.body.appendChild(m);
}

// UNDO
function undo() {
  const inn = S().innings;
  if (!inn || !inn._undo || inn._undo.length === 0) { alert('Nothing to undo'); return; }
  if (!confirm('Undo last ball?')) return;
  const snap = inn._undo.pop();
  restoreInnings(snap);
  closeAllModals();
  render();
}

function nextPair() {
  saveInnings();
  S().view = 'pairselect';
  closeAllModals();
  render();
}
function renderSummary() {

  for (const inn of innings) {

    const hist = inn.history || [];
    const extras = inn.extras || {};

    for (const h of hist) {
      if (h.bowler) {
