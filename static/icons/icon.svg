<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Cricket stumps -->
  <rect x="196" y="240" width="12" height="180" rx="3" fill="#f5f5f5"/>
  <rect x="246" y="240" width="12" height="180" rx="3" fill="#f5f5f5"/>
  <rect x="296" y="240" width="12" height="180" rx="3" fill="#f5f5f5"/>
  <!-- Bails -->
  <rect x="186" y="228" width="132" height="10" rx="4" fill="#ffd700"/>
  <rect x="186" y="222" width="132" href="#top-bail" fill="#ffd700"/>
  <!-- Bat -->
  <g transform="translate(360, 100) rotate(-30)">
    <rect x="0" y="0" width="22" height="160" rx="8" fill="#d4a04a"/>
    <rect x="0" y="140" width="22" height="60" rx="3" fill="#8B4513"/>
    <rect x="2" y="0" width="3" height="140" fill="#f0c060" opacity="0.5"/>
  </g>
  <!-- Cricket ball -->
  <circle cx="280" cy="370" r="30" fill="#cc3333"/>
  <path d="M260 360 Q280 345 300 360" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.4"/>
  <path d="M262 375 Q280 390 298 375" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.3"/>
  <!-- "CREASE" text -->
  <text x="256" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-weight="800"
        font-size="36" fill="#ffd700" letter-spacing="4">the CREASE</text>
</svg>
